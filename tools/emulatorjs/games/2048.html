<!DOCTYPE html>
<html>
<head>
<title>ZICORE 2048</title>
<style>
body{background:#0a0a1a;color:#0f6;font-family:monospace;margin:0;padding:20px;display:flex;flex-direction:column;align-items:center}
h1{text-shadow:0 0 10px #0f6}
.grid{display:grid;grid-template-columns:repeat(4,80px);gap:5px;margin:20px 0}
.cell{width:80px;height:80px;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:bold;border-radius:8px;background:#111;border:1px solid #333}
.info{color:#888;font-size:12px;margin:10px}
</style>
</head>
<body>
<h1>2048</h1>
<div class="info">Arrow Keys or WASD to slide tiles</div>
<div class="grid" id="grid"></div>
<div class="info">Score: <span id="score">0</span> | Best: <span id="best">0</span></div>
<script>
let grid,score,bestScore=0;

function init(){
  grid=Array.from({length:4},()=>Array(4).fill(0));
  score=0;addTile();addTile();render();
}

function addTile(){
  const empty=[];
  for(let r=0;r<4;r++)for(let c=0;c<4;c++)if(grid[r][c]===0)empty.push({r,c});
  if(!empty)return;
  const{r,c}=empty[Math.floor(Math.random()*empty.length)];
  grid[r][c]=Math.random()<0.9?2:4;
}

function slide(row){
  let a=row.filter(x=>x);
  for(let i=0;i<a.length-1;i++){
    if(a[i]===a[i+1]){a[i]*=2;score+=a[i];a.splice(i+1,1);}
  }
  while(a.length<4)a.push(0);
  return a;
}

function move(dir){
  let moved=false;
  let g=grid.map(r=>[...r]);
  if(dir==='left'){for(let r=0;r<4;r++){const n=slide(g[r]);if(n.join(',')!==g[r].join(','))moved=true;grid[r]=n;}}
  if(dir==='right'){for(let r=0;r<4;r++){const n=slide([...g[r]].reverse()).reverse();if(n.join(',')!==g[r].join(','))moved=true;grid[r]=n;}}
  if(dir==='up'){
    for(let c=0;c<4;c++){
      let col=[g[0][c],g[1][c],g[2][c],g[3][c]];
      const n=slide(col);
      if(n.join(',')!==col.join(','))moved=true;
      for(let r=0;r<4;r++)grid[r][c]=n[r];
    }
  }
  if(dir==='down'){
    for(let c=0;c<4;c++){
      let col=[g[3][c],g[2][c],g[1][c],g[0][c]];
      const n=slide(col).reverse();
      if(n.join(',')!==col.reverse().join(','))moved=true;
      for(let r=0;r<4;r++)grid[r][c]=n[r];
    }
  }
  if(moved){addTile();render();}
}

function render(){
  const el=document.getElementById('grid');
  el.innerHTML='';
  const COLORS={0:'#111',2:'#eee',4:'#ff0',8:'#f80',16:'#f40',32:'#f00',64:'#a0f',128:'#00f',256:'#0ff',512:'#0f0',1024:'#ff0',2048:'#f0f'};
  for(let r=0;r<4;r++)
    for(let c=0;c<4;c++){
      const v=grid[r][c];
      const d=document.createElement('div');
      d.className='cell';
      d.textContent=v||'';
      d.style.background=COLORS[v]||'#f0f';
      d.style.color=v<=4?'#000':'#fff';
      el.appendChild(d);
    }
  document.getElementById('score').textContent=score;
  if(score>bestScore){bestScore=score;document.getElementById('best').textContent=bestScore;}
}

document.onkeydown=e=>{
  const k=e.key.toLowerCase();
  if(k=='arrowleft'||k=='a')move('left');
  if(k=='arrowright'||k=='d')move('right');
  if(k=='arrowup'||k=='w')move('up');
  if(k=='arrowdown'||k=='s')move('down');
  if(k=='r')init();
};
init();
</script>
</body>
</html>
