version: '3.8'

services:
  # ─── ZICORE API Backend ─────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zicore-api
    command: python -m uvicorn backend.app.main:app --host 0.0.0.0 --port 8080
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./output:/app/output
    environment:
      - ZICORE_PORT=8080
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - zicore-net

  # ─── ZICORE Web Server ──────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zicore-web
    command: python web_server.py 3000
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
      - ./output:/app/output
    environment:
      - ZICORE_WEB_PORT=3000
      - PYTHONUNBUFFERED=1
    depends_on:
      - api
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - zicore-net

  # ─── Nginx Reverse Proxy + SSL ──────────────────────────
  nginx:
    image: nginx:alpine
    container_name: zicore-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - api
      - web
    restart: unless-stopped
    networks:
      - zicore-net

  # ─── Cloudflare Tunnel ──────────────────────────────────
  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: zicore-tunnel
    command: tunnel run zicore
    volumes:
      - ./cloudflared:/root/.cloudflared
    depends_on:
      - nginx
    restart: unless-stopped
    networks:
      - zicore-net

networks:
  zicore-net:
    driver: bridge
