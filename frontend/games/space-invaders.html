<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZICORE Space Invaders</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#04060c;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'Consolas','Courier New',monospace;color:#c0d0e0;overflow:hidden;user-select:none}
canvas{display:block;border:1px solid rgba(0,229,255,0.15);box-shadow:0 0 30px rgba(0,229,255,0.08),inset 0 0 60px rgba(0,0,0,0.5)}
.screen{position:absolute;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:20;width:100%;height:100%}
.screen.active{display:flex}
#startScreen{background:radial-gradient(ellipse at center,rgba(0,229,255,0.05) 0%,rgba(4,6,12,0.97) 70%)}
#startScreen h1{font-size:42px;color:#00e5ff;text-shadow:0 0 30px rgba(0,229,255,0.5),0 0 60px rgba(0,229,255,0.2);letter-spacing:8px;margin-bottom:6px;font-weight:900}
#startScreen .subtitle{font-size:11px;color:#7c4dff;letter-spacing:6px;margin-bottom:40px;text-transform:uppercase}
#startScreen .controls{display:flex;gap:40px;margin-bottom:30px}
#startScreen .ctrl-group{display:flex;flex-direction:column;align-items:center;gap:6px}
#startScreen .ctrl-label{font-size:10px;color:#5a6a7a;letter-spacing:2px;text-transform:uppercase}
#startScreen .key-row{display:flex;gap:4px}
#startScreen .key{background:rgba(0,229,255,0.08);border:1px solid rgba(0,229,255,0.25);color:#00e5ff;padding:4px 10px;font-size:11px;border-radius:3px;min-width:28px;text-align:center}
#startScreen .start-btn{background:linear-gradient(135deg,rgba(0,229,255,0.15),rgba(124,77,255,0.15));border:1px solid rgba(0,229,255,0.3);color:#00e5ff;padding:12px 40px;font-size:14px;font-family:inherit;cursor:pointer;letter-spacing:3px;text-transform:uppercase;transition:all 0.3s;margin-top:10px}
#startScreen .start-btn:hover{background:linear-gradient(135deg,rgba(0,229,255,0.25),rgba(124,77,255,0.25));box-shadow:0 0 20px rgba(0,229,255,0.2)}
#levelSelect{background:rgba(4,6,12,0.97);padding:20px}
#levelSelect h2{font-size:24px;color:#00e5ff;margin-bottom:20px;letter-spacing:4px;text-transform:uppercase}
#levelSelect .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:20px}
#levelSelect .level-btn{width:80px;height:70px;background:rgba(0,229,255,0.05);border:1px solid rgba(0,229,255,0.15);color:#5a7a8a;font-family:inherit;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;transition:all 0.2s;position:relative}
#levelSelect .level-btn.unlocked{border-color:rgba(0,229,255,0.3);color:#00e5ff}
#levelSelect .level-btn.unlocked:hover{background:rgba(0,229,255,0.12);box-shadow:0 0 15px rgba(0,229,255,0.15)}
#levelSelect .level-btn.locked{opacity:0.3;cursor:not-allowed}
#levelSelect .level-btn .num{font-size:20px;font-weight:bold}
#levelSelect .level-btn .lbl{font-size:8px;letter-spacing:1px;text-transform:uppercase}
#levelSelect .level-btn .best{font-size:8px;color:#7c4dff}
#levelSelect .level-btn .stars{font-size:9px;color:#ffeb3b}
#levelSelect .level-btn.hard-mode{border-color:rgba(255,23,68,0.2);color:#ff6b6b}
#levelSelect .level-btn.hard-mode.unlocked{border-color:rgba(255,23,68,0.4);color:#ff6b6b}
#levelSelect .level-btn.hard-mode.unlocked:hover{background:rgba(255,23,68,0.1);box-shadow:0 0 15px rgba(255,23,68,0.15)}
#levelSelect .back-btn{background:rgba(124,77,255,0.1);border:1px solid rgba(124,77,255,0.3);color:#7c4dff;padding:10px 30px;font-size:12px;font-family:inherit;cursor:pointer;letter-spacing:2px;text-transform:uppercase;transition:all 0.3s}
#levelSelect .back-btn:hover{background:rgba(124,77,255,0.2)}
#gameOverScreen{background:rgba(4,6,12,0.95);padding:40px}
#gameOverScreen h1{font-size:36px;color:#ff1744;text-shadow:0 0 30px rgba(255,23,68,0.4);margin-bottom:10px;letter-spacing:4px}
#gameOverScreen .stats{display:flex;gap:30px;margin:20px 0 30px}
#gameOverScreen .stat{text-align:center}
#gameOverScreen .stat-val{font-size:24px;color:#00e5ff}
#gameOverScreen .stat-lbl{font-size:9px;color:#5a6a7a;letter-spacing:2px;text-transform:uppercase;margin-top:4px}
#gameOverScreen .btn-row{display:flex;gap:15px}
#gameOverScreen button{background:rgba(0,229,255,0.1);border:1px solid rgba(0,229,255,0.3);color:#00e5ff;padding:10px 25px;font-size:12px;font-family:inherit;cursor:pointer;letter-spacing:2px;text-transform:uppercase;transition:all 0.3s}
#gameOverScreen button:hover{background:rgba(0,229,255,0.2)}
#gameOverScreen button.secondary{border-color:rgba(124,77,255,0.3);color:#7c4dff}
#gameOverScreen button.secondary:hover{background:rgba(124,77,255,0.2)}
#levelCompleteScreen{background:rgba(4,6,12,0.95);padding:40px}
#levelCompleteScreen h1{font-size:32px;color:#00ff88;text-shadow:0 0 30px rgba(0,255,136,0.4);margin-bottom:6px;letter-spacing:4px}
#levelCompleteScreen .next-label{font-size:11px;color:#7c4dff;letter-spacing:2px;margin-bottom:20px}
#levelCompleteScreen .btn-row{display:flex;gap:15px}
#levelCompleteScreen button{background:rgba(0,255,136,0.1);border:1px solid rgba(0,255,136,0.3);color:#00ff88;padding:10px 25px;font-size:12px;font-family:inherit;cursor:pointer;letter-spacing:2px;text-transform:uppercase;transition:all 0.3s}
#levelCompleteScreen button:hover{background:rgba(0,255,136,0.2)}
#levelCompleteScreen button.secondary{background:rgba(124,77,255,0.1);border-color:rgba(124,77,255,0.3);color:#7c4dff}
#levelCompleteScreen button.secondary:hover{background:rgba(124,77,255,0.2)}
#pauseOverlay{position:absolute;display:none;align-items:center;justify-content:center;z-index:25;width:100%;height:100%;background:rgba(4,6,12,0.6)}
#pauseOverlay.active{display:flex}
#pauseOverlay .pause-box{text-align:center}
#pauseOverlay .pause-title{font-size:28px;color:#00e5ff;letter-spacing:4px;margin-bottom:10px}
#pauseOverlay .pause-sub{font-size:12px;color:#5a6a7a;letter-spacing:2px}
</style>
</head>
<body>
<canvas id="game"></canvas>

<div id="startScreen" class="screen active">
<h1>SPACE INVADERS</h1>
<div class="subtitle">ZICORE Tactical Defense</div>
<div class="controls">
<div class="ctrl-group"><div class="ctrl-label">Movement</div><div class="key-row"><span class="key">A</span><span class="key">D</span></div><div class="key-row"><span class="key">&larr;</span><span class="key">&rarr;</span></div></div>
<div class="ctrl-group"><div class="ctrl-label">Fire</div><div class="key-row"><span class="key">SPACE</span></div></div>
<div class="ctrl-group"><div class="ctrl-label">Pause</div><div class="key-row"><span class="key">ESC</span></div></div>
</div>
<button class="start-btn" id="btnStart">ENGAGE</button>
</div>

<div id="levelSelect" class="screen">
<h2>Select Mission</h2>
<div class="grid" id="levelGrid"></div>
<button class="back-btn" id="btnBackToStart">RETURN</button>
</div>

<div id="gameOverScreen" class="screen">
<h1>MISSION FAILED</h1>
<div class="stats">
<div class="stat"><div class="stat-val" id="goScore">0</div><div class="stat-lbl">Score</div></div>
<div class="stat"><div class="stat-val" id="goWave">0</div><div class="stat-lbl">Level</div></div>
<div class="stat"><div class="stat-val" id="goKills">0</div><div class="stat-lbl">Kills</div></div>
</div>
<div class="btn-row">
<button id="btnRetry">RETRY</button>
<button class="secondary" id="btnGoLevels">MISSIONS</button>
</div>
</div>

<div id="levelCompleteScreen" class="screen">
<h1>MISSION COMPLETE</h1>
<div class="next-label" id="lcNextLabel"></div>
<div class="stats">
<div class="stat"><div class="stat-val" id="lcScore">0</div><div class="stat-lbl">Score</div></div>
<div class="stat"><div class="stat-val" id="lcStars">0</div><div class="stat-lbl">Rating</div></div>
<div class="stat"><div class="stat-val" id="lcBonus">0</div><div class="stat-lbl">Level Bonus</div></div>
</div>
<div class="btn-row">
<button id="btnNextLevel">NEXT MISSION</button>
<button class="secondary" id="btnLcLevels">MISSIONS</button>
</div>
</div>

<div id="pauseOverlay">
<div class="pause-box">
<div class="pause-title">PAUSED</div>
<div class="pause-sub">Press ESC to resume</div>
</div>
</div>

<script>
var canvas = document.getElementById('game');
var ctx = canvas.getContext('2d');
var CW = 640, CH = 560;
canvas.width = CW; canvas.height = CH;

var COLORS = {bg:'#04060c',cyan:'#00e5ff',purple:'#7c4dff',green:'#00ff88',red:'#ff1744',yellow:'#ffeb3b',orange:'#ff9100',white:'#c0d0e0'};

var SAVE_KEY = 'zicore_si_v3';
var progress = loadProgress();
var currentScreen = 'start';
var currentLevel = 1;
var gameActive = false;
var paused = false;
var gameState = null;
var frame = 0;
var keys = {};
var shakeAmount = 0;
var comboCount = 0;
var comboTimer = 0;

var audioCtx = null;
function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
}
function playTone(freq, dur, type, vol) {
    if (!audioCtx) return;
    var osc = audioCtx.createOscillator();
    var gain = audioCtx.createGain();
    osc.type = type || 'square';
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(vol || 0.1, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + dur);
}
function sfxShoot() { playTone(880, 0.08, 'square', 0.07); }
function sfxExplode() { playTone(120, 0.3, 'sawtooth', 0.12); playTone(80, 0.4, 'square', 0.08); }
function sfxPowerUp() { playTone(523, 0.1, 'sine', 0.1); setTimeout(function(){playTone(659,0.1,'sine',0.1)},80); setTimeout(function(){playTone(784,0.15,'sine',0.1)},160); }
function sfxBossWarning() { for(var i=0;i<4;i++){setTimeout(function(){playTone(220,0.15,'sawtooth',0.1)},i*200)} }
function sfxPlayerHit() { playTone(200, 0.2, 'sawtooth', 0.15); playTone(100, 0.3, 'square', 0.1); }
function sfxCombo() { playTone(1047, 0.05, 'sine', 0.06); }
function sfxLevelUp() { [523,659,784,1047].forEach(function(f,i){setTimeout(function(){playTone(f,0.15,'sine',0.1)},i*100)}); }
function sfxBossHit() { playTone(300, 0.06, 'square', 0.05); }
function sfxBossDeath() { playTone(100, 0.5, 'sawtooth', 0.15); setTimeout(function(){playTone(80,0.6,'square',0.1)},200); setTimeout(function(){playTone(60,0.7,'sawtooth',0.08)},400); }

function loadProgress() {
    try { var d = localStorage.getItem(SAVE_KEY); return d ? JSON.parse(d) : {unlocked:1, scores:{}, bestScores:{}}; }
    catch(e) { return {unlocked:1, scores:{}, bestScores:{}}; }
}
function saveProgress() {
    try { localStorage.setItem(SAVE_KEY, JSON.stringify(progress)); } catch(e) {}
}

function getLevelConfig(lvl) {
    var hard = lvl > 10;
    var n = Math.min(lvl, 20);
    var baseCount = hard ? 10 + ((n-10) * 8) : 5 + ((n-1) * 4);
    var count = Math.round(baseCount);
    var speed = hard ? 2.0 + ((n-10) * 0.7) : 1.0 + ((n-1) * 0.45);
    var cols = Math.min(hard ? 12 : 10, count);
    var rows = Math.ceil(count / cols);
    var alienShootRate = hard ? 0.014 + ((n-10) * 0.004) : 0.003 + ((n-1) * 0.0012);
    var hasBoss = (n % 5 === 0);
    var bossHP = hasBoss ? (hard ? 40 + ((n-10) * 8) : 20 + (n * 3)) : 0;
    var powerUpChance = 0.10 + ((n-1) * 0.006);
    var hardColors = [[255,23,68],[255,145,0],[255,82,82],[255,61,0],[200,0,0]];
    var normalColors = [[0,229,255],[124,77,255],[0,255,136],[255,235,59],[255,145,0]];
    var colors = hard ? hardColors : normalColors;
    var shootCooldown = hard ? Math.max(6, 14 - (n-10)) : Math.max(8, 14 - Math.floor((n-1)/2));
    return {
        count: count, speed: speed, cols: cols, rows: rows,
        alienShootRate: alienShootRate, hasBoss: hasBoss, bossHP: bossHP,
        powerUpChance: powerUpChance, hard: hard, colors: colors,
        lives: hard ? 2 : 3, playerSpeed: 5.5, bulletSpeed: 9,
        bulletCooldown: shootCooldown, enemyRows: rows, enemyCols: cols
    };
}

function showScreen(id) {
    document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active')});
    document.getElementById('pauseOverlay').classList.remove('active');
    if (id) { var el = document.getElementById(id); if (el) el.classList.add('active'); }
    currentScreen = id || '';
}

function buildLevelGrid() {
    var grid = document.getElementById('levelGrid');
    grid.innerHTML = '';
    for (var i = 1; i <= 20; i++) {
        var btn = document.createElement('button');
        var hard = i > 10;
        var unlocked = i <= progress.unlocked;
        var starCount = 0;
        if (progress.scores[i]) {
            if (progress.scores[i] >= 3000) starCount = 3;
            else if (progress.scores[i] >= 1500) starCount = 2;
            else if (progress.scores[i] > 0) starCount = 1;
        }
        var starsStr = '';
        for (var s = 0; s < 3; s++) starsStr += s < starCount ? '\u2605' : '\u2606';
        btn.className = 'level-btn' + (unlocked ? ' unlocked' : ' locked') + (hard ? ' hard-mode' : '');
        btn.innerHTML = '<div class="num">' + i + '</div><div class="lbl">' + (hard ? 'HARD' : 'NORMAL') + '</div><div class="stars">' + starsStr + '</div>' + (progress.bestScores[i] ? '<div class="best">HI:' + progress.bestScores[i] + '</div>' : '');
        if (unlocked) { (function(lvl){ btn.onclick = function(){ startLevel(lvl); }; })(i); }
        grid.appendChild(btn);
    }
}

document.getElementById('btnStart').onclick = function(){ showScreen('levelSelect'); buildLevelGrid(); };
document.getElementById('btnBackToStart').onclick = function(){ showScreen('startScreen'); };
document.getElementById('btnRetry').onclick = function(){ startLevel(currentLevel); };
document.getElementById('btnGoLevels').onclick = function(){ showScreen('levelSelect'); buildLevelGrid(); };
document.getElementById('btnNextLevel').onclick = function(){
    if (currentLevel < 20) startLevel(currentLevel + 1);
    else { showScreen('levelSelect'); buildLevelGrid(); }
};
document.getElementById('btnLcLevels').onclick = function(){ showScreen('levelSelect'); buildLevelGrid(); };

function startLevel(lvl) {
    initAudio();
    currentLevel = lvl;
    showScreen(null);
    var cfg = getLevelConfig(lvl);
    var shipW = 36, shipH = 28;
    var gapX = Math.min(52, (CW - 80) / cfg.enemyCols);
    var gapY = 38;
    var startX = (CW - cfg.enemyCols * gapX) / 2 + gapX / 2;
    var startY = 70;

    gameState = {
        ship: {x: CW/2, y: CH-50, w: shipW, h: shipH, dir: 0, speed: cfg.playerSpeed, invuln: 0, lives: cfg.lives, speedBoost: false},
        aliens: [], alienDir: 1, alienDrop: 0, alienBaseSpeed: cfg.speed * 0.4,
        bullets: [], alienBullets: [],
        particles: [], powerUps: [],
        boss: null,
        score: 0, kills: 0,
        wave: lvl, config: cfg,
        shootCooldown: 0, frame: 0,
        starField: [], bossActive: false,
        shieldTimer: 0, rapidTimer: 0, multiTimer: 0, speedTimer: 0,
        bossEntrance: 0, bossMinions: [],
        engineTrail: []
    };

    for (var r = 0; r < cfg.enemyRows; r++) {
        for (var c = 0; c < cfg.enemyCols; c++) {
            var totalRows = cfg.enemyRows;
            var rowWeight = (totalRows - r) / totalRows;
            var spd = cfg.speed * (0.4 + rowWeight * 0.6);
            var rowIdx = r % cfg.colors.length;
            var col = cfg.colors[rowIdx];
            var type = 0;
            var hp = 1;
            var points = 100;
            var enemyW = 22, enemyH = 18;

            if (r === 0 && cfg.enemyRows > 3) { type = 2; hp = 3; points = 300; enemyW = 26; enemyH = 22; }
            else if (r === 1 || r === 2) {
                if ((c + r) % 3 === 0 && cfg.hard) { type = 3; hp = 2; points = 250; }
                else { type = 1; hp = 1; points = 150; enemyW = 20; enemyH = 16; }
            }
            else if (r === totalRows - 1 && cfg.hard) { type = 3; hp = 2; points = 250; }

            gameState.aliens.push({
                x: startX + c * gapX, y: startY + r * gapY,
                w: enemyW, h: enemyH,
                alive: true, hp: hp, maxHP: hp,
                speed: spd, dir: 1,
                color: col, type: type,
                pointValue: points,
                shootTimer: Math.random() * 120 | 0,
                animFrame: 0
            });
        }
    }

    if (cfg.hasBoss) {
        gameState.boss = {
            x: CW/2, y: -60, w: 60, h: 30,
            hp: cfg.bossHP, maxHP: cfg.bossHP,
            dir: 1, speed: cfg.speed * 0.3,
            alive: true, attackTimer: 0, attackPhase: 0,
            targetY: 80, entered: false,
            spawnTimer: 0, patternIndex: 0,
            phase: 1
        };
        sfxBossWarning();
    }

    for (var i = 0; i < 80; i++) {
        gameState.starField.push({x: Math.random()*CW, y: Math.random()*CH, s: Math.random()*1.5+0.5, b: Math.random(), speed: Math.random()*0.3+0.1});
    }

    gameActive = true; paused = false; frame = 0; shakeAmount = 0; comboCount = 0; comboTimer = 0;
    requestAnimationFrame(gameLoop);
}

function spawnParticles(x, y, color, count, speed, sizeMin, sizeMax) {
    sizeMin = sizeMin || 1; sizeMax = sizeMax || 3;
    for (var i = 0; i < count; i++) {
        var angle = Math.random() * Math.PI * 2;
        var spd = Math.random() * speed + 1;
        gameState.particles.push({
            x: x, y: y,
            vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd,
            life: 1, decay: 0.012 + Math.random() * 0.02,
            size: Math.random() * (sizeMax - sizeMin) + sizeMin,
            color: color
        });
    }
}

function spawnPowerUp(x, y) {
    var types = ['shield', 'rapid', 'multi', 'health', 'bomb', 'speed'];
    var type = types[Math.floor(Math.random() * types.length)];
    gameState.powerUps.push({x: x, y: y, type: type, vy: 1.5, life: 1});
}

function drawPowerUpIcon(pu) {
    ctx.save();
    ctx.globalAlpha = 0.7 + Math.sin(frame * 0.1) * 0.3;
    var iconMap = {shield:'\u25C8', rapid:'\u25B6', multi:'\u25B8', health:'\u2665', bomb:'\u25CF', speed:'\u25B7'};
    var colors = {shield:COLORS.cyan, rapid:COLORS.yellow, multi:COLORS.purple, health:COLORS.green, bomb:COLORS.red, speed:COLORS.orange};
    ctx.strokeStyle = colors[pu.type];
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(pu.x, pu.y, 10, 0, Math.PI * 2);
    ctx.stroke();
    ctx.fillStyle = colors[pu.type];
    ctx.font = 'bold 11px Consolas,monospace';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(iconMap[pu.type] || '?', pu.x, pu.y);
    ctx.restore();
}

function drawShield() {
    var s = gameState.ship;
    var alpha = 0.3 + Math.sin(frame * 0.08) * 0.15;
    ctx.save();
    ctx.strokeStyle = COLORS.cyan;
    ctx.globalAlpha = alpha;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(s.x, s.y - 5, 24, 0, Math.PI * 2);
    ctx.stroke();
    ctx.globalAlpha = alpha * 0.2;
    ctx.fillStyle = COLORS.cyan;
    ctx.fill();
    ctx.restore();
}

function drawEngineTrail() {
    var s = gameState.ship;
    var grad = ctx.createRadialGradient(s.x, s.y + s.h/2 + 4, 0, s.x, s.y + s.h/2 + 4, 12);
    grad.addColorStop(0, 'rgba(0,229,255,0.6)');
    grad.addColorStop(0.5, 'rgba(124,77,255,0.3)');
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.fillRect(s.x - 12, s.y + s.h/2 - 2, 24, 16);

    for (var i = 0; i < 3; i++) {
        var px = s.x + (Math.random() - 0.5) * 8;
        var py = s.y + s.h/2 + 4 + Math.random() * 8;
        var sz = 1 + Math.random() * 2;
        ctx.fillStyle = Math.random() > 0.5 ? 'rgba(0,229,255,0.5)' : 'rgba(124,77,255,0.4)';
        ctx.fillRect(px - sz/2, py, sz, sz);
    }
}

function drawShip() {
    var s = gameState.ship;
    ctx.save();
    if (s.invuln > 0 && Math.floor(frame / 4) % 2 === 0) ctx.globalAlpha = 0.3;

    var grad = ctx.createLinearGradient(s.x, s.y - s.h/2, s.x, s.y + s.h/2);
    grad.addColorStop(0, COLORS.cyan);
    grad.addColorStop(1, 'rgba(0,229,255,0.4)');
    ctx.fillStyle = grad;

    ctx.beginPath();
    ctx.moveTo(s.x, s.y - s.h/2 + 2);
    ctx.lineTo(s.x - s.w/2, s.y + s.h/2 - 4);
    ctx.lineTo(s.x - s.w/2 + 6, s.y + s.h/2);
    ctx.lineTo(s.x - 3, s.y + s.h/2 - 6);
    ctx.lineTo(s.x + 3, s.y + s.h/2 - 6);
    ctx.lineTo(s.x + s.w/2 - 6, s.y + s.h/2);
    ctx.lineTo(s.x + s.w/2, s.y + s.h/2 - 4);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = 'rgba(124,77,255,0.5)';
    ctx.beginPath();
    ctx.ellipse(s.x, s.y - 2, 5, 7, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = 'rgba(0,229,255,0.3)';
    ctx.beginPath();
    ctx.arc(s.x - s.w/2 + 3, s.y + s.h/2 - 2, 2, 0, Math.PI * 2);
    ctx.arc(s.x + s.w/2 - 3, s.y + s.h/2 - 2, 2, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
}

function drawAlien(a) {
    ctx.save();
    var wobble = Math.sin(frame * 0.05 + a.x * 0.1) * 1.5;
    var colStr = 'rgb(' + a.color[0] + ',' + a.color[1] + ',' + a.color[2] + ')';

    var glow = ctx.createRadialGradient(a.x, a.y, 0, a.x, a.y, a.w);
    glow.addColorStop(0, 'rgba(' + a.color[0] + ',' + a.color[1] + ',' + a.color[2] + ',0.08)');
    glow.addColorStop(1, 'transparent');
    ctx.fillStyle = glow;
    ctx.fillRect(a.x - a.w, a.y - a.h, a.w * 2, a.h * 2);

    ctx.fillStyle = colStr;

    if (a.type === 0) {
        var bw = a.w * 0.4, bh = a.h * 0.35;
        ctx.fillRect(a.x - bw, a.y - bh + wobble, bw * 2, bh * 2);
        ctx.fillRect(a.x - bw - 4, a.y - bh + 4 + wobble, 4, bh);
        ctx.fillRect(a.x + bw, a.y - bh + 4 + wobble, 4, bh);
        ctx.fillRect(a.x - bw, a.y + bh + wobble, bw * 0.6, 4);
        ctx.fillRect(a.x + bw - bw * 0.6, a.y + bh + wobble, bw * 0.6, 4);
        ctx.fillStyle = '#000';
        ctx.fillRect(a.x - 5, a.y - 3 + wobble, 3, 3);
        ctx.fillRect(a.x + 2, a.y - 3 + wobble, 3, 3);
    } else if (a.type === 1) {
        ctx.beginPath();
        ctx.moveTo(a.x, a.y - a.h/2 - 2 + wobble);
        ctx.lineTo(a.x - a.w/2, a.y + a.h/2 + wobble);
        ctx.lineTo(a.x, a.y + a.h/2 - 6 + wobble);
        ctx.lineTo(a.x + a.w/2, a.y + a.h/2 + wobble);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(a.x - 4, a.y - 1 + wobble, 3, 3);
        ctx.fillRect(a.x + 1, a.y - 1 + wobble, 3, 3);
    } else if (a.type === 2) {
        ctx.fillRect(a.x - a.w/2, a.y - a.h/2 + wobble, a.w, a.h);
        ctx.fillRect(a.x - a.w/2 - 3, a.y - a.h/2 + 6 + wobble, 3, a.h - 8);
        ctx.fillRect(a.x + a.w/2, a.y - a.h/2 + 6 + wobble, 3, a.h - 8);
        ctx.fillStyle = 'rgba(' + Math.min(255,a.color[0]+40) + ',' + Math.min(255,a.color[1]+40) + ',' + Math.min(255,a.color[2]+40) + ',0.5)';
        ctx.fillRect(a.x - a.w/2 + 2, a.y - a.h/2 + 2 + wobble, a.w - 4, 4);
        ctx.fillStyle = '#000';
        ctx.fillRect(a.x - 7, a.y - 3 + wobble, 4, 4);
        ctx.fillRect(a.x + 3, a.y - 3 + wobble, 4, 4);
    } else if (a.type === 3) {
        ctx.fillRect(a.x - a.w/2 + 4, a.y - a.h/2 + wobble, a.w - 8, a.h);
        ctx.beginPath();
        ctx.moveTo(a.x - a.w/2, a.y + wobble);
        ctx.lineTo(a.x - a.w/2 + 6, a.y - a.h/2 + 4 + wobble);
        ctx.lineTo(a.x - a.w/2 + 6, a.y + a.h/2 - 4 + wobble);
        ctx.closePath();
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(a.x + a.w/2, a.y + wobble);
        ctx.lineTo(a.x + a.w/2 - 6, a.y - a.h/2 + 4 + wobble);
        ctx.lineTo(a.x + a.w/2 - 6, a.y + a.h/2 - 4 + wobble);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = '#000';
        ctx.fillRect(a.x - 3, a.y + a.h/2 - 4 + wobble, 6, 4);
    }

    if (a.maxHP > 1 && a.alive) {
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(a.x - a.w/2, a.y - a.h/2 - 6 + wobble, a.w, 3);
        ctx.fillStyle = a.hp > a.maxHP * 0.5 ? COLORS.green : COLORS.yellow;
        ctx.fillRect(a.x - a.w/2, a.y - a.h/2 - 6 + wobble, a.w * (a.hp / a.maxHP), 3);
    }

    ctx.restore();
}

function drawBoss(b) {
    ctx.save();
    var hpPct = b.hp / b.maxHP;
    var flash = hpPct < 0.3 && Math.floor(frame / 6) % 2 === 0;
    var bodyColor = flash ? COLORS.yellow : COLORS.red;

    var auraSize = 50 + Math.sin(frame * 0.03) * 5;
    ctx.fillStyle = 'rgba(255,23,68,0.06)';
    ctx.beginPath(); ctx.arc(b.x, b.y, auraSize, 0, Math.PI * 2); ctx.fill();

    ctx.fillStyle = bodyColor;
    ctx.beginPath();
    ctx.moveTo(b.x, b.y - b.h);
    ctx.lineTo(b.x - b.w, b.y);
    ctx.lineTo(b.x - b.w + 12, b.y + b.h/2);
    ctx.lineTo(b.x - 15, b.y + b.h/2 + 8);
    ctx.lineTo(b.x + 15, b.y + b.h/2 + 8);
    ctx.lineTo(b.x + b.w - 12, b.y + b.h/2);
    ctx.lineTo(b.x + b.w, b.y);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = 'rgba(255,23,68,0.7)';
    ctx.fillRect(b.x - b.w - 8, b.y - 4, 10, 8);
    ctx.fillRect(b.x + b.w - 2, b.y - 4, 10, 8);

    ctx.fillStyle = '#000';
    ctx.fillRect(b.x - 14, b.y - 8, 7, 7);
    ctx.fillRect(b.x + 7, b.y - 8, 7, 7);
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.fillRect(b.x - 11, b.y - 6, 3, 3);
    ctx.fillRect(b.x + 10, b.y - 6, 3, 3);

    var barW = 80;
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(b.x - barW/2, b.y - b.h - 16, barW, 6);
    ctx.fillStyle = hpPct > 0.5 ? COLORS.green : hpPct > 0.25 ? COLORS.yellow : COLORS.red;
    ctx.fillRect(b.x - barW/2, b.y - b.h - 16, barW * hpPct, 6);
    ctx.strokeStyle = 'rgba(0,229,255,0.3)';
    ctx.strokeRect(b.x - barW/2, b.y - b.h - 16, barW, 6);

    ctx.restore();
}

function drawHUD() {

    ctx.fillStyle = 'rgba(4,6,12,0.75)';
    ctx.fillRect(0, 0, CW, 38);
    ctx.strokeStyle = 'rgba(0,229,255,0.1)';
    ctx.beginPath(); ctx.moveTo(0, 38); ctx.lineTo(CW, 38); ctx.stroke();

    ctx.font = 'bold 13px Consolas,monospace';
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';

    ctx.fillStyle = COLORS.cyan;
    ctx.fillText('SCORE ' + String(gameState.score).padStart(6, '0'), 12, 19);

    ctx.fillStyle = gameState.config.hard ? COLORS.red : COLORS.yellow;
    ctx.fillText('LVL ' + currentLevel + (gameState.config.hard ? ' HARD' : ''), 160, 19);

    ctx.fillStyle = COLORS.green;
    var livesStr = '';
    for (var i = 0; i < gameState.ship.lives; i++) livesStr += '\u25C6 ';
    ctx.fillText('LIVES ' + livesStr, 310, 19);

    if (comboCount > 1) {
        ctx.fillStyle = COLORS.orange;
        ctx.fillText('COMBO x' + comboCount, 470, 19);
    }

    var puY = 52;
    if (gameState.shieldTimer > 0) {
        ctx.fillStyle = COLORS.cyan;
        ctx.textAlign = 'left';
        ctx.font = '10px Consolas,monospace';
        ctx.fillText('SHIELD ' + Math.ceil(gameState.shieldTimer / 60) + 's', 12, puY);
        puY += 14;
    }
    if (gameState.rapidTimer > 0) {
        ctx.fillStyle = COLORS.yellow;
        ctx.textAlign = 'left';
        ctx.font = '10px Consolas,monospace';
        ctx.fillText('RAPID ' + Math.ceil(gameState.rapidTimer / 60) + 's', 12, puY);
        puY += 14;
    }
    if (gameState.multiTimer > 0) {
        ctx.fillStyle = COLORS.purple;
        ctx.textAlign = 'left';
        ctx.font = '10px Consolas,monospace';
        ctx.fillText('MULTI ' + Math.ceil(gameState.multiTimer / 60) + 's', 12, puY);
        puY += 14;
    }
    if (gameState.speedTimer > 0) {
        ctx.fillStyle = COLORS.orange;
        ctx.textAlign = 'left';
        ctx.font = '10px Consolas,monospace';
        ctx.fillText('SPEED ' + Math.ceil(gameState.speedTimer / 60) + 's', 12, puY);
    }

    if (gameState.shootCooldown > 0) {
        ctx.fillStyle = 'rgba(0,229,255,0.15)';
        var pct = 1 - (gameState.shootCooldown / gameState.config.bulletCooldown);
        ctx.fillRect(CW/2 - 30, CH - 16, 60 * pct, 3);
    }

    ctx.restore();
}

function updateGame() {
    if (!gameActive || paused) return;
    var gs = gameState;
    var s = gs.ship;

    if (s.invuln > 0) s.invuln--;
    if (gs.shootCooldown > 0) gs.shootCooldown--;
    if (gameState.shieldTimer > 0) gameState.shieldTimer--;
    if (gameState.rapidTimer > 0) gameState.rapidTimer--;
    if (gameState.multiTimer > 0) gameState.multiTimer--;
    if (gameState.speedTimer > 0) gameState.speedTimer--;

    if (comboTimer > 0) comboTimer--;
    if (comboTimer <= 0) comboCount = 0;

    var moveSpeed = s.speed;
    if (gameState.speedTimer > 0) moveSpeed *= 1.5;

    if (keys['ArrowLeft'] || keys['a'] || keys['A']) { s.dir = -1; }
    else if (keys['ArrowRight'] || keys['d'] || keys['D']) { s.dir = 1; }
    else { s.dir = 0; }

    if (s.dir !== 0) s.x += s.dir * moveSpeed;
    s.x = Math.max(s.w/2, Math.min(CW - s.w/2, s.x));

    gs.starField.forEach(function(star) {
        star.y += star.speed;
        if (star.y > CH) { star.y = 0; star.x = Math.random() * CW; }
    });

    gs.bullets = gs.bullets.filter(function(b){ b.y -= gs.config.bulletSpeed; return b.y > -10; });
    gs.alienBullets = gs.alienBullets.filter(function(b){
        b.y += 3 + gs.config.speed * 0.5;
        b.x += (b.vx || 0);
        return b.y < CH + 10;
    });

    var hitEdge = false;
    var lowestAlienY = 0;
    gs.aliens.forEach(function(a) {
        if (!a.alive) return;
        a.animFrame = gs.frame * 0.05 + a.x * 0.1;
        var moveX = a.dir * a.speed * 0.8;
        a.x += moveX;
        if (a.x > CW - 20 || a.x < 20) hitEdge = true;
        if (a.y > lowestAlienY) lowestAlienY = a.y;
    });

    if (hitEdge) {
        gs.aliens.forEach(function(a) {
            if (!a.alive) return;
            a.dir *= -1;
            a.y += 14;
        });
    }

    gs.aliens.forEach(function(a) {
        if (!a.alive) return;
        a.shootTimer--;
        if (a.shootTimer <= 0) {
            a.shootTimer = 60 + Math.random() * 120 / (1 + gs.config.alienShootRate * 50);
            if (a.type === 3) {
                for (var i = -1; i <= 1; i++) {
                    gs.alienBullets.push({x: a.x + i * 8, y: a.y + a.h/2, vx: i * 0.5});
                }
            } else if (a.type === 2) {
                gs.alienBullets.push({x: a.x, y: a.y + a.h/2, vx: 0, big: true});
            } else {
                gs.alienBullets.push({x: a.x, y: a.y + a.h/2, vx: 0});
            }
        }
    });

    if (gs.boss && gs.boss.alive) {
        var b = gs.boss;
        if (!b.entered) {
            b.y += 1.5;
            if (b.y >= b.targetY) { b.entered = true; }
        } else {
            b.x += b.dir * b.speed;
            if (b.x > CW - b.w - 10 || b.x < b.w + 10) b.dir *= -1;

            var hpPct = b.hp / b.maxHP;
            if (hpPct < 0.3) b.phase = 3;
            else if (hpPct < 0.6) b.phase = 2;

            b.attackTimer++;
            var attackInterval = Math.max(30, 70 - b.attackPhase * 4);
            if (b.attackTimer > attackInterval) {
                b.attackTimer = 0;
                var angle = Math.atan2(s.y - b.y, s.x - b.x);
                var spd = 3 + gs.config.speed * 0.3;

                if (b.patternIndex === 0) {
                    for (var i = -2; i <= 2; i++) {
                        gs.alienBullets.push({x: b.x, y: b.y + b.h/2, vx: Math.cos(angle + i * 0.25) * spd * 0.5});
                    }
                } else if (b.patternIndex === 1) {
                    for (var i = 0; i < 3; i++) {
                        setTimeout(function(){
                            if (b.alive) gs.alienBullets.push({x: b.x, y: b.y + b.h/2, vx: Math.cos(angle) * spd * 0.6});
                        }, i * 100);
                    }
                } else {
                    gs.alienBullets.push({x: b.x - b.w - 5, y: b.y, vx: -1});
                    gs.alienBullets.push({x: b.x + b.w + 5, y: b.y, vx: 1});
                    gs.alienBullets.push({x: b.x, y: b.y + b.h/2, vx: 0});
                }
                b.patternIndex = (b.patternIndex + 1) % 3;
                b.attackPhase = Math.min(b.attackPhase + 1, 10);
            }

            b.spawnTimer++;
            if (b.spawnTimer > 300 && gs.aliens.filter(function(a){return a.alive}).length < 5) {
                b.spawnTimer = 0;
                for (var i = 0; i < 2; i++) {
                    gs.aliens.push({
                        x: b.x + (i === 0 ? -30 : 30), y: b.y + 20,
                        w: 18, h: 14, alive: true, hp: 1, maxHP: 1,
                        speed: 1.5, dir: i === 0 ? -1 : 1,
                        color: [255, 100, 100], type: 1,
                        pointValue: 50, shootTimer: 60, animFrame: 0
                    });
                }
            }
        }

        gs.bullets.forEach(function(bul) {
            if (Math.abs(bul.x - b.x) < b.w/2 + 6 && Math.abs(bul.y - b.y) < b.h/2 + 6) {
                b.hp--;
                bul.y = -100;
                spawnParticles(bul.x, bul.y, 'rgb(255,23,68)', 8, 2);
                shakeAmount = 5;
                sfxBossHit();
                if (b.hp <= 0) {
                    b.alive = false;
                    gs.bossActive = false;
                    gs.score += 1000;
                    spawnParticles(b.x, b.y, 'rgb(255,23,68)', 50, 6, 2, 5);
                    shakeAmount = 15;
                    sfxBossDeath();
                    spawnPowerUp(b.x, b.y);
                    spawnPowerUp(b.x - 20, b.y);
                    spawnPowerUp(b.x + 20, b.y);
                }
            }
        });
    }

    gs.bullets.forEach(function(b) {
        gs.aliens.forEach(function(a) {
            if (!a.alive) return;
            if (Math.abs(b.x - a.x) < a.w/2 + 4 && Math.abs(b.y - a.y) < a.h/2 + 4) {
                a.hp--;
                if (a.hp <= 0) {
                    a.alive = false;
                    comboCount++;
                    comboTimer = 120;
                    var comboMult = Math.min(comboCount, 10);
                    var pts = a.pointValue * comboMult;
                    gs.score += pts;
                    gs.kills++;
                    spawnParticles(a.x, a.y, 'rgb(' + a.color.join(',') + ')', 15, 3.5);
                    sfxExplode();
                    if (Math.random() < gs.config.powerUpChance) spawnPowerUp(a.x, a.y);
                    if (comboCount > 2) sfxCombo();
                } else {
                    spawnParticles(a.x, a.y, 'rgb(' + a.color.join(',') + ')', 4, 2);
                }
                b.y = -100;
                shakeAmount = 3;
            }
        });
    });

    gs.alienBullets.forEach(function(b) {
        var hitW = b.big ? s.w/2 + 6 : s.w/2;
        var hitH = b.big ? s.h/2 + 6 : s.h/2;
        if (Math.abs(b.x - s.x) < hitW && Math.abs(b.y - s.y) < hitH) {
            if (s.invuln <= 0 && gameState.shieldTimer <= 0) {
                s.lives--;
                b.y = CH + 100;
                s.invuln = 60;
                shakeAmount = 10;
                spawnParticles(s.x, s.y, COLORS.cyan, 20, 5);
                sfxPlayerHit();
                if (s.lives <= 0) endGame(false);
            }
        }
    });

    gs.aliens.forEach(function(a) {
        if (a.alive && a.y > s.y - 30) {
            s.lives = 0;
            endGame(false);
        }
    });

    gs.powerUps = gs.powerUps.filter(function(pu) {
        pu.y += pu.vy;
        if (pu.y > CH + 10) return false;
        if (Math.abs(pu.x - s.x) < 18 && Math.abs(pu.y - s.y) < 18) {
            sfxPowerUp();
            if (pu.type === 'shield') { gameState.shieldTimer = 300; spawnParticles(pu.x, pu.y, COLORS.cyan, 12, 2); }
            if (pu.type === 'rapid') { gameState.rapidTimer = 360; spawnParticles(pu.x, pu.y, COLORS.yellow, 12, 2); }
            if (pu.type === 'multi') { gameState.multiTimer = 300; spawnParticles(pu.x, pu.y, COLORS.purple, 12, 2); }
            if (pu.type === 'health') { s.lives = Math.min(s.lives + 1, 5); spawnParticles(pu.x, pu.y, COLORS.green, 12, 2); }
            if (pu.type === 'bomb') {
                gs.aliens.forEach(function(a) {
                    if (a.alive) {
                        a.alive = false;
                        gs.score += a.pointValue;
                        gs.kills++;
                        spawnParticles(a.x, a.y, 'rgb(' + a.color.join(',') + ')', 8, 3);
                    }
                });
                gs.alienBullets = [];
                shakeAmount = 12;
                spawnParticles(pu.x, pu.y, COLORS.red, 30, 6, 2, 5);
                sfxExplode();
            }
            if (pu.type === 'speed') { gameState.speedTimer = 300; spawnParticles(pu.x, pu.y, COLORS.orange, 12, 2); }
            return false;
        }
        return true;
    });

    gs.particles = gs.particles.filter(function(p) {
        p.x += p.vx; p.y += p.vy;
        p.vy += 0.04;
        p.life -= p.decay;
        return p.life > 0;
    });

    if (shakeAmount > 0.5) shakeAmount *= 0.92;
    else shakeAmount = 0;

    var allDead = gs.aliens.every(function(a){ return !a.alive; });
    var bossDead = !gs.boss || !gs.boss.alive;
    if (allDead && bossDead) {
        levelComplete();
    }
}

function levelComplete() {
    gameActive = false;
    sfxLevelUp();
    var gs = gameState;
    var lvlBonus = currentLevel * 50 + gs.ship.lives * 100;
    gs.score += lvlBonus;

    var starCount = 0;
    if (gs.score >= 3000) starCount = 3;
    else if (gs.score >= 1500) starCount = 2;
    else if (gs.score > 0) starCount = 1;
    var starsStr = '';
    for (var i = 0; i < 3; i++) starsStr += i < starCount ? '\u2605' : '\u2606';

    if (!progress.bestScores[currentLevel] || gs.score > progress.bestScores[currentLevel]) {
        progress.bestScores[currentLevel] = gs.score;
    }
    if (!progress.scores[currentLevel] || gs.score > progress.scores[currentLevel]) {
        progress.scores[currentLevel] = gs.score;
    }
    if (currentLevel >= progress.unlocked && currentLevel < 20) {
        progress.unlocked = currentLevel + 1;
    }
    saveProgress();

    document.getElementById('lcScore').textContent = gs.score;
    document.getElementById('lcStars').textContent = starsStr;
    document.getElementById('lcBonus').textContent = '+' + lvlBonus;
    var nextLvl = currentLevel < 20 ? currentLevel + 1 : null;
    document.getElementById('lcNextLabel').textContent = nextLvl ?
        ('Next: Level ' + nextLvl + (nextLvl > 10 ? ' HARD' : '')) : 'All missions complete!';
    showScreen('levelCompleteScreen');
}

function endGame(won) {
    gameActive = false;
    var gs = gameState;
    document.getElementById('goScore').textContent = gs.score;
    document.getElementById('goWave').textContent = currentLevel;
    document.getElementById('goKills').textContent = gs.kills;

    if (!progress.bestScores[currentLevel] || gs.score > progress.bestScores[currentLevel]) {
        progress.bestScores[currentLevel] = gs.score;
    }
    progress.scores[currentLevel] = gs.score;
    if (currentLevel >= progress.unlocked && currentLevel < 20) {
        progress.unlocked = currentLevel + 1;
    }
    saveProgress();

    showScreen('gameOverScreen');
}

function drawStars() {
    gameState.starField.forEach(function(star) {
        var alpha = 0.2 + Math.sin(frame * 0.02 + star.b * 10) * 0.15;
        ctx.fillStyle = 'rgba(200,210,224,' + alpha + ')';
        ctx.fillRect(star.x, star.y, star.s, star.s);
    });
}

function draw() {
    ctx.save();

    if (shakeAmount > 0.5) {
        var sx = (Math.random() - 0.5) * shakeAmount * 2;
        var sy = (Math.random() - 0.5) * shakeAmount * 2;
        ctx.translate(sx, sy);
    }

    ctx.fillStyle = COLORS.bg;
    ctx.fillRect(-10, -10, CW + 20, CH + 20);

    if (gameState) {
        drawStars();

        gameState.powerUps.forEach(function(pu) { drawPowerUpIcon(pu); });

        gameState.aliens.forEach(function(a) { if (a.alive) drawAlien(a); });

        if (gameState.boss && gameState.boss.alive) drawBoss(gameState.boss);

        if (gameState.shieldTimer > 0 || gameState.ship.invuln > 0) drawShield();

        drawEngineTrail();
        drawShip();

        gameState.bullets.forEach(function(b) {
            ctx.fillStyle = COLORS.cyan;
            ctx.fillRect(b.x - 1, b.y, 2, 10);
            ctx.fillStyle = 'rgba(0,229,255,0.3)';
            ctx.fillRect(b.x - 2, b.y - 2, 4, 12);
        });

        gameState.alienBullets.forEach(function(b) {
            ctx.fillStyle = b.big ? COLORS.orange : COLORS.red;
            var bw = b.big ? 4 : 2;
            var bh = b.big ? 12 : 8;
            ctx.fillRect(b.x - bw/2, b.y, bw, bh);
            ctx.fillStyle = b.big ? 'rgba(255,145,0,0.3)' : 'rgba(255,23,68,0.3)';
            ctx.fillRect(b.x - bw, b.y - 2, bw * 2, bh + 4);
        });

        gameState.particles.forEach(function(p) {
            ctx.globalAlpha = p.life;
            ctx.fillStyle = p.color;
            ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
        });
        ctx.globalAlpha = 1;

        drawHUD();
    }

    ctx.restore();
}

function gameLoop() {
    frame++;
    if (gameActive && !paused) updateGame();
    draw();
    requestAnimationFrame(gameLoop);
}

document.addEventListener('keydown', function(e) {
    keys[e.key] = true;

    if (e.key === 'Escape') {
        if (gameActive) {
            paused = !paused;
            if (paused) {
                document.getElementById('pauseOverlay').classList.add('active');
            } else {
                document.getElementById('pauseOverlay').classList.remove('active');
            }
        }
        e.preventDefault();
        return;
    }

    if ((currentScreen === '' || !document.querySelector('.screen.active')) && gameActive && !paused) {
        if (e.key === ' ') {
            if (gameState.shootCooldown <= 0) {
                var gs = gameState;
                var s = gs.ship;
                sfxShoot();
                gs.bullets.push({x: s.x, y: s.y - s.h/2 - 4});
                if (gs.multiTimer > 0) {
                    gs.bullets.push({x: s.x - 12, y: s.y - s.h/2 + 2});
                    gs.bullets.push({x: s.x + 12, y: s.y - s.h/2 + 2});
                }
                var cd = gs.config.bulletCooldown;
                if (gameState.rapidTimer > 0) cd = Math.max(3, Math.floor(cd / 3));
                gs.shootCooldown = cd;
            }
            e.preventDefault();
        }
    }

    if (e.key === 'Enter') {
        if (document.getElementById('startScreen').classList.contains('active')) {
            showScreen('levelSelect');
            buildLevelGrid();
        }
    }
});

document.addEventListener('keyup', function(e) {
    keys[e.key] = false;
});
</script>
