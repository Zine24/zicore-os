<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZICORE Geometry Dash</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
@keyframes slideIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}
body{background:#04060c;color:#e0e0e0;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;overflow:hidden;height:100vh;display:flex;align-items:center;justify-content:center}
canvas{display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}
.screen{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:10;animation:slideIn .4s ease}
.glass{background:rgba(10,15,30,.92);border:1px solid rgba(0,229,255,.2);border-radius:16px;padding:36px 46px;backdrop-filter:blur(20px);box-shadow:0 0 40px rgba(0,229,255,.08),inset 0 1px 0 rgba(255,255,255,.05)}
h1{font-size:34px;font-weight:800;background:linear-gradient(135deg,#00e5ff,#7c4dff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:3px;margin-bottom:6px}
h2{font-size:18px;color:#00e5ff;font-weight:600;margin-bottom:14px;letter-spacing:1px}
.sub{color:#667;font-size:11px;margin-bottom:20px}
.key{display:inline-block;background:rgba(0,229,255,.15);border:1px solid rgba(0,229,255,.4);border-radius:6px;padding:2px 10px;color:#00e5ff;font-weight:700;font-size:13px;margin:0 2px}
.btn{display:inline-block;padding:10px 28px;border:1px solid rgba(124,77,255,.5);border-radius:8px;background:rgba(124,77,255,.15);color:#b388ff;font-weight:700;font-size:14px;cursor:pointer;transition:all .2s;margin:4px;letter-spacing:1px}
.btn:hover{background:rgba(124,77,255,.3);border-color:#7c4dff;box-shadow:0 0 15px rgba(124,77,255,.3)}
.btn.cyan{border-color:rgba(0,229,255,.5);background:rgba(0,229,255,.15);color:#00e5ff}
.btn.cyan:hover{background:rgba(0,229,255,.3);box-shadow:0 0 15px rgba(0,229,255,.3)}
.level-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin:14px 0;max-width:420px}
.level-btn{position:relative;width:70px;height:70px;border-radius:10px;border:1px solid rgba(0,229,255,.2);background:rgba(0,229,255,.05);color:#00e5ff;font-weight:700;font-size:18px;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;justify-content:center}
.level-btn:hover:not(.locked){background:rgba(0,229,255,.15);border-color:#00e5ff;transform:scale(1.05)}
.level-btn.locked{opacity:.3;cursor:not-allowed;border-color:rgba(255,255,255,.1)}
.level-btn.completed{border-color:rgba(0,255,136,.4);background:rgba(0,255,136,.08)}
.level-btn.completed .lv-icon{color:#00ff88}
.level-btn.hard{border-color:rgba(255,23,68,.2);background:rgba(255,23,68,.05)}
.level-btn.hard:hover:not(.locked){background:rgba(255,23,68,.15);border-color:#ff1744}
.level-btn.hard.completed{border-color:rgba(255,23,68,.5);background:rgba(255,23,68,.1)}
.lv-num{font-size:10px;color:#667;margin-top:2px}
.lv-icon{font-size:20px}
.lv-time{font-size:9px;color:#556;margin-top:2px}
.section-label{grid-column:1/-1;font-size:11px;color:#556;text-transform:uppercase;letter-spacing:3px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.05);text-align:left}
.stats{display:flex;gap:20px;justify-content:center;margin:14px 0}
.stat{text-align:center}
.stat-val{font-size:22px;font-weight:700;color:#00e5ff}
.stat-label{font-size:10px;color:#667;text-transform:uppercase;letter-spacing:1px}
.hud{position:absolute;top:10px;left:0;right:0;display:flex;justify-content:space-between;padding:0 14px;z-index:5;pointer-events:none}
.hud-item{background:rgba(10,15,30,.8);border:1px solid rgba(0,229,255,.15);border-radius:8px;padding:3px 10px;font-size:11px;font-weight:600;backdrop-filter:blur(10px)}
.hud-item span{color:#00e5ff}
.progress-bar{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:200px;height:4px;background:rgba(255,255,255,.1);border-radius:2px;z-index:5}
.progress-fill{height:100%;background:linear-gradient(90deg,#00e5ff,#7c4dff);border-radius:2px;transition:width .3s}
.social-share{margin-top:18px;padding-top:14px;border-top:1px solid rgba(255,255,255,0.1)}
.share-btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:10px}
.sbtn{padding:8px 16px;border:1px solid rgba(0,229,255,0.3);background:rgba(0,229,255,0.08);color:#00e5ff;font-size:12px;font-family:inherit;cursor:pointer;border-radius:4px;transition:all .2s}
.sbtn:hover{background:rgba(0,229,255,0.2);border-color:#00e5ff;box-shadow:0 0 12px rgba(0,229,255,0.3)}
.sbtn-tw:hover{border-color:#1da1f2;color:#1da1f2}
.sbtn-fb:hover{border-color:#4267B2;color:#4267B2}
.sbtn-wa:hover{border-color:#25D366;color:#25D366}
.sbtn-copy:hover{border-color:#ff0;color:#ff0}
</style>
</head>
<body>

<div class="screen glass" id="menuScreen">
<h1>GEOMETRY DASH</h1>
<p class="sub">ZICORE Aerospace Simulation</p>
<p style="color:#888;font-size:13px;margin-bottom:18px">Press <span class="key">SPACE</span> / <span class="key">CLICK</span> / <span class="key">TAP</span> to jump</p>
<div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
<div class="btn cyan" onclick="showLevels()">PLAY</div>
<div class="btn" onclick="showStats()">STATS</div>
</div>
</div>

<div class="screen glass" id="levelScreen" style="display:none">
<h2>SELECT LEVEL</h2>
<div class="level-grid" id="levelGrid"></div>
<div class="btn" onclick="showMenu()" style="margin-top:8px">BACK</div>
</div>

<div class="screen glass" id="gameOverScreen" style="display:none">
<h1 style="font-size:30px">CRASHED</h1>
<div class="stats">
<div class="stat"><div class="stat-val" id="goProgress">0%</div><div class="stat-label">Progress</div></div>
<div class="stat"><div class="stat-val" id="goAttempts">0</div><div class="stat-label">Attempts</div></div>
<div class="stat"><div class="stat-val" id="goBest">0%</div><div class="stat-label">Best</div></div>
</div>
<p id="unlockMsg" style="color:#00ff88;font-size:13px;margin:8px 0"></p>
<div style="display:flex;gap:10px;justify-content:center">
<div class="btn cyan" onclick="retryLevel()">RETRY</div>
<div class="btn" onclick="showLevels()">LEVELS</div>
</div>
<div class="social-share">
<div style="font-size:11px;color:#667;margin-bottom:6px">SHARE</div>
<div class="share-btns">
<button class="sbtn sbtn-tw" onclick="shareGame('twitter','Geometry Dash',currentProgress)">X / Twitter</button>
<button class="sbtn sbtn-fb" onclick="shareGame('facebook','Geometry Dash',currentProgress)">Facebook</button>
<button class="sbtn sbtn-wa" onclick="shareGame('whatsapp','Geometry Dash',currentProgress)">WhatsApp</button>
<button class="sbtn sbtn-copy" onclick="shareGame('copy','Geometry Dash',currentProgress)">Copy Link</button>
</div>
</div>
</div>

<div class="screen glass" id="winScreen" style="display:none">
<h1 style="color:#00ff88;font-size:28px">LEVEL COMPLETE</h1>
<div class="stats">
<div class="stat"><div class="stat-val" id="winTime">0.0s</div><div class="stat-label">Time</div></div>
<div class="stat"><div class="stat-val" id="winAttempts">0</div><div class="stat-label">Attempts</div></div>
</div>
<p id="winUnlock" style="color:#7c4dff;font-size:13px;margin:8px 0"></p>
<div style="display:flex;gap:10px;justify-content:center">
<div class="btn cyan" onclick="nextLevel()">NEXT LEVEL</div>
<div class="btn" onclick="showLevels()">LEVELS</div>
</div>
</div>

<div class="screen glass" id="statsScreen" style="display:none">
<h2>STATISTICS</h2>
<div id="statsContent" style="text-align:left;font-size:13px;color:#aaa;line-height:2"></div>
<div class="btn" onclick="showMenu()" style="margin-top:16px">BACK</div>
</div>

<div class="hud" id="hud" style="display:none">
<div class="hud-item">LVL <span id="hudLevel">1</span></div>
<div class="hud-item"><span id="hudProgress">0%</span></div>
<div class="hud-item">ATTEMPTS <span id="hudAttempts">0</span></div>
<div class="hud-item"><span id="hudTime">0.0s</span></div>
</div>
<div class="progress-bar" id="progressBar" style="display:none"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
<canvas id="game"></canvas>

<script>
const canvas=document.getElementById('game'),ctx=canvas.getContext('2d');
let W,H,GROUND;

function resizeCanvas(){
  W=Math.min(800,window.innerWidth);
  H=Math.min(420,window.innerHeight-20);
  canvas.width=W;canvas.height=H;
  GROUND=H-60;
}
resizeCanvas();
window.addEventListener('resize',resizeCanvas);

const TOTAL=20;
const THEMES=[
  {bg:'#0a0f1a',ground:'#0d1520',accent:'#00e5ff',glow:'#00e5ff',name:'Dawn'},
  {bg:'#0f0a1a',ground:'#15102a',accent:'#7c4dff',glow:'#7c4dff',name:'Nebula'},
  {bg:'#1a0808',ground:'#200d0d',accent:'#ff1744',glow:'#ff1744',name:'Mars Core'},
  {bg:'#081a08',ground:'#0d200d',accent:'#00ff88',glow:'#00ff88',name:'Verdant'},
  {bg:'#1a1a08',ground:'#20200d',accent:'#ffea00',glow:'#ffea00',name:'Solar Flare'},
  {bg:'#08081a',ground:'#0d0d20',accent:'#448aff',glow:'#448aff',name:'Deep Blue'},
  {bg:'#1a0f08',ground:'#20150d',accent:'#ff9100',glow:'#ff9100',name:'Amber'},
  {bg:'#0f081a',ground:'#150d20',accent:'#e040fb',glow:'#e040fb',name:'Ultraviolet'},
  {bg:'#081a1a',ground:'#0d2020',accent:'#18ffff',glow:'#18ffff',name:'Cyan Storm'},
  {bg:'#1a1a1a',ground:'#202020',accent:'#bbbbbb',glow:'#eeeeee',name:'Void'},
  {bg:'#200008',ground:'#2a000d',accent:'#ff1744',glow:'#ff3d00',name:'Hellfire'},
  {bg:'#100020',ground:'#180030',accent:'#d500f9',glow:'#d500f9',name:'Dark Matter'},
  {bg:'#001a0a',ground:'#002a10',accent:'#00e676',glow:'#00e676',name:'Toxic'},
  {bg:'#000a1a',ground:'#00142a',accent:'#2979ff',glow:'#2979ff',name:'Abyss'},
  {bg:'#1a1000',ground:'#2a1a00',accent:'#ffc400',glow:'#ffc400',name:'Supernova'},
  {bg:'#200000',ground:'#300005',accent:'#ff1744',glow:'#ff3d00',name:'Inferno X'},
  {bg:'#050520',ground:'#0a0a30',accent:'#651fff',glow:'#651fff',name:'Quantum'},
  {bg:'#051a05',ground:'#0a2a0a',accent:'#76ff03',glow:'#76ff03',name:'Chaos Green'},
  {bg:'#1a0a1a',ground:'#2a0f2a',accent:'#ff80ab',glow:'#ff80ab',name:'Neon Pulse'},
  {bg:'#0c0c0c',ground:'#181818',accent:'#ffffff',glow:'#ffffff',name:'Event Horizon'}
];

let progress=JSON.parse(localStorage.getItem('gd_progress')||'{}');
function save(){localStorage.setItem('gd_progress',JSON.stringify(progress))}
function getLv(i){if(!progress[i])progress[i]={unlocked:i===1,completed:false,bestTime:null,attempts:0};return progress[i]}
function completeLv(i,t){const d=getLv(i);d.completed=true;d.attempts=S.attempts;if(!d.bestTime||t<d.bestTime)d.bestTime=t;if(i<20)getLv(i+1).unlocked=true;save()}
function totalAttempts(){let t=0;for(let i=1;i<=20;i++)t+=(progress[i]||{}).attempts||0;return t}
function totalComplete(){let t=0;for(let i=1;i<=20;i++)if((progress[i]||{}).completed)t++;return t}
function isHard(i){return i>10}

const S={screen:'menu',playing:false,dead:false,won:false,currentLevel:1,cube:null,obstacles:[],particles:[],bgStars:[],time:0,attempts:0,scrollX:0,speed:4,levelLen:0,deathFlash:0,gravityDir:1,titleShapes:[]};

function initTitleShapes(){
  S.titleShapes=[];
  for(let i=0;i<12;i++){
    S.titleShapes.push({
      x:Math.random()*600-50,y:Math.random()*300-50,
      vx:(Math.random()-0.5)*0.6,vy:(Math.random()-0.5)*0.4,
      sz:8+Math.random()*18,rot:Math.random()*Math.PI*2,
      rotSpd:(Math.random()-0.5)*0.03,
      color:['#00e5ff','#7c4dff','#00ff88','#ff1744'][Math.floor(Math.random()*4)],
      alpha:0.1+Math.random()*0.25,
      type:Math.floor(Math.random()*3)
    });
  }
}
initTitleShapes();

function showMenu(){S.screen='menu';hideAll();document.getElementById('menuScreen').style.display='';raf()}
function showLevels(){
  S.screen='levels';hideAll();document.getElementById('levelScreen').style.display='';
  const g=document.getElementById('levelGrid');g.innerHTML='';
  const nl=document.createElement('div');nl.className='section-label';nl.textContent='Normal Mode (1-10)';g.appendChild(nl);
  for(let i=1;i<=10;i++)g.appendChild(makeLvlBtn(i));
  const hl=document.createElement('div');hl.className='section-label';hl.textContent='Hard Mode (11-20)';g.appendChild(hl);
  for(let i=11;i<=20;i++)g.appendChild(makeLvlBtn(i));
}
function makeLvlBtn(i){
  const d=getLv(i);const el=document.createElement('div');
  el.className='level-btn'+(d.completed?' completed':'')+(isHard(i)?' hard':'')+(!d.unlocked?' locked':'');
  el.innerHTML=`<div class="lv-icon">${d.completed?'\u2713':d.unlocked?(isHard(i)?'\u26A1':'\u25B6'):'\uD83D\uDD12'}</div><div class="lv-num">${i}</div><div class="lv-time">${d.bestTime?d.bestTime.toFixed(1)+'s':d.unlocked?'\u2014':'\u2014'}</div>`;
  if(d.unlocked)el.onclick=()=>startLevel(i);
  return el;
}
function hideAll(){
  ['menuScreen','levelScreen','gameOverScreen','winScreen','statsScreen'].forEach(id=>document.getElementById(id).style.display='none');
  document.getElementById('hud').style.display='none';
  document.getElementById('progressBar').style.display='none';
  canvas.style.display='none';
}
function showStats(){
  S.screen='stats';hideAll();document.getElementById('statsScreen').style.display='';
  let h=`<div>Total Completed: <span style="color:#00e5ff">${totalComplete()}/20</span></div>`;
  h+=`<div>Total Attempts: <span style="color:#ff9100">${totalAttempts()}</span></div><div style="margin-top:10px">`;
  for(let i=1;i<=20;i++){const d=getLv(i);if(d.completed)h+=`<div>Lv${i} ${THEMES[i-1].name}: <span style="color:#00ff88">${d.bestTime?d.bestTime.toFixed(1)+'s':'\u2014'}</span></div>`}
  h+=`</div>`;document.getElementById('statsContent').innerHTML=h;
}

function genLevel(lv){
  const hard=isHard(lv);const obs=[];let x=350;
  const len=2200+lv*120;
  const gap=()=>(hard?80:130)+Math.random()*(hard?60:100);

  while(x<len){
    const r=Math.random();
    if(r<0.28){
      const h=20+Math.random()*(hard?45:30);
      obs.push({type:'spike',x,w:24+Math.min(lv,5),h});
      x+=gap();
    }else if(r<0.48){
      const h=25+Math.random()*(hard?50:30);const w=35+Math.random()*(hard?30:55);
      obs.push({type:'block',x,w,h});
      x+=w+gap()*0.5;
    }else if(r<0.58&&lv>=2){
      const gapW=40+Math.random()*(hard?30:20);
      obs.push({type:'gap',x,w:gapW,h:60});
      x+=gapW+gap()*0.6;
    }else if(r<0.66&&lv>=3){
      const h=22+Math.random()*20;
      obs.push({type:'spike',x,w:20,h});
      obs.push({type:'spike',x:x+30,w:20,h:h*0.8});
      x+=60+gap()*0.4;
    }else if(r<0.72&&lv>=4){
      const h=28+Math.random()*18;
      obs.push({type:'block',x,w:30,h:h*0.6});
      obs.push({type:'spike',x:x+34,w:20,h});
      x+=64+gap()*0.4;
    }else if(r<0.78&&hard&&lv>=11){
      obs.push({type:'spike',x,w:22,h:30+Math.random()*25});
      obs.push({type:'block',x:x+30,w:28,h:20+Math.random()*20});
      obs.push({type:'spike',x:x+64,w:22,h:35+Math.random()*20});
      x+=96+gap()*0.35;
    }else if(r<0.84&&hard&&lv>=12){
      obs.push({type:'portal',x,w:28,h:40});
      x+=gap()*1.2;
    }else if(r<0.89&&hard&&lv>=14){
      const gapW=50+Math.random()*25;
      obs.push({type:'gap',x,w:gapW,h:60});
      obs.push({type:'spike',x:x+gapW+10,w:20,h:25});
      x+=gapW+40+gap()*0.4;
    }else if(r<0.93&&hard&&lv>=16){
      obs.push({type:'moving_block',x,w:60,h:14,y:GROUND-50,amp:20,spd:0.003+Math.random()*0.002});
      x+=gap()*1.3;
    }else if(r<0.96&&lv>=6){
      const count=3+Math.floor(Math.random()*3);
      for(let s=0;s<count;s++)obs.push({type:'spike',x:x+s*28,w:20,h:16+Math.random()*14});
      x+=count*28+gap()*0.5;
    }else{
      x+=gap();
    }
  }
  return{obstacles:obs,length:len,speed:3+lv*0.22+(hard?0.7:0)};
}

function initLevel(){
  const lv=S.currentLevel;const d=genLevel(lv);
  S.playing=true;S.dead=false;S.won=false;S.time=0;S.deathFlash=0;
  S.attempts=getLv(lv).attempts||0;
  S.scrollX=0;S.speed=d.speed;S.levelLen=d.length;
  S.gravityDir=1;
  S.cube={x:80,y:GROUND-20,vy:0,w:20,rot:0,grounded:true};
  S.obstacles=d.obstacles.map(o=>({...o,triggered:false}));
  S.particles=[];
  S.bgStars=[];
  for(let i=0;i<60;i++)S.bgStars.push({x:Math.random()*3000,y:Math.random()*GROUND,s:0.5+Math.random()*1.8,spd:0.08+Math.random()*0.5,b:0.3+Math.random()*0.7});
  canvas.style.display='block';
  document.getElementById('hud').style.display='flex';
  document.getElementById('progressBar').style.display='block';
  document.getElementById('hudLevel').textContent=lv+(isHard(lv)?' H':'');
}
function startLevel(i){S.currentLevel=i;hideAll();initLevel();raf()}
function retryLevel(){hideAll();initLevel();raf()}
function nextLevel(){if(S.currentLevel<20)startLevel(S.currentLevel+1);else showLevels()}

function jump(){
  if(!S.playing||S.dead)return;
  const c=S.cube;
  if(c.grounded){
    c.vy=-14*S.gravityDir;c.grounded=false;
    const th=THEMES[S.currentLevel-1];
    for(let i=0;i<6;i++)S.particles.push({x:c.x+c.w/2,y:c.y+c.w,vx:(Math.random()-0.5)*4,vy:S.gravityDir*(1+Math.random()*3),sz:2+Math.random()*3,life:1,color:th.accent});
  }
}

function die(){
  if(S.dead)return;S.dead=true;S.deathFlash=1;S.attempts++;
  const d=getLv(S.currentLevel);d.attempts=S.attempts;save();
  const c=S.cube;const th=THEMES[S.currentLevel-1];
  for(let i=0;i<35;i++){
    const a=Math.random()*Math.PI*2;const sp=2+Math.random()*8;
    S.particles.push({x:c.x+Math.random()*c.w,y:c.y+Math.random()*c.w,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,sz:2+Math.random()*6,life:1,color:th.accent});
  }
  setTimeout(()=>{if(S.dead)showGameOver()},600);
}
function showGameOver(){
  S.playing=false;
  const pct=Math.min(100,Math.floor((S.scrollX/S.levelLen)*100));
  document.getElementById('goProgress').textContent=pct+'%';
  document.getElementById('goAttempts').textContent=S.attempts;
  document.getElementById('goBest').textContent=(getLv(S.currentLevel).bestTime?getLv(S.currentLevel).bestTime.toFixed(1)+'s':'\u2014');
  document.getElementById('unlockMsg').textContent='';
  hideAll();document.getElementById('gameOverScreen').style.display='';
}
function win(){
  if(S.won)return;S.won=true;
  completeLv(S.currentLevel,S.time);
  document.getElementById('winTime').textContent=S.time.toFixed(1)+'s';
  document.getElementById('winAttempts').textContent=S.attempts;
  document.getElementById('winUnlock').textContent=S.currentLevel<20?`Unlocked: Level ${S.currentLevel+1} \u2014 ${THEMES[S.currentLevel].name}`:'All 20 levels complete!';
  setTimeout(()=>{S.playing=false;hideAll();document.getElementById('winScreen').style.display=''},400);
}

let rafId=null;
function raf(){if(rafId)cancelAnimationFrame(rafId);rafId=requestAnimationFrame(loop)}
let lastT=0;
function loop(ts){
  if(!lastT)lastT=ts;
  const raw=(ts-lastT)/16.667;lastT=ts;
  const dt=Math.min(raw,3);
  if(S.screen==='menu'||S.screen==='levels'||S.screen==='stats')renderMenu(ts);
  else{update(dt);render();}
  rafId=requestAnimationFrame(loop);
}

function update(dt){
  const c=S.cube;if(!c)return;
  S.time+=dt*0.0167;
  if(S.deathFlash>0)S.deathFlash=Math.max(0,S.deathFlash-dt*0.04);

  const gDir=S.gravityDir;
  c.vy+=0.72*gDir*dt;
  c.vy=Math.max(-16,Math.min(16,c.vy));
  c.y+=c.vy*dt;
  if(!c.grounded)c.rot+=0.18*dt*gDir;

  const floorY=GROUND-c.w;
  const ceilY=0;
  if(c.y>=floorY){c.y=floorY;c.vy=0;c.grounded=true;}
  if(c.y<=ceilY){c.y=ceilY;c.vy=0;c.grounded=true;}
  if(gDir<0&&c.y>=floorY){c.grounded=true;}
  if(gDir>0&&c.y<=ceilY){c.grounded=true;}

  S.scrollX+=S.speed*dt;

  for(const o of S.obstacles){
    const ox=o.x-S.scrollX;
    if(ox<-150||ox>W+150)continue;

    if(o.type==='spike'){
      const sTop=GROUND-o.h;
      const sBot=GROUND;
      const cL=c.x,cR=c.x+c.w,cT=c.y,cB=c.y+c.w;
      const sL=ox+o.w*0.15,sR=ox+o.w*0.85;
      if(cR>sL+2&&cL<sR-2&&cB>sTop+6){
        die();return;
      }
    }else if(o.type==='block'){
      const bTop=GROUND-o.h;
      const bBot=GROUND;
      const bL=ox,bR=ox+o.w;
      const cL=c.x,cR=c.x+c.w,cT=c.y,cB=c.y+c.w;
      if(cR>bL+2&&cL<bR-2&&cB>bTop+2&&cT<bBot-2){
        if(c.vy*gDir>0&&cB-o.vy*dt*gDir<=bTop+10){
          c.y=bTop-c.w;c.vy=0;c.grounded=true;
        }else{
          die();return;
        }
      }
    }else if(o.type==='gap'){
      const gL=ox,gR=ox+o.w;
      const cMidX=c.x+c.w/2;
      if(cMidX>gL+4&&cMidX<gR-4&&!c.grounded){
      }else if(c.grounded&&cMidX>gL-4&&c.x+c.w>gL&&c.x<gR){
        c.grounded=false;
      }
    }else if(o.type==='moving_block'){
      const py=o.y+Math.sin(S.time*1000*o.spd)*o.amp;
      const mbL=ox,mbR=ox+o.w,mbT=py,mbB=py+o.h;
      const cL=c.x,cR=c.x+c.w,cT=c.y,cB=c.y+c.w;
      if(cR>mbL+2&&cL<mbR-2&&cB>mbT-2&&cT<mbB+2){
        if(c.vy*gDir>0&&cB-o.vy*dt*gDir<=mbT+8){
          c.y=mbT-c.w;c.vy=0;c.grounded=true;
        }else{
          die();return;
        }
      }
    }
  }

  for(const o of S.obstacles){
    const ox=o.x-S.scrollX;
    if(o.type==='portal'&&!o.triggered&&ox<c.x+c.w&&ox+o.w>c.x){
      o.triggered=true;S.gravityDir*=-1;c.vy=S.gravityDir*8;c.grounded=false;
      const th=THEMES[S.currentLevel-1];
      for(let i=0;i<12;i++)S.particles.push({x:c.x,y:c.y+c.w/2,vx:(Math.random()-0.5)*6,vy:(Math.random()-0.5)*6,sz:2+Math.random()*5,life:1,color:'#d500f9'});
    }
  }

  document.getElementById('hudProgress').textContent=Math.min(100,Math.floor((S.scrollX/S.levelLen)*100))+'%';
  document.getElementById('hudAttempts').textContent=S.attempts;
  document.getElementById('hudTime').textContent=S.time.toFixed(1)+'s';
  document.getElementById('progressFill').style.width=Math.min(100,(S.scrollX/S.levelLen)*100)+'%';
  if(S.scrollX>=S.levelLen&&!S.won)win();

  for(const p of S.particles){p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=0.025*dt;p.sz*=0.98;}
  S.particles=S.particles.filter(p=>p.life>0);

  if(S.dead){
    for(const p of S.particles){p.x+=p.vx*dt*0.3;p.y+=p.vy*dt*0.3;}
  }
}

function renderMenu(ts){
  ctx.fillStyle='#04060c';ctx.fillRect(0,0,W,H);
  const t=ts*0.001;
  for(let i=0;i<80;i++){
    const sx=((i*73.7+t*5*(0.3+i*0.01))%W+W)%W;
    const sy=(i*47.3+t*2*(0.2+i*0.005))%H;
    const flicker=0.2+0.3*Math.sin(t*2+i);
    ctx.fillStyle=`rgba(255,255,255,${flicker})`;
    ctx.fillRect(sx,sy,1,1);
  }
  for(const s of S.titleShapes){
    s.x+=s.vx;s.y+=s.vy;s.rot+=s.rotSpd;
    if(s.x<-60)s.x=W+50;if(s.x>W+60)s.x=-50;
    if(s.y<-60)s.y=H+50;if(s.y>H+60)s.y=-50;
    ctx.save();ctx.translate(s.x,s.y);ctx.rotate(s.rot);
    ctx.globalAlpha=s.alpha;ctx.fillStyle=s.color;
    ctx.shadowColor=s.color;ctx.shadowBlur=12;
    if(s.type===0){ctx.fillRect(-s.sz/2,-s.sz/2,s.sz,s.sz);}
    else if(s.type===1){ctx.beginPath();ctx.arc(0,0,s.sz/2,0,Math.PI*2);ctx.fill();}
    else{ctx.beginPath();ctx.moveTo(0,-s.sz/2);ctx.lineTo(s.sz/2,s.sz/2);ctx.lineTo(-s.sz/2,s.sz/2);ctx.closePath();ctx.fill();}
    ctx.shadowBlur=0;ctx.globalAlpha=1;ctx.restore();
  }
}

function render(){
  const th=THEMES[S.currentLevel-1];
  ctx.fillStyle=th.bg;ctx.fillRect(0,0,W,H);

  for(const s of S.bgStars){
    const sx=((s.x-S.scrollX*s.spd*0.08)%W+W)%W;
    const flicker=s.b*(0.6+0.4*Math.sin(S.time*2+s.x*0.1));
    ctx.fillStyle=`rgba(255,255,255,${flicker})`;
    ctx.fillRect(sx,s.y,s.s,s.s);
  }

  for(const o of S.obstacles){
    const ox=o.x-S.scrollX;
    if(ox<-100||ox>W+100)continue;
    ctx.save();
    if(o.type==='spike'){
      ctx.fillStyle=th.accent;ctx.shadowColor=th.glow;ctx.shadowBlur=10;
      ctx.beginPath();ctx.moveTo(ox,GROUND);ctx.lineTo(ox+o.w/2,GROUND-o.h);ctx.lineTo(ox+o.w,GROUND);ctx.closePath();ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.1)';ctx.fill();
      ctx.shadowBlur=0;
    }else if(o.type==='block'){
      ctx.fillStyle=th.ground;ctx.fillRect(ox,GROUND-o.h,o.w,o.h);
      ctx.strokeStyle=th.accent;ctx.lineWidth=1.5;ctx.shadowColor=th.glow;ctx.shadowBlur=8;
      ctx.strokeRect(ox,GROUND-o.h,o.w,o.h);
      ctx.fillStyle='rgba(255,255,255,0.06)';ctx.fillRect(ox,GROUND-o.h,o.w,3);
      ctx.shadowBlur=0;
    }else if(o.type==='gap'){
      ctx.fillStyle='rgba(0,0,0,0.6)';
      ctx.fillRect(ox,GROUND,o.w,H-GROUND);
      ctx.strokeStyle='rgba(255,23,68,0.5)';ctx.lineWidth=1;ctx.setLineDash([4,4]);
      ctx.beginPath();ctx.moveTo(ox,GROUND);ctx.lineTo(ox,GROUND+20);ctx.stroke();
      ctx.beginPath();ctx.moveTo(ox+o.w,GROUND);ctx.lineTo(ox+o.w,GROUND+20);ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle='rgba(255,23,68,0.15)';ctx.fillRect(ox,GROUND,o.w,H-GROUND);
    }else if(o.type==='portal'){
      const pulse=0.4+0.6*Math.abs(Math.sin(S.time*4));
      const cy=GROUND-o.h/2;
      ctx.fillStyle=`rgba(213,0,249,${0.15+pulse*0.3})`;
      ctx.shadowColor='#d500f9';ctx.shadowBlur=15;
      ctx.beginPath();ctx.ellipse(ox+o.w/2,cy,o.w/2,o.h/2,0,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle=`rgba(213,0,249,${0.5+pulse*0.5})`;ctx.lineWidth=2;
      ctx.beginPath();ctx.ellipse(ox+o.w/2,cy,o.w/2,o.h/2,0,0,Math.PI*2);ctx.stroke();
      ctx.fillStyle='#fff';ctx.font='bold 14px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('\u21BB',ox+o.w/2,cy);
      ctx.shadowBlur=0;
    }else if(o.type==='moving_block'){
      const py=o.y+Math.sin(S.time*1000*o.spd)*o.amp;
      ctx.fillStyle=th.accent;ctx.globalAlpha=0.7;ctx.fillRect(ox,py,o.w,o.h);ctx.globalAlpha=1;
      ctx.strokeStyle=th.accent;ctx.lineWidth=1.5;ctx.shadowColor=th.glow;ctx.shadowBlur=8;
      ctx.strokeRect(ox,py,o.w,o.h);
      ctx.shadowBlur=0;
    }
    ctx.restore();
  }

  const c=S.cube;
  if(c){
    ctx.save();
    ctx.translate(c.x+c.w/2,c.y+c.w/2);
    ctx.rotate(c.rot);
    ctx.shadowColor=th.glow;ctx.shadowBlur=20;
    ctx.fillStyle=th.accent;
    ctx.fillRect(-c.w/2,-c.w/2,c.w,c.w);
    ctx.shadowBlur=0;
    ctx.fillStyle='rgba(255,255,255,0.3)';ctx.fillRect(-c.w/2+2,-c.w/2+2,c.w-4,3);
    ctx.fillStyle='rgba(255,255,255,0.15)';ctx.fillRect(-c.w/2+2,-c.w/2+2,3,c.w-4);
    ctx.fillStyle='#fff';ctx.fillRect(-2,-2,4,4);
    ctx.restore();
  }

  for(const p of S.particles){
    ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle=p.color;
    ctx.fillRect(p.x-p.sz/2,p.y-p.sz/2,p.sz,p.sz);
  }
  ctx.globalAlpha=1;

  for(let gx=0;gx<W;gx+=40){
    const drawX=((gx-S.scrollX*0.5)%W+W)%W;
    ctx.fillStyle='rgba(255,255,255,0.03)';
    ctx.fillRect(drawX,GROUND+1,1,H-GROUND-1);
  }

  ctx.fillStyle=th.ground;ctx.fillRect(0,GROUND,W,H-GROUND);
  ctx.strokeStyle=th.accent;ctx.lineWidth=2;ctx.shadowColor=th.glow;ctx.shadowBlur=6;
  ctx.beginPath();ctx.moveTo(0,GROUND);ctx.lineTo(W,GROUND);ctx.stroke();
  ctx.shadowBlur=0;

  const gs=40;const go=S.scrollX%gs;
  ctx.strokeStyle='rgba(255,255,255,0.04)';ctx.lineWidth=1;
  for(let x=-go;x<=W;x+=gs){ctx.beginPath();ctx.moveTo(x,GROUND);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=GROUND;y<H;y+=gs){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

  if(S.dead&&S.deathFlash>0){
    ctx.fillStyle=`rgba(255,23,68,${S.deathFlash*0.25})`;ctx.fillRect(0,0,W,H);
  }
  if(S.dead){
    ctx.fillStyle='rgba(255,23,68,0.85)';ctx.font='bold 36px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('CRASHED',W/2,H/2);
  }
}

document.addEventListener('keydown',e=>{
  if(e.key===' '||e.key==='ArrowUp'||e.key==='w'||e.key==='W'){e.preventDefault();jump();}
});
canvas.addEventListener('click',jump);
canvas.addEventListener('touchstart',e=>{e.preventDefault();jump()});
resizeCanvas();showMenu();

function shareGame(platform,gameName,score){
  const text='I reached '+score+'% in '+gameName+' on ZICORE! Can you beat my progress? 🚀 https://zcs.zicore.space/games';
  const url='https://zcs.zicore.space/games';
  if(platform==='twitter')window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent(text),'_blank');
  else if(platform==='facebook')window.open('https://www.facebook.com/sharer/sharer.php?u='+encodeURIComponent(url)+'&quote='+encodeURIComponent(text),'_blank');
  else if(platform==='whatsapp')window.open('https://wa.me/?text='+encodeURIComponent(text),'_blank');
  else if(platform==='copy'){navigator.clipboard.writeText(text).then(()=>alert('Link copiado al portapapeles!'));}
}
