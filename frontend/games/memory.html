<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZICORE Memory</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#04060c;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'Courier New',monospace;color:#e0e0e0;overflow:hidden;user-select:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
@keyframes fadeIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
@keyframes flipIn{0%{transform:rotateY(0)}100%{transform:rotateY(90deg)}}
@keyframes flipOut{0%{transform:rotateY(90deg)}100%{transform:rotateY(0)}}
@keyframes matchPop{0%{transform:scale(1)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
.screen{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:10;display:none;animation:fadeIn .4s ease}
.screen.active{display:block}
#startScreen h1{font-size:42px;color:#7c4dff;text-shadow:0 0 30px rgba(124,77,255,.5),0 0 60px rgba(124,77,255,.2);margin-bottom:4px;letter-spacing:6px}
#startScreen .tagline{font-size:11px;color:#00e5ff;margin-bottom:28px;letter-spacing:3px}
#startScreen .controls{color:#556;font-size:11px;line-height:2}
#startScreen .controls span{color:#00e5ff}
.start-hint{color:#ffeb3b;font-size:13px;letter-spacing:2px;animation:pulse 2s infinite;margin-top:20px}
#levelComplete .lc-title{font-size:32px;color:#00ff88;text-shadow:0 0 30px rgba(0,255,136,.5);margin-bottom:10px}
#levelComplete .lc-info{font-size:14px;color:#ffeb3b;margin-bottom:4px}
#levelComplete .lc-detail{font-size:11px;color:#7c4dff;margin-bottom:20px}
.btn{padding:10px 28px;border:2px solid #00e5ff;background:transparent;color:#00e5ff;font-size:13px;font-family:inherit;cursor:pointer;border-radius:6px;letter-spacing:2px;transition:all .2s}
.btn:hover{background:#00e5ff22;box-shadow:0 0 15px rgba(0,229,255,.3)}
#gameWrap{display:none;flex-direction:column;align-items:center;gap:12px}
#gameWrap.active{display:flex}
#hud{display:flex;gap:12px;font-size:11px;letter-spacing:1px}
#hud>div{padding:4px 10px;background:#080e18;border:1px solid #0e1a2a;border-radius:4px}
#hud .level{color:#7c4dff}
#hud .moves{color:#ffeb3b}
#hud .timer{color:#00e5ff}
#hud .pairs{color:#00ff88}
#board{display:grid;gap:8px;padding:10px}
.card{width:64px;height:64px;border-radius:6px;cursor:pointer;position:relative;perspective:600px}
.card-inner{width:100%;height:100%;position:relative;transition:transform .3s;transform-style:preserve-3d}
.card.flipped .card-inner{transform:rotateY(180deg)}
.card-face{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:24px}
.card-back{background:#1a2a3a;border:2px solid #0e1a2a}
.card-front{background:#0a1828;border:2px solid #7c4dff;transform:rotateY(180deg)}
.card.matched .card-front{border-color:#00ff88;background:#0a2018;animation:matchPop .3s ease}
.card.matched{pointer-events:none}
.controls-help{position:fixed;bottom:12px;color:#334;font-size:10px;letter-spacing:1px}
.controls-help span{color:#00e5ff55}
</style>
</head>
<body>
<div id="startScreen" class="screen active">
  <h1>MEMORY</h1>
  <div class="tagline">ZICORE MATCH ENGINE</div>
  <div class="controls">
    <span>CLICK</span> cards to flip and match pairs<br>
    20 levels with increasing grid size
  </div>
  <button class="btn" onclick="startGame()">LAUNCH</button>
  <div class="start-hint">PRESS ENTER OR CLICK</div>
</div>
<div id="levelComplete" class="screen">
  <div class="lc-title">LEVEL COMPLETE</div>
  <div class="lc-info" id="lcInfo">LEVEL 1</div>
  <div class="lc-detail" id="lcDetail">MOVES: 0 | TIME: 0s</div>
  <button class="btn" onclick="nextLevel()">NEXT LEVEL</button>
</div>
<div id="gameWrap">
  <div id="hud">
    <div class="level">LVL: <span id="hudLevel">1</span></div>
    <div class="moves">MOVES: <span id="hudMoves">0</span></div>
    <div class="timer">TIME: <span id="hudTimer">0</span>s</div>
    <div class="pairs">PAIRS: <span id="hudPairs">0</span>/<span id="hudTotal">0</span></div>
  </div>
  <div id="board"></div>
</div>
<div class="controls-help"><span>CLICK</span> FLIP CARDS <span>MATCH ALL PAIRS</span></div>

<script>
const SYMBOLS=['🚀','🛰️','🌍','🌙','☀️','⭐','🛸','👨‍🚀','🌌','☄️','🔭','🪐','👽','🤖','🌌','⚡','💎','🔮','🎯','🎲','🎮','🃏','🎪','🎭'];
const LEVELS=[];
for(let i=0;i<20;i++){
  const cols=4+Math.floor(i/4);
  const rows=4+Math.floor(i/5);
  const pairs=Math.floor(cols*rows/2);
  LEVELS.push({cols,rows,pairs});
}

let level,grid,flipped,matched,moves,timer,timerInterval,animating,totalPairs;

function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}

function createBoard(){
  const lv=LEVELS[level-1];
  totalPairs=lv.pairs;
  const symbols=shuffle([...SYMBOLS]).slice(0,totalPairs);
  const cards=shuffle([...symbols,...symbols]);
  grid=[];
  const boardEl=document.getElementById('board');
  boardEl.innerHTML='';
  boardEl.style.gridTemplateColumns=`repeat(${lv.cols},64px)`;
  for(let r=0;r<lv.rows;r++){
    grid[r]=[];
    for(let c=0;c<lv.cols;c++){
      const idx=r*lv.cols+c;
      const card={symbol:cards[idx],flipped:false,matched:false};
      grid[r][c]=card;
      const div=document.createElement('div');
      div.className='card';
      div.dataset.r=r;div.dataset.c=c;
      div.innerHTML=`<div class="card-inner"><div class="card-face card-back">?</div><div class="card-face card-front">${card.symbol}</div></div>`;
      div.addEventListener('click',()=>flipCard(r,c,div));
      boardEl.appendChild(div);
    }
  }
}

function flipCard(r,c,el){
  if(animating)return;
  const card=grid[r][c];
  if(card.flipped||card.matched)return;
  if(flipped.length>=2)return;
  card.flipped=true;
  el.classList.add('flipped');
  flipped.push({r,c,el});
  if(flipped.length===2){
    moves++;
    updateHUD();
    const a=grid[flipped[0].r][flipped[0].c];
    const b=grid[flipped[1].r][flipped[1].c];
    if(a.symbol===b.symbol){
      a.matched=true;b.matched=true;
      animating=true;
      setTimeout(()=>{
        flipped[0].el.classList.add('matched');
        flipped[1].el.classList.add('matched');
        flipped=[];
        animating=false;
        updateHUD();
        checkWin();
      },400);
    }else{
      animating=true;
      setTimeout(()=>{
        a.flipped=false;b.flipped=false;
        flipped[0].el.classList.remove('flipped');
        flipped[1].el.classList.remove('flipped');
        flipped=[];
        animating=false;
      },800);
    }
  }
}

function checkWin(){
  const matched=grid.flat().filter(c=>c.matched).length/2;
  if(matched>=totalPairs){
    clearInterval(timerInterval);
    setTimeout(()=>{
      document.getElementById('lcInfo').textContent='LEVEL '+level;
      document.getElementById('lcDetail').textContent='MOVES: '+moves+' | TIME: '+timer+'s';
      document.getElementById('levelComplete').classList.add('active');
      document.getElementById('gameWrap').classList.remove('active');
    },500);
  }
}

function updateHUD(){
  document.getElementById('hudLevel').textContent=level;
  document.getElementById('hudMoves').textContent=moves;
  document.getElementById('hudPairs').textContent=grid.flat().filter(c=>c.matched).length/2;
  document.getElementById('hudTotal').textContent=totalPairs;
}

function startGame(){
  document.getElementById('startScreen').classList.remove('active');
  document.getElementById('levelComplete').classList.remove('active');
  document.getElementById('gameWrap').classList.add('active');
  level=1;startLevel();
}

function nextLevel(){
  document.getElementById('levelComplete').classList.remove('active');
  level=Math.min(level+1,20);
  startLevel();
}

function startLevel(){
  flipped=[];matched=0;moves=0;timer=0;animating=false;
  clearInterval(timerInterval);
  timerInterval=setInterval(()=>{timer++;document.getElementById('hudTimer').textContent=timer;},1000);
  createBoard();updateHUD();
}

document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!document.getElementById('gameWrap').classList.contains('active')){startGame();return;}
});
</script>
</body>
</html>
