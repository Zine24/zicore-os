<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ZICORE GAMES</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0e17;color:#e0e0e0;font-family:'Segoe UI',system-ui,sans-serif;overflow-x:hidden}
#topBar{display:flex;align-items:center;padding:8px 16px;background:#0d1117;border-bottom:1px solid #1a2332;gap:12px}
#topBar .logo{font-size:16px;color:#00e5ff;font-weight:bold}
#topBar .logo span{color:#7c4dff}
#topBar .subtitle{color:#888;font-size:11px}
.back-btn{background:#161b22;border:1px solid #30363d;color:#e0e0e0;padding:6px 12px;border-radius:6px;cursor:pointer;font-family:inherit;font-size:12px}
.back-btn:hover{border-color:#00e5ff;color:#00e5ff}
#container{display:flex;height:calc(100vh - 40px)}
#sidebar{width:280px;background:#0d1117;border-right:1px solid #1a2332;overflow-y:auto;padding:12px}
#main{flex:1;display:flex;flex-direction:column}
#gameFrame{flex:1;border:none;background:#000}
#scorePanel{width:300px;background:#0d1117;border-left:1px solid #1a2332;overflow-y:auto;padding:12px}
.section-title{color:#00e5ff;font-size:11px;font-weight:bold;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
.game-card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:10px;margin-bottom:8px;cursor:pointer;transition:all .2s}
.game-card:hover{border-color:#00e5ff;background:#1a2332}
.game-card.active{border-color:#00e5ff;background:#0d2938}
.game-card .name{font-size:13px;font-weight:bold;color:#e0e0e0}
.game-card .cat{font-size:10px;color:#888;text-transform:uppercase}
.game-card .icon{font-size:20px;float:right}
.score-row{display:flex;justify-content:space-between;align-items:center;padding:6px 8px;border-bottom:1px solid #1a2332;font-size:12px}
.score-row:hover{background:#161b22}
.rank{color:#00e5ff;font-weight:bold;width:24px}
.player{flex:1;color:#e0e0e0}
.score-val{color:#50fa7b;font-weight:bold}
.score-input{display:flex;gap:8px;margin-top:12px}
.score-input input{flex:1;background:#161b22;border:1px solid #30363d;color:#e0e0e0;padding:6px 10px;border-radius:6px;font-family:inherit;font-size:12px}
.score-input button{background:#00e5ff;border:none;color:#000;padding:6px 12px;border-radius:6px;cursor:pointer;font-weight:bold;font-size:12px}
.filter-btn{background:#161b22;border:1px solid #30363d;color:#888;padding:4px 8px;border-radius:4px;cursor:pointer;font-size:10px;margin-right:4px}
.filter-btn.active{border-color:#00e5ff;color:#00e5ff}
.tab-bar{display:flex;gap:4px;margin-bottom:12px}
</style>
</head>
<body>
<div id="topBar">
  <button class="back-btn" onclick="if(parent!==window&&parent.zicorePortal){parent.zicorePortal.back();}else if(parent!==window&&parent.showMenu){parent.showMenu();}else{window.location='/';}">&#9664; PORTAL</button>
  <div class="logo"><span>Z</span>ICORE GAMES</div>
  <div class="subtitle">17 HTML5 Games | Top 10 Leaderboard</div>
</div>
<div id="container">
  <div id="sidebar">
    <div class="section-title">GAMES</div>
    <div class="tab-bar">
      <button class="filter-btn active" onclick="filterGames('all',this)">ALL</button>
      <button class="filter-btn" onclick="filterGames('arcade',this)">ARCADE</button>
      <button class="filter-btn" onclick="filterGames('puzzle',this)">PUZZLE</button>
      <button class="filter-btn" onclick="filterGames('space',this)">SPACE</button>
    </div>
    <div id="gameList"></div>
  </div>
  <div id="main">
    <iframe id="gameFrame" src="about:blank"></iframe>
  </div>
  <div id="scorePanel">
    <div class="section-title">TOP 10 - <span id="scoreGameName">-</span></div>
    <div id="scoreList"></div>
    <div class="section-title" style="margin-top:16px">SUBMIT SCORE</div>
    <div class="score-input">
      <input id="playerName" placeholder="Your name" maxlength="20">
      <input id="scoreValue" type="number" placeholder="Score">
      <button onclick="submitScore()">SAVE</button>
    </div>
  </div>
</div>
<script>
// SSO Auth Check
(function(){
  var token=localStorage.getItem('zicore_sso_token');
  if(!token){window.location.href='/login?redirect='+encodeURIComponent(window.location.pathname);return;}
  fetch('/api/sso/me',{headers:{'Authorization':'Bearer '+token}}).then(function(r){
    if(!r.ok){localStorage.removeItem('zicore_sso_token');window.location.href='/login?redirect='+encodeURIComponent(window.location.pathname);}
  }).catch(function(){});
})();

var games=[],currentGame=null,allScores={};
function loadGames(){
  fetch('/api/games/catalog').then(function(r){return r.json();}).then(function(d){
    games=d.games||[];
    renderGames('all');
  });
}
function renderGames(cat){
  var list=document.getElementById('gameList');
  list.innerHTML='';
  games.forEach(function(g){
    if(cat!=='all'&&g.category!==cat)return;
    var div=document.createElement('div');
    div.className='game-card'+(currentGame&&currentGame.id===g.id?' active':'');
    div.innerHTML='<span class="icon">'+g.icon+'</span><div class="name">'+g.name+'</div><div class="cat">'+g.category+'</div>';
    div.onclick=function(){selectGame(g);};
    list.appendChild(div);
  });
}
function filterGames(cat,btn){
  document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active');});
  if(btn)btn.classList.add('active');
  renderGames(cat);
}
function selectGame(g){
  currentGame=g;
  document.getElementById('gameFrame').src='/games/'+g.id+'.html';
  document.getElementById('scoreGameName').textContent=g.name;
  renderGames(document.querySelector('.filter-btn.active').textContent.toLowerCase());
  loadScores(g.id);
}
function loadScores(gameId){
  fetch('/api/games/scores?game='+gameId+'&limit=10').then(function(r){return r.json();}).then(function(d){
    var list=document.getElementById('scoreList');
    var scores=d.scores||[];
    if(!scores.length){list.innerHTML='<div style="color:#555;font-size:12px;padding:8px">No scores yet. Be the first!</div>';return;}
    list.innerHTML='';
    scores.forEach(function(s,i){
      var row=document.createElement('div');
      row.className='score-row';
      row.innerHTML='<span class="rank">#'+(i+1)+'</span><span class="player">'+escHtml(s.player)+'</span><span class="score-val">'+formatScore(s.score)+'</span>';
      list.appendChild(row);
    });
  });
}
function submitScore(){
  if(!currentGame)return;
  var name=document.getElementById('playerName').value.trim()||'Anonymous';
  var score=parseInt(document.getElementById('scoreValue').value)||0;
  fetch('/api/games/score',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({game:currentGame.id,player:name,score:score})}).then(function(r){return r.json();}).then(function(d){
    if(d.status==='ok'){
      document.getElementById('scoreValue').value='';
      loadScores(currentGame.id);
    }
  });
}
function formatScore(s){return s>=1000000?(s/1000000).toFixed(1)+'M':s>=1000?(s/1000).toFixed(1)+'K':String(s);}
function escHtml(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}
loadGames();
</script>
</body>
</html>
