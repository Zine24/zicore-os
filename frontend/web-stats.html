<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZICORE — Web Statistics</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#04060c;--bg2:#0a0e1a;--bg3:#0f1525;--bg4:#141c30;--cyan:#00e5ff;--purple:#7c4dff;--green:#00ff88;--red:#ff3333;--orange:#ff8800;--yellow:#ffcc00;--text:#c8d6e5;--text2:#667788;--border:#1a2540;--glass:rgba(10,14,26,0.92)}
@font-face{font-family:'Mono';src:local('Cascadia Code'),local('Consolas'),local('monospace')}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
canvas#starfield{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
.grain{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none;opacity:.025;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}
.scanline{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,229,255,.01) 2px,rgba(0,229,255,.01) 4px)}

.app{position:relative;z-index:2;max-width:1400px;margin:0 auto;padding:20px}
.header{display:flex;align-items:center;gap:16px;margin-bottom:24px;padding:16px 20px;background:var(--glass);border:1px solid var(--border);border-radius:8px;backdrop-filter:blur(16px)}
.header .logo{width:32px;height:32px;flex-shrink:0}
.header .logo svg{width:100%;height:100%}
.header .title{font-size:14px;font-weight:700;letter-spacing:3px;background:linear-gradient(135deg,var(--cyan),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header .sep{width:1px;height:20px;background:var(--border)}
.header .subtitle{font-size:10px;letter-spacing:2px;color:var(--text2);text-transform:uppercase}
.header .spacer{flex:1}
.header .clock{font-family:'Mono',monospace;font-size:11px;color:var(--cyan);letter-spacing:1px}
.header .back{font-size:11px;color:var(--text2);text-decoration:none;padding:6px 14px;border:1px solid var(--border);border-radius:4px;transition:all .2s;cursor:pointer;background:transparent}
.header .back:hover{border-color:var(--cyan);color:var(--cyan)}

.period-bar{display:flex;gap:6px;margin-bottom:20px;align-items:center}
.period-btn{font-size:9px;letter-spacing:1px;padding:5px 12px;border:1px solid var(--border);border-radius:4px;cursor:pointer;color:var(--text2);transition:all .2s;background:transparent;font-family:inherit}
.period-btn:hover{border-color:rgba(0,229,255,.2);color:var(--text)}
.period-btn.active{background:rgba(0,229,255,.08);border-color:rgba(0,229,255,.3);color:var(--cyan)}
.period-label{font-size:9px;letter-spacing:1px;color:var(--text2);text-transform:uppercase;margin-right:8px}
.auto-refresh{font-size:9px;color:var(--text2);margin-left:auto;display:flex;align-items:center;gap:6px}
.auto-refresh input{accent-color:var(--cyan)}
.refresh-dot{width:5px;height:5px;border-radius:50%;background:var(--green);box-shadow:0 0 5px var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

.stats-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:var(--glass);border:1px solid var(--border);border-radius:8px;padding:16px;backdrop-filter:blur(16px);position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);opacity:.4}
.stat-label{font-size:8px;letter-spacing:2px;color:var(--text2);text-transform:uppercase;margin-bottom:8px}
.stat-value{font-family:'Mono',monospace;font-size:24px;font-weight:700;color:var(--cyan);line-height:1}
.stat-sub{font-size:9px;color:var(--text2);margin-top:4px}
.stat-card.green .stat-value{color:var(--green)}
.stat-card.green::before{background:linear-gradient(90deg,transparent,var(--green),transparent)}
.stat-card.red .stat-value{color:var(--red)}
.stat-card.red::before{background:linear-gradient(90deg,transparent,var(--red),transparent)}
.stat-card.purple .stat-value{color:var(--purple)}
.stat-card.purple::before{background:linear-gradient(90deg,transparent,var(--purple),transparent)}
.stat-card.orange .stat-value{color:var(--orange)}
.stat-card.orange::before{background:linear-gradient(90deg,transparent,var(--orange),transparent)}

.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.chart-panel{background:var(--glass);border:1px solid var(--border);border-radius:8px;padding:16px;backdrop-filter:blur(16px)}
.chart-title{font-size:9px;letter-spacing:2px;color:var(--text2);text-transform:uppercase;margin-bottom:12px;font-weight:600}

.chart-bars{display:flex;align-items:flex-end;gap:2px;height:140px;padding-bottom:20px;position:relative}
.chart-bar{flex:1;background:linear-gradient(180deg,var(--cyan),rgba(0,229,255,.2));border-radius:2px 2px 0 0;min-width:4px;position:relative;transition:all .3s;cursor:pointer}
.chart-bar:hover{background:linear-gradient(180deg,var(--purple),rgba(124,77,255,.2))}
.chart-bar:hover::after{content:attr(data-tooltip);position:absolute;bottom:calc(100% + 4px);left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--border);padding:4px 8px;border-radius:4px;font-size:9px;color:var(--text);white-space:nowrap;z-index:10}
.chart-labels{position:absolute;bottom:0;left:0;right:0;display:flex;justify-content:space-between;font-size:7px;color:var(--text2);letter-spacing:.5px}

.status-bars{display:flex;flex-direction:column;gap:6px}
.status-row{display:flex;align-items:center;gap:10px}
.status-code{font-family:'Mono',monospace;font-size:10px;width:32px;text-align:right;flex-shrink:0}
.status-code.s2{color:var(--green)}
.status-code.s3{color:var(--cyan)}
.status-code.s4{color:var(--orange)}
.status-code.s5{color:var(--red)}
.status-bar-bg{flex:1;height:16px;background:var(--bg3);border-radius:3px;overflow:hidden;position:relative}
.status-bar-fill{height:100%;border-radius:3px;transition:width .5s}
.status-bar-fill.s2{background:linear-gradient(90deg,var(--green),rgba(0,255,136,.3))}
.status-bar-fill.s3{background:linear-gradient(90deg,var(--cyan),rgba(0,229,255,.3))}
.status-bar-fill.s4{background:linear-gradient(90deg,var(--orange),rgba(255,136,0,.3))}
.status-bar-fill.s5{background:linear-gradient(90deg,var(--red),rgba(255,51,51,.3))}
.status-count{font-family:'Mono',monospace;font-size:9px;color:var(--text2);width:50px;text-align:right;flex-shrink:0}

.tables-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.table-panel{background:var(--glass);border:1px solid var(--border);border-radius:8px;padding:16px;backdrop-filter:blur(16px)}
.table-panel h3{font-size:9px;letter-spacing:2px;color:var(--text2);text-transform:uppercase;margin-bottom:12px;font-weight:600}

table{width:100%;border-collapse:collapse;font-size:11px}
th{text-align:left;padding:6px 8px;font-size:8px;letter-spacing:1px;color:var(--text2);text-transform:uppercase;border-bottom:1px solid var(--border);font-weight:600}
td{padding:6px 8px;border-bottom:1px solid rgba(26,37,64,.5);font-family:'Mono',monospace;font-size:10px;color:var(--text)}
tr:hover td{background:rgba(0,229,255,.02)}
td.path{max-width:280px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--cyan)}
td.err{color:var(--red)}
td.ip-col{color:var(--purple)}
td.ms{color:var(--green)}

.footer{text-align:center;padding:20px;font-size:9px;color:var(--text2);letter-spacing:1px}
.footer span{color:var(--cyan)}

@media(max-width:900px){
  .stats-grid{grid-template-columns:repeat(3,1fr)}
  .charts-row,.tables-row{grid-template-columns:1fr}
}
</style>
</head>
<body>
<canvas id="starfield"></canvas>
<div class="grain"></div>
<div class="scanline"></div>

<div class="app">
  <div class="header">
    <div class="logo">
      <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <polygon points="50,3 95,27 95,73 50,97 5,73 5,27" stroke="url(#hg)" stroke-width="2" fill="none"/>
        <polygon points="50,20 78,35 78,65 50,80 22,65 22,35" stroke="url(#hg2)" stroke-width="1.5" fill="rgba(0,229,255,0.05)"/>
        <circle cx="50" cy="50" r="12" stroke="#00e5ff" stroke-width="1" fill="none" opacity=".6"/>
        <circle cx="50" cy="50" r="3" fill="#00e5ff" opacity=".8"/>
        <line x1="50" y1="38" x2="50" y2="20" stroke="#00e5ff" stroke-width=".5" opacity=".4"/>
        <line x1="50" y1="62" x2="50" y2="80" stroke="#00e5ff" stroke-width=".5" opacity=".4"/>
        <line x1="38" y1="50" x2="22" y2="50" stroke="#00e5ff" stroke-width=".5" opacity=".4"/>
        <line x1="62" y1="50" x2="78" y2="50" stroke="#00e5ff" stroke-width=".5" opacity=".4"/>
        <defs>
          <linearGradient id="hg" x1="0" y1="0" x2="100" y2="100"><stop offset="0%" stop-color="#00e5ff"/><stop offset="100%" stop-color="#7c4dff"/></linearGradient>
          <linearGradient id="hg2" x1="0" y1="0" x2="100" y2="100"><stop offset="0%" stop-color="#7c4dff"/><stop offset="100%" stop-color="#00e5ff"/></linearGradient>
        </defs>
      </svg>
    </div>
    <div class="title">ZICORE</div>
    <div class="sep"></div>
    <div class="subtitle">Web Statistics</div>
    <div class="spacer"></div>
    <a href="/" class="back">← Portal</a>
    <div class="clock" id="clock"></div>
  </div>

  <div class="period-bar">
    <span class="period-label">Periodo:</span>
    <button class="period-btn" data-hours="1">1H</button>
    <button class="period-btn" data-hours="6">6H</button>
    <button class="period-btn" data-hours="12">12H</button>
    <button class="period-btn active" data-hours="24">24H</button>
    <button class="period-btn" data-hours="168">7D</button>
    <button class="period-btn" data-hours="720">30D</button>
    <div class="auto-refresh">
      <div class="refresh-dot"></div>
      <input type="checkbox" id="autoRefresh" checked>
      <label for="autoRefresh">Auto-refresh 30s</label>
    </div>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label">Total Requests</div>
      <div class="stat-value" id="totalRequests">—</div>
      <div class="stat-sub" id="totalRequestsSub"></div>
    </div>
    <div class="stat-card red">
      <div class="stat-label">Error Rate</div>
      <div class="stat-value" id="errorRate">—</div>
      <div class="stat-sub" id="errorRateSub"></div>
    </div>
    <div class="stat-card green">
      <div class="stat-label">Avg Response</div>
      <div class="stat-value" id="avgMs">—</div>
      <div class="stat-sub" id="avgMsSub"></div>
    </div>
    <div class="stat-card purple">
      <div class="stat-label">Unique IPs</div>
      <div class="stat-value" id="uniqueIps">—</div>
      <div class="stat-sub" id="uniqueIpsSub"></div>
    </div>
    <div class="stat-card orange">
      <div class="stat-label">Total Transfer</div>
      <div class="stat-value" id="totalBytes">—</div>
      <div class="stat-sub" id="totalBytesSub"></div>
    </div>
  </div>

  <div class="charts-row">
    <div class="chart-panel">
      <div class="chart-title">Requests per Hour</div>
      <div class="chart-bars" id="chartBars"></div>
    </div>
    <div class="chart-panel">
      <div class="chart-title">Status Code Breakdown</div>
      <div class="status-bars" id="statusBars"></div>
    </div>
  </div>

  <div class="tables-row">
    <div class="table-panel">
      <h3>Top Endpoints</h3>
      <table>
        <thead><tr><th>Endpoint</th><th>Hits</th><th>Avg ms</th><th>Errors</th></tr></thead>
        <tbody id="endpointsBody"></tbody>
      </table>
    </div>
    <div class="table-panel">
      <h3>Top IPs</h3>
      <table>
        <thead><tr><th>IP</th><th>Hits</th><th>Avg ms</th></tr></thead>
        <tbody id="ipsBody"></tbody>
      </table>
    </div>
  </div>

  <div class="footer">ZICORE System v5.0 — <span>Web Statistics Module</span> — Data persisted in SQLite</div>
</div>

<script>
let currentHours = 24;
let refreshTimer = null;

// ─── Clock ───
function updateClock(){
  const d=new Date();
  document.getElementById('clock').textContent=d.toISOString().slice(0,19).replace('T',' ')+' UTC';
}
setInterval(updateClock,1000);updateClock();

// ─── Starfield ───
(function(){
  const c=document.getElementById('starfield'),x=c.getContext('2d');
  let w,h,stars=[];
  function resize(){w=c.width=innerWidth;h=c.height=innerHeight;stars=[];for(let i=0;i<120;i++)stars.push({x:Math.random()*w,y:Math.random()*h,s:Math.random()*1.5+.3,a:Math.random(),sp:Math.random()*.0003+.0001})}
  function draw(){x.clearRect(0,0,w,h);stars.forEach(s=>{s.a+=s.sp;if(s.a>1)s.a=0;const o=Math.sin(s.a*Math.PI);x.beginPath();x.arc(s.x,s.y,s.s,0,Math.PI*2);x.fillStyle=`rgba(200,214,229,${o*.35})`;x.fill()});requestAnimationFrame(draw)}
  resize();draw();addEventListener('resize',resize);
})();

// ─── Data ───
function fmtBytes(b){
  if(b===0)return '0 B';
  if(b>1e12)return (b/1e12).toFixed(1)+' TB';
  if(b>1e9)return (b/1e9).toFixed(1)+' GB';
  if(b>1e6)return (b/1e6).toFixed(1)+' MB';
  if(b>1e3)return (b/1e3).toFixed(1)+' KB';
  return b+' B';
}

async function loadStats(){
  try{
    const [ov, tr, ep, ip, st] = await Promise.all([
      fetch(`/api/stats/overview?hours=${currentHours}`).then(r=>r.json()),
      fetch(`/api/stats/traffic?hours=${currentHours}`).then(r=>r.json()),
      fetch(`/api/stats/endpoints?hours=${currentHours}`).then(r=>r.json()),
      fetch(`/api/stats/ips?hours=${currentHours}`).then(r=>r.json()),
      fetch(`/api/stats/status?hours=${currentHours}`).then(r=>r.json()),
    ]);

    // Overview
    document.getElementById('totalRequests').textContent=ov.total_requests.toLocaleString();
    document.getElementById('totalRequestsSub').textContent=`${currentHours}h period`;
    document.getElementById('errorRate').textContent=ov.error_rate+'%';
    document.getElementById('errorRateSub').textContent=`${ov.server_errors} server / ${ov.client_errors} client errors`;
    document.getElementById('avgMs').textContent=ov.avg_response_ms+'ms';
    document.getElementById('avgMsSub').textContent=`min ${ov.min_response_ms} / max ${ov.max_response_ms}`;
    document.getElementById('uniqueIps').textContent=ov.unique_ips;
    document.getElementById('uniqueIpsSub').textContent='distinct sources';
    document.getElementById('totalBytes').textContent=fmtBytes(ov.total_bytes);
    document.getElementById('totalBytesSub').textContent='total transfer';

    // Chart bars
    const bars=document.getElementById('chartBars');
    const data=tr.data||[];
    if(data.length===0){bars.innerHTML='<div style="width:100%;text-align:center;color:var(--text2);font-size:11px;padding:50px 0">No data yet — traffic is being logged</div>';return}
    const max=Math.max(...data.map(d=>d.count),1);
    bars.innerHTML=data.map(d=>{
      const h=Math.max((d.count/max)*120,2);
      const label=d.hour.slice(11,13)+':00';
      return `<div class="chart-bar" style="height:${h}px" data-tooltip="${label}: ${d.count} reqs"></div>`;
    }).join('');

    // Status breakdown
    const sb=document.getElementById('statusBars');
    const sd=st.data||[];
    if(sd.length===0){sb.innerHTML='<div style="color:var(--text2);font-size:11px;padding:20px 0;text-align:center">No data</div>';return}
    const sMax=Math.max(...sd.map(d=>d.count),1);
    sb.innerHTML=sd.map(d=>{
      const cls=d.status>=500?'s5':d.status>=400?'s4':d.status>=300?'s3':'s2';
      const pct=(d.count/sMax)*100;
      return `<div class="status-row"><span class="status-code ${cls}">${d.status}</span><div class="status-bar-bg"><div class="status-bar-fill ${cls}" style="width:${pct}%"></div></div><span class="status-count">${d.count.toLocaleString()}</span></div>`;
    }).join('');

    // Endpoints table
    const eb=document.getElementById('endpointsBody');
    const epd=ep.data||[];
    eb.innerHTML=epd.length?epd.map(e=>`<tr><td class="path" title="${e.path}">${e.path}</td><td>${e.hits.toLocaleString()}</td><td class="ms">${e.avg_ms}</td><td class="${e.errors>0?'err':''}">${e.errors||'—'}</td></tr>`).join(''):'<tr><td colspan="4" style="text-align:center;color:var(--text2)">No data</td></tr>';

    // IPs table
    const ib=document.getElementById('ipsBody');
    const ipd=ip.data||[];
    ib.innerHTML=ipd.length?ipd.map(i=>`<tr><td class="ip-col">${i.ip}</td><td>${i.hits.toLocaleString()}</td><td class="ms">${i.avg_ms}</td></tr>`).join(''):'<tr><td colspan="3" style="text-align:center;color:var(--text2)">No data</td></tr>';

  }catch(e){console.error('Stats load error:',e)}
}

// ─── Period buttons ───
document.querySelectorAll('.period-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.period-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentHours=parseInt(btn.dataset.hours);
    loadStats();
  });
});

// ─── Auto-refresh ───
document.getElementById('autoRefresh').addEventListener('change',function(){
  if(this.checked){refreshTimer=setInterval(loadStats,30000)}
  else{clearInterval(refreshTimer);refreshTimer=null}
});
refreshTimer=setInterval(loadStats,30000);

// ─── Initial load ───
loadStats();
</script>
</body>
</html>
