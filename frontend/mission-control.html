<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZICORE OS — Mission Control</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#04060c;--bg2:#0a0e1a;--bg3:#0f1525;--bg4:#141c30;--bg5:#1a2540;
  --cyan:#00e5ff;--purple:#7c4dff;--green:#00ff88;--red:#ff3333;--orange:#ff8800;--yellow:#ffcc00;
  --text:#c8d6e5;--text2:#8899aa;--border:#1a2540;
  --glass:rgba(10,14,26,0.9);--glass2:rgba(10,14,26,0.65);
}
@font-face{font-family:'Mono';src:local('Cascadia Code'),local('Consolas'),local('monospace')}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);overflow:hidden;height:100vh;width:100vw}
canvas#starfield{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
.grain{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none;opacity:.03;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}
.scanline{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,229,255,.012) 2px,rgba(0,229,255,.012) 4px)}

.app{position:relative;z-index:2;display:grid;grid-template-rows:52px 1fr 30px;height:100vh;width:100vw;overflow:hidden}

/* ===== TOP BAR ===== */
.topbar{display:flex;align-items:center;gap:16px;padding:0 20px;
  background:var(--glass);border-bottom:1px solid var(--border);backdrop-filter:blur(20px);z-index:10}
.topbar .logo{width:30px;height:30px;position:relative}
.topbar .logo svg{width:100%;height:100%}
.topbar .brand{font-size:13px;font-weight:700;letter-spacing:3px;
  background:linear-gradient(135deg,var(--cyan),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.topbar .sep{width:1px;height:22px;background:var(--border)}
.topbar .mission-name{font-size:13px;font-weight:600;color:var(--text);letter-spacing:1px}
.topbar .spacer{flex:1}

.timer-box{display:flex;align-items:center;gap:14px}
.timer-block{text-align:center}
.timer-block .label{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--text2);margin-bottom:2px}
.timer-block .value{font-family:'Mono',monospace;font-size:16px;font-weight:700;letter-spacing:2px}
.timer-block .value.cyan{color:var(--cyan)}
.timer-block .value.green{color:var(--green)}
.timer-block .value.purple{color:var(--purple)}

.status-pill{display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:4px;
  background:rgba(0,255,136,.08);border:1px solid rgba(0,255,136,.2)}
.status-pill .dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:pulse 2s infinite}
.status-pill span{font-size:10px;font-weight:600;letter-spacing:1px;color:var(--green)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* ===== FOUR PANEL GRID ===== */
.panels{display:grid;grid-template-columns:300px 1fr 320px;gap:2px;padding:2px;overflow:hidden}
@media(max-width:1200px){.panels{grid-template-columns:260px 1fr 280px}}
@media(max-width:900px){.panels{grid-template-columns:1fr;grid-template-rows:auto 1fr auto;overflow-y:auto}}

.panel{background:var(--glass);border:1px solid var(--border);border-radius:6px;overflow:hidden;
  backdrop-filter:blur(12px);display:flex;flex-direction:column}
.panel-hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;
  border-bottom:1px solid var(--border);background:rgba(0,0,0,.25)}
.panel-title{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text2)}
.panel-badge{font-size:8px;padding:2px 6px;border-radius:3px;font-weight:700;letter-spacing:1px}
.badge-nom{background:rgba(0,255,136,.1);color:var(--green)}
.badge-warn{background:rgba(255,136,0,.1);color:var(--orange)}
.badge-crit{background:rgba(255,51,51,.1);color:var(--red)}
.badge-info{background:rgba(0,229,255,.1);color:var(--cyan)}
.panel-body{padding:10px 12px;flex:1;overflow-y:auto}
.panel-body::-webkit-scrollbar{width:3px}
.panel-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* ===== LEFT PANEL: COUNTDOWN ===== */
.countdown-list{display:flex;flex-direction:column;gap:3px}
.cd-step{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:4px;
  background:rgba(0,0,0,.2);border:1px solid transparent;cursor:pointer;transition:all .15s}
.cd-step:hover{border-color:rgba(0,229,255,.15);background:rgba(0,229,255,.03)}
.cd-step.active{border-color:rgba(0,229,255,.3);background:rgba(0,229,255,.06)}
.cd-step.done{border-color:rgba(0,255,136,.2);background:rgba(0,255,136,.04)}
.cd-step.failed{border-color:rgba(255,51,51,.2);background:rgba(255,51,51,.04)}
.cd-check{width:14px;height:14px;border-radius:3px;border:1.5px solid var(--border);display:flex;
  align-items:center;justify-content:center;flex-shrink:0;font-size:9px;transition:all .15s}
.cd-step.done .cd-check{background:var(--green);border-color:var(--green);color:#000}
.cd-step.active .cd-check{border-color:var(--cyan);box-shadow:0 0 6px rgba(0,229,255,.3)}
.cd-step.failed .cd-check{background:var(--red);border-color:var(--red);color:#fff}
.cd-time{font-family:'Mono',monospace;font-size:10px;color:var(--cyan);width:52px;flex-shrink:0;text-align:right}
.cd-step.done .cd-time{color:var(--green)}
.cd-label{font-size:11px;color:var(--text);flex:1}
.cd-step.done .cd-label{color:var(--text2)}

/* Crew Panel */
.crew-section{margin-top:10px;border-top:1px solid var(--border);padding-top:10px}
.crew-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.crew-slot{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:5px;
  background:rgba(0,0,0,.25);border:1px solid var(--border);transition:border-color .15s}
.crew-slot:hover{border-color:rgba(124,77,255,.3)}
.crew-avatar{width:28px;height:28px;border-radius:50%;background:var(--bg4);display:flex;
  align-items:center;justify-content:center;font-size:13px;border:1.5px solid var(--border);flex-shrink:0}
.crew-slot.active .crew-avatar{border-color:var(--cyan);box-shadow:0 0 8px rgba(0,229,255,.2)}
.crew-info .crew-name{font-size:10px;font-weight:600;color:var(--text)}
.crew-info .crew-role{font-size:8px;color:var(--text2);letter-spacing:.5px}

/* ===== CENTER PANEL: TELEMETRY ===== */
.telemetry-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding-bottom:8px}
@media(max-width:1000px){.telemetry-grid{grid-template-columns:repeat(2,1fr)}}

.tg-card{background:rgba(0,0,0,.25);border:1px solid var(--border);border-radius:6px;padding:12px;
  display:flex;flex-direction:column;align-items:center;gap:6px;transition:border-color .15s}
.tg-card:hover{border-color:rgba(0,229,255,.2)}
.tg-ring{width:72px;height:72px;position:relative}
.tg-ring svg{width:100%;height:100%;transform:rotate(-90deg)}
.tg-ring circle{fill:none;stroke-width:5;stroke-linecap:round}
.tg-ring .bg{stroke:var(--bg4)}
.tg-ring .fill{transition:stroke-dashoffset .4s ease}
.tg-val{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-family:'Mono',monospace;font-size:13px;font-weight:700;text-align:center}
.tg-unit{font-size:8px;color:var(--text2);margin-top:-2px}
.tg-label{font-size:9px;color:var(--text2);text-transform:uppercase;letter-spacing:1.5px;font-weight:600}

/* Horizontal bars */
.hbar-wrap{width:100%;margin-top:4px}
.hbar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.hbar-label{font-size:9px;color:var(--text2);width:56px;text-align:right;flex-shrink:0;text-transform:uppercase;letter-spacing:.5px}
.hbar-track{flex:1;height:8px;background:var(--bg4);border-radius:4px;overflow:hidden}
.hbar-fill{height:100%;border-radius:4px;transition:width .4s ease;position:relative}
.hbar-fill.cyan{background:linear-gradient(90deg,var(--cyan),rgba(0,229,255,.4))}
.hbar-fill.green{background:linear-gradient(90deg,var(--green),rgba(0,255,136,.4))}
.hbar-fill.purple{background:linear-gradient(90deg,var(--purple),rgba(124,77,255,.4))}
.hbar-fill.orange{background:linear-gradient(90deg,var(--orange),rgba(255,136,0,.4))}
.hbar-fill.red{background:linear-gradient(90deg,var(--red),rgba(255,51,51,.4))}
.hbar-val{font-family:'Mono',monospace;font-size:10px;color:var(--text);width:48px;text-align:left;flex-shrink:0}

/* Mission Timeline */
.timeline-section{margin-top:10px;border-top:1px solid var(--border);padding-top:10px}
.timeline-title{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text2);margin-bottom:8px}
.timeline{position:relative;padding-left:18px}
.timeline::before{content:'';position:absolute;left:5px;top:4px;bottom:4px;width:2px;background:var(--border)}
.tl-item{position:relative;margin-bottom:8px;padding-left:10px}
.tl-dot{position:absolute;left:-18px;top:3px;width:10px;height:10px;border-radius:50%;
  background:var(--bg4);border:2px solid var(--border);transition:all .15s}
.tl-item.done .tl-dot{background:var(--green);border-color:var(--green);box-shadow:0 0 6px var(--green)}
.tl-item.active .tl-dot{background:var(--cyan);border-color:var(--cyan);box-shadow:0 0 8px var(--cyan);animation:pulse 1.5s infinite}
.tl-item.pending .tl-dot{background:var(--bg4);border-color:var(--text2)}
.tl-time{font-family:'Mono',monospace;font-size:9px;color:var(--cyan)}
.tl-item.done .tl-time{color:var(--green)}
.tl-item.pending .tl-time{color:var(--text2)}
.tl-text{font-size:10px;color:var(--text);margin-top:1px}
.tl-item.done .tl-text{color:var(--text2)}
.tl-item.pending .tl-text{color:var(--text2)}

/* ===== RIGHT PANEL: SYSTEMS ===== */
.sys-list{display:flex;flex-direction:column;gap:4px}
.sys-row{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:4px;
  background:rgba(0,0,0,.2);transition:background .15s}
.sys-row:hover{background:rgba(0,229,255,.03)}
.sys-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;transition:all .15s}
.sys-dot.green{background:var(--green);box-shadow:0 0 5px var(--green)}
.sys-dot.yellow{background:var(--yellow);box-shadow:0 0 5px var(--yellow)}
.sys-dot.red{background:var(--red);box-shadow:0 0 5px var(--red)}
.sys-name{font-size:11px;color:var(--text);flex:1}
.sys-status{font-size:9px;font-weight:600;letter-spacing:.5px;padding:2px 6px;border-radius:3px}
.sys-status.ok{background:rgba(0,255,136,.08);color:var(--green)}
.sys-status.warn{background:rgba(255,204,0,.08);color:var(--yellow)}
.sys-status.err{background:rgba(255,51,51,.08);color:var(--red)}

/* Comms Panel */
.comms-section{margin-top:10px;border-top:1px solid var(--border);padding-top:10px}
.comms-log{display:flex;flex-direction:column;gap:4px;max-height:160px;overflow-y:auto}
.comms-log::-webkit-scrollbar{width:2px}
.comms-log::-webkit-scrollbar-thumb{background:var(--border)}
.comms-entry{display:flex;gap:6px;padding:4px 6px;border-radius:3px;background:rgba(0,0,0,.15);font-size:10px}
.comms-time{font-family:'Mono',monospace;color:var(--text2);flex-shrink:0;width:44px}
.comms-text{color:var(--text);word-break:break-word}
.comms-text.info{color:var(--cyan)}
.comms-text.warn{color:var(--orange)}
.comms-text.success{color:var(--green)}

/* ===== MISSION SELECTOR ===== */
.mission-selector{display:flex;gap:4px;flex-wrap:wrap;padding:6px 0}
.mission-btn{padding:4px 10px;border-radius:4px;border:1px solid var(--border);background:rgba(0,0,0,.2);
  color:var(--text2);font-size:10px;cursor:pointer;transition:all .15s;letter-spacing:.5px}
.mission-btn:hover{border-color:rgba(0,229,255,.3);color:var(--cyan)}
.mission-btn.active{border-color:var(--cyan);color:var(--cyan);background:rgba(0,229,255,.08)}

/* ===== CONTROLS ===== */
.controls-bar{display:flex;align-items:center;gap:8px;padding:6px 0;flex-wrap:wrap}
.ctrl-btn{padding:5px 14px;border-radius:4px;border:1px solid var(--border);background:rgba(0,0,0,.2);
  color:var(--text);font-size:10px;font-weight:600;cursor:pointer;transition:all .15s;letter-spacing:1px}
.ctrl-btn:hover{border-color:var(--cyan);color:var(--cyan)}
.ctrl-btn.primary{background:rgba(0,229,255,.1);border-color:var(--cyan);color:var(--cyan)}
.ctrl-btn.danger{border-color:var(--red);color:var(--red)}
.ctrl-btn.danger:hover{background:rgba(255,51,51,.1)}
.ctrl-btn:disabled{opacity:.3;cursor:not-allowed}
.speed-group{display:flex;gap:3px}
.speed-btn{padding:4px 8px;border-radius:3px;border:1px solid var(--border);background:rgba(0,0,0,.2);
  color:var(--text2);font-size:9px;font-weight:600;cursor:pointer;transition:all .15s;font-family:'Mono',monospace}
.speed-btn:hover{border-color:var(--purple);color:var(--purple)}
.speed-btn.active{border-color:var(--purple);color:var(--purple);background:rgba(124,77,255,.1)}

/* ===== STATUS BAR ===== */
.statusbar{display:flex;align-items:center;gap:14px;padding:0 20px;
  background:var(--glass);border-top:1px solid var(--border);font-size:9px;color:var(--text2);
  backdrop-filter:blur(20px);letter-spacing:.5px}
.statusbar .dot{width:5px;height:5px;border-radius:50%;background:var(--green);box-shadow:0 0 4px var(--green)}
.statusbar .spacer{flex:1}
.statusbar .tag{padding:2px 6px;border-radius:3px;background:rgba(0,229,255,.06);color:var(--cyan);font-weight:600}
</style>
</head>
<body>
<canvas id="starfield"></canvas>
<div class="grain"></div>
<div class="scanline"></div>

<div class="app">
  <!-- ===== TOP BAR ===== -->
  <div class="topbar">
    <div class="logo">
      <svg viewBox="0 0 40 46"><polygon points="20,2 37,11 37,31 20,40 3,31 3,11" fill="none" stroke="url(#hg)" stroke-width="1.5"/>
        <defs><linearGradient id="hg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#00e5ff"/>
        <stop offset="100%" stop-color="#7c4dff"/></linearGradient></defs>
        <text x="20" y="26" text-anchor="middle" fill="url(#hg)" font-size="16" font-weight="700" font-family="sans-serif">Z</text></svg>
    </div>
    <div class="brand">ZICORE</div>
    <div class="sep"></div>
    <div class="mission-name" id="topMissionName">MISSION CONTROL</div>
    <div class="spacer"></div>
    <div class="timer-box">
      <div class="timer-block">
        <div class="label">T-MINUS</div>
        <div class="value cyan" id="tMinus">T- 04:00:00</div>
      </div>
      <div class="timer-block">
        <div class="label">MISSION ELAPSED</div>
        <div class="value green" id="met">MET 00:00:00</div>
      </div>
      <div class="timer-block">
        <div class="label">MISSION TIME</div>
        <div class="value purple" id="metClock">00:00:00</div>
      </div>
    </div>
    <div class="sep"></div>
    <div class="status-pill" id="statusPill">
      <div class="dot"></div>
      <span id="statusText">NOMINAL</span>
    </div>
  </div>

  <!-- ===== FOUR PANELS ===== -->
  <div class="panels">
    <!-- LEFT: Countdown + Crew -->
    <div class="panel" style="grid-row:1/2">
      <div class="panel-hdr">
        <div class="panel-title">Launch Countdown</div>
        <div class="panel-badge badge-info" id="cdBadge">STANDBY</div>
      </div>
      <div class="panel-body" style="flex:1;overflow-y:auto">
        <div class="controls-bar">
          <button class="ctrl-btn primary" id="btnStart" onclick="startCountdown()">START</button>
          <button class="ctrl-btn" id="btnPause" onclick="pauseCountdown()" disabled>PAUSE</button>
          <button class="ctrl-btn danger" id="btnReset" onclick="resetCountdown()">RESET</button>
          <div style="flex:1"></div>
          <div class="speed-group">
            <button class="speed-btn active" onclick="setSpeed(1,this)">1x</button>
            <button class="speed-btn" onclick="setSpeed(10,this)">10x</button>
            <button class="speed-btn" onclick="setSpeed(100,this)">100x</button>
            <button class="speed-btn" onclick="setSpeed(1000,this)">1000x</button>
          </div>
        </div>
        <div class="countdown-list" id="countdownList"></div>

        <div class="crew-section">
          <div class="panel-title" style="margin-bottom:8px">Crew</div>
          <div class="crew-grid" id="crewGrid"></div>
        </div>
      </div>
    </div>

    <!-- CENTER: Telemetry + Timeline -->
    <div class="panel">
      <div class="panel-hdr">
        <div class="panel-title">Telemetry</div>
        <div class="panel-badge badge-nom" id="telBadge">LIVE</div>
      </div>
      <div class="panel-body" style="flex:1;overflow-y:auto">
        <div class="mission-selector" id="missionSelector"></div>
        <div class="telemetry-grid" id="telemetryGrid"></div>
        <div class="hbar-wrap" id="hbarWrap"></div>
        <div class="timeline-section">
          <div class="timeline-title">Mission Timeline</div>
          <div class="timeline" id="timeline"></div>
        </div>
      </div>
    </div>

    <!-- RIGHT: Systems + Comms -->
    <div class="panel">
      <div class="panel-hdr">
        <div class="panel-title">Systems Status</div>
        <div class="panel-badge badge-nom" id="sysBadge">ALL GO</div>
      </div>
      <div class="panel-body" style="flex:1;overflow-y:auto">
        <div class="sys-list" id="sysList"></div>
        <div class="comms-section">
          <div class="panel-title" style="margin-bottom:8px">Communications</div>
          <div class="comms-log" id="commsLog"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== STATUS BAR ===== -->
  <div class="statusbar">
    <div class="dot"></div>
    <span>SYS: NOMINAL</span>
    <div class="spacer"></div>
    <span id="sbUptime">UPTIME: --</span>
    <span id="sbCpu">CPU: --%</span>
    <span id="sbMem">MEM: --%</span>
    <div class="spacer"></div>
    <span class="tag">ZICORE OS v5.0</span>
    <span style="color:var(--text2)">creando el tiempo</span>
  </div>
</div>

<script>
// ============================
// STATE
// ============================
let simRunning = false;
let simPaused = false;
let simSpeed = 1;
let simTime = 0;
let countdownSeconds = 14400;
let totalMissionTime = 14400;
const MISSION_SPEEDS = {1:1000,10:100,100:10,1000:1};
let simInterval = null;

const MISSIONS = [
  { id:'artemis', name:'Artemis III', vehicle:'SLS Block 1 + Orion', desc:'Crewed lunar landing',
    crew:['Commander','Pilot','Mission Specialist','Flight Engineer'],
    targets:{alt:400,vel:7800,fuel:100,batt:100,temp:22,gforce:0}},
  { id:'mars2024', name:'Mars 2024', vehicle:'Starship Mars', desc:'Mars cargo mission',
    crew:['Mission Director','Flight Engineer','Payload Lead','Systems Eng'],
    targets:{alt:200,vel:11200,fuel:100,batt:100,temp:22,gforce:0}},
  { id:'iss', name:'ISS Resupply', vehicle:'Dragon Cargo', desc:'Station resupply',
    crew:['CAPCOM','Flight Director','Payload Officer','Logistics'],
    targets:{alt:420,vel:7660,fuel:100,batt:100,temp:22,gforce:0}},
  { id:'geo', name:'GEO Deploy', vehicle:'Falcon Heavy', desc:'Geostationary deployment',
    crew:['Launch Director','Range Safety','Telemetry Officer','Booster Eng'],
    targets:{alt:35786,vel:3070,fuel:100,batt:100,temp:22,gforce:0}},
  { id:'gateway', name:'Lunar Gateway', vehicle:'SLS Block 1B', desc:'Gateway station delivery',
    crew:['Commander','Pilot','Gateway Specialist','Orbital Mech'],
    targets:{alt:7000,vel:1000,fuel:100,batt:100,temp:22,gforce:0}}
];
let currentMission = MISSIONS[0];

const CD_STEPS = [
  {id:1, time:'T-4h00m', label:'Launch Director Go/No-Go', t:14400},
  {id:2, time:'T-3h30m', label:'Vehicle Status Check', t:12600},
  {id:3, time:'T-3h00m', label:'Crew Suiting Complete', t:10800},
  {id:4, time:'T-2h30m', label:'Crew Ingress & Hatch Close', t:9000},
  {id:5, time:'T-2h00m', label:'Fueling Authorization', t:7200},
  {id:6, time:'T-1h30m', label:'LOX/LH2 Load Complete', t:5400},
  {id:7, time:'T-1h00m', label:'Flight Computer Armed', t:3600},
  {id:8, time:'T-00m30s', label:'Range Clear / Weather Go', t:1800},
  {id:9, time:'T-00m10s', label:'Terminal Count / Auto Seq', t:600},
  {id:10,time:'T-00m06s', label:'Engine Start Command', t:360},
  {id:11,time:'T-00m03s', label:'Thrust Buildup Nominal', t:180},
  {id:12,time:'T-00m00s', label:'LIFTOFF', t:0}
];

const SYSTEMS = [
  {name:'Propulsion', status:'green', label:'NOMINAL'},
  {name:'Navigation', status:'green', label:'NOMINAL'},
  {name:'Communications', status:'green', label:'NOMINAL'},
  {name:'Power Systems', status:'green', label:'NOMINAL'},
  {name:'Thermal Control', status:'green', label:'NOMINAL'},
  {name:'Life Support', status:'green', label:'NOMINAL'},
  {name:'Structure', status:'green', label:'NOMINAL'},
  {name:'Avionics', status:'green', label:'NOMINAL'},
  {name:'Flight Computer', status:'green', label:'NOMINAL'},
  {name:'Guidance', status:'green', label:'NOMINAL'}
];

const TEL_GAUGES = [
  {id:'alt', label:'Altitude', unit:'km', color:'var(--cyan)', max:50000},
  {id:'vel', label:'Velocity', unit:'m/s', color:'var(--green)', max:12000},
  {id:'gforce', label:'G-Force', unit:'G', color:'var(--purple)', max:6},
  {id:'fuel', label:'Fuel', unit:'%', color:'var(--orange)', max:100},
  {id:'batt', label:'Battery', unit:'%', color:'var(--cyan)', max:100},
  {id:'temp', label:'Temp', unit:'°C', color:'var(--red)', max:200}
];

const H_BARS = [
  {id:'fuelBar', label:'Fuel', color:'orange', max:100},
  {id:'battBar', label:'Battery', color:'cyan', max:100},
  {id:'oxBar', label:'LOX', color:'green', max:100},
  {id:'pressBar', label:'Pressure', color:'purple', max:100}
];

const TL_PHASES = [
  {label:'Pre-Flight', offset:0, done:true, active:false},
  {label:'Terminal Count', offset:3600, done:false, active:true},
  {label:'Engine Start', offset:300, done:false, active:false},
  {label:'Liftoff', offset:0, done:false, active:false},
  {label:'Max Q', offset:60, done:false, active:false},
  {label:'MECO', offset:150, done:false, active:false},
  {label:'Stage Sep', offset:155, done:false, active:false},
  {label:'Orbit Insertion', offset:480, done:false, active:false}
];

let telValues = {alt:0, vel:0, gforce:0, fuel:100, batt:100, temp:22, ox:100, press:95};
let stepStates = CD_STEPS.map(() => 'pending');

// ============================
// RENDER
// ============================
function renderMissionSelector(){
  const el = document.getElementById('missionSelector');
  el.innerHTML = MISSIONS.map(m => 
    `<button class="mission-btn${m.id===currentMission.id?' active':''}" onclick="selectMission('${m.id}')">${m.name}</button>`
  ).join('');
}

function renderCountdown(){
  const el = document.getElementById('countdownList');
  el.innerHTML = CD_STEPS.map((s,i) => {
    const cls = stepStates[i] === 'done' ? 'done' : stepStates[i] === 'active' ? 'active' : stepStates[i] === 'failed' ? 'failed' : '';
    const check = stepStates[i] === 'done' ? '&#10003;' : stepStates[i] === 'failed' ? '&#10007;' : '';
    return `<div class="cd-step ${cls}" onclick="toggleStep(${i})">
      <div class="cd-check">${check}</div>
      <div class="cd-time">${s.time}</div>
      <div class="cd-label">${s.label}</div>
    </div>`;
  }).join('');
}

function renderCrew(){
  const el = document.getElementById('crewGrid');
  const icons = ['&#9788;','&#9790;','&#9733;','&#9734;'];
  el.innerHTML = currentMission.crew.map((c,i) => 
    `<div class="crew-slot active">
      <div class="crew-avatar">${icons[i]||'&#9733;'}</div>
      <div class="crew-info"><div class="crew-name">${c}</div><div class="crew-role">SEAT ${i+1}</div></div>
    </div>`
  ).join('');
}

function renderTelemetry(){
  const el = document.getElementById('telemetryGrid');
  el.innerHTML = TEL_GAUGES.map(g => {
    const circ = 2 * Math.PI * 16;
    return `<div class="tg-card">
      <div class="tg-ring">
        <svg viewBox="0 0 40 40">
          <circle class="bg" cx="20" cy="20" r="16" stroke-width="5"/>
          <circle class="fill" id="ring_${g.id}" cx="20" cy="20" r="16" stroke="${g.color}" stroke-dasharray="${circ}" stroke-dashoffset="${circ}"/>
        </svg>
        <div class="tg-val" id="val_${g.id}" style="color:${g.color}">--</div>
      </div>
      <div class="tg-unit" id="unit_${g.id}">${g.unit}</div>
      <div class="tg-label">${g.label}</div>
    </div>`;
  }).join('');
}

function renderHBars(){
  const el = document.getElementById('hbarWrap');
  el.innerHTML = H_BARS.map(b => 
    `<div class="hbar-row">
      <div class="hbar-label">${b.label}</div>
      <div class="hbar-track"><div class="hbar-fill ${b.color}" id="fill_${b.id}" style="width:0%"></div></div>
      <div class="hbar-val" id="hval_${b.id}">--%</div>
    </div>`
  ).join('');
}

function renderTimeline(){
  const el = document.getElementById('timeline');
  el.innerHTML = TL_PHASES.map((p,i) => {
    const cls = p.done ? 'done' : p.active ? 'active' : 'pending';
    const elapsed = Math.floor(totalMissionTime - countdownSeconds + p.offset);
    const tStr = elapsed <= 0 ? 'T+00:' + String(Math.abs(elapsed)/60).padStart(2,'0') : 'T-' + formatTime(p.offset);
    return `<div class="tl-item ${cls}">
      <div class="tl-dot"></div>
      <div class="tl-time">${tStr}</div>
      <div class="tl-text">${p.label}</div>
    </div>`;
  }).join('');
}

function renderSystems(){
  const el = document.getElementById('sysList');
  el.innerHTML = SYSTEMS.map((s,i) => 
    `<div class="sys-row">
      <div class="sys-dot ${s.status}"></div>
      <div class="sys-name">${s.name}</div>
      <div class="sys-status ${s.status==='green'?'ok':s.status==='yellow'?'warn':'err'}">${s.label}</div>
    </div>`
  ).join('');
}

function addCommsEntry(text, type='info'){
  const el = document.getElementById('commsLog');
  const now = new Date();
  const time = now.toTimeString().slice(0,8);
  const div = document.createElement('div');
  div.className = 'comms-entry';
  div.innerHTML = `<div class="comms-time">${time}</div><div class="comms-text ${type}">${text}</div>`;
  el.insertBefore(div, el.firstChild);
  if(el.children.length > 30) el.removeChild(el.lastChild);
}

function updateGauge(id, value, max){
  const circ = 2 * Math.PI * 16;
  const ring = document.getElementById('ring_' + id);
  if(ring){
    const pct = Math.min(value / max, 1);
    ring.setAttribute('stroke-dashoffset', circ * (1 - pct));
  }
  const val = document.getElementById('val_' + id);
  if(val){
    if(id === 'alt') val.textContent = value > 1000 ? (value/1000).toFixed(1) + 'k' : Math.round(value);
    else if(id === 'vel') val.textContent = Math.round(value).toLocaleString();
    else if(id === 'gforce') val.textContent = value.toFixed(2);
    else val.textContent = Math.round(value);
  }
}

function updateHBar(id, value, max){
  const fill = document.getElementById('fill_' + id);
  const hval = document.getElementById('hval_' + id);
  if(fill) fill.style.width = Math.min(value/max*100,100) + '%';
  if(hval) hval.textContent = Math.round(value) + '%';
}

// ============================
// SIMULATION
// ============================
function formatTime(s){
  s = Math.max(0, Math.floor(s));
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  return String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0') + ':' + String(sec).padStart(2,'0');
}

function updateSimulation(){
  if(!simRunning || simPaused) return;

  for(let i = 0; i < simSpeed; i++){
    countdownSeconds -= 1;
    simTime += 1;

    if(countdownSeconds < 0) countdownSeconds = 0;

    updateStepStates();
    updateTelemetryValues();
  }

  updateDisplay();
}

function updateStepStates(){
  for(let i = 0; i < CD_STEPS.length; i++){
    if(stepStates[i] === 'done') continue;
    if(countdownSeconds <= CD_STEPS[i].t){
      if(countdownSeconds > CD_STEPS[i].t - 120 && i < CD_STEPS.length - 1){
        stepStates[i] = 'active';
      } else {
        stepStates[i] = 'done';
      }
    }
  }
}

function updateTelemetryValues(){
  const progress = 1 - (countdownSeconds / totalMissionTime);
  const mission = currentMission.targets;

  if(countdownSeconds <= 360){
    telValues.alt = mission.alt * Math.min(progress * 2, 1);
    telValues.vel = mission.vel * Math.min(progress * 2, 1);
  } else {
    telValues.alt = Math.max(0, (1 - countdownSeconds/totalMissionTime) * 100);
    telValues.vel = Math.max(0, (1 - countdownSeconds/totalMissionTime) * 50);
  }

  telValues.fuel = Math.max(0, mission.fuel - progress * 85);
  telValues.ox = Math.max(0, 100 - progress * 80);
  telValues.batt = Math.max(20, mission.batt - progress * 15);
  telValues.press = Math.max(40, 95 - progress * 30);

  if(countdownSeconds <= 360){
    telValues.gforce = 1.5 + Math.sin(simTime * 0.05) * 0.5 + (countdownSeconds < 180 ? 2 : 0);
  } else {
    telValues.gforce = 1 + Math.sin(simTime * 0.02) * 0.1;
  }

  if(countdownSeconds <= 360){
    telValues.temp = 22 + (360 - countdownSeconds) * 0.4 + Math.sin(simTime * 0.1) * 5;
  } else {
    telValues.temp = 22 + Math.sin(simTime * 0.05) * 2;
  }

  if(countdownSeconds === 360 && stepStates[9] !== 'done'){
    addCommsEntry('Engine start initiated', 'info');
  }
  if(countdownSeconds === 180 && stepStates[10] !== 'done'){
    addCommsEntry('Thrust buildup nominal', 'success');
  }
  if(countdownSeconds === 0 && stepStates[11] !== 'done'){
    addCommsEntry('LIFTOFF! Vehicle has cleared the tower', 'success');
    document.getElementById('topMissionName').textContent = currentMission.name.toUpperCase() + ' — IN FLIGHT';
  }

  if(Math.random() < 0.005 * simSpeed){
    const sysIdx = Math.floor(Math.random() * SYSTEMS.length);
    const r = Math.random();
    if(r < 0.7){
      SYSTEMS[sysIdx].status = 'green';
      SYSTEMS[sysIdx].label = 'NOMINAL';
    } else if(r < 0.92){
      SYSTEMS[sysIdx].status = 'yellow';
      SYSTEMS[sysIdx].label = 'CAUTION';
      addCommsEntry(SYSTEMS[sysIdx].name + ' — caution', 'warn');
    } else {
      SYSTEMS[sysIdx].status = 'red';
      SYSTEMS[sysIdx].label = 'ALERT';
      addCommsEntry(SYSTEMS[sysIdx].name + ' — alert!', 'warn');
    }
  }
}

function updateDisplay(){
  document.getElementById('tMinus').textContent = 'T- ' + formatTime(countdownSeconds);
  document.getElementById('met').textContent = 'MET ' + formatTime(Math.max(0, totalMissionTime - countdownSeconds - totalMissionTime + countdownSeconds));
  document.getElementById('metClock').textContent = formatTime(simTime);
  document.getElementById('topMissionName').textContent = currentMission.name.toUpperCase() + (countdownSeconds <= 0 ? ' — IN FLIGHT' : '');

  updateGauge('alt', telValues.alt, 50000);
  updateGauge('vel', telValues.vel, 12000);
  updateGauge('gforce', telValues.gforce, 6);
  updateGauge('fuel', telValues.fuel, 100);
  updateGauge('batt', telValues.batt, 100);
  updateGauge('temp', telValues.temp, 200);

  updateHBar('fuelBar', telValues.fuel, 100);
  updateHBar('battBar', telValues.batt, 100);
  updateHBar('oxBar', telValues.ox, 100);
  updateHBar('pressBar', telValues.press, 100);

  const doneSteps = stepStates.filter(s => s === 'done').length;
  const cdBadge = document.getElementById('cdBadge');
  if(countdownSeconds <= 0){
    cdBadge.textContent = 'LIFTOFF';
    cdBadge.className = 'panel-badge badge-nom';
  } else if(doneSteps === CD_STEPS.length){
    cdBadge.textContent = 'COMPLETE';
    cdBadge.className = 'panel-badge badge-nom';
  } else if(simRunning && !simPaused){
    cdBadge.textContent = 'COUNTING';
    cdBadge.className = 'panel-badge badge-info';
  } else {
    cdBadge.textContent = 'STANDBY';
    cdBadge.className = 'panel-badge badge-info';
  }

  const redCount = SYSTEMS.filter(s => s.status === 'red').length;
  const yellowCount = SYSTEMS.filter(s => s.status === 'yellow').length;
  const sysBadge = document.getElementById('sysBadge');
  if(redCount > 0){ sysBadge.textContent = redCount + ' ALERT'; sysBadge.className = 'panel-badge badge-crit'; }
  else if(yellowCount > 0){ sysBadge.textContent = yellowCount + ' CAUTION'; sysBadge.className = 'panel-badge badge-warn'; }
  else { sysBadge.textContent = 'ALL GO'; sysBadge.className = 'panel-badge badge-nom'; }

  const statusPill = document.getElementById('statusPill');
  const statusText = document.getElementById('statusText');
  if(countdownSeconds <= 0){
    statusPill.querySelector('.dot').style.background = 'var(--green)';
    statusPill.style.background = 'rgba(0,255,136,.08)';
    statusPill.style.borderColor = 'rgba(0,255,136,.2)';
    statusText.textContent = 'IN FLIGHT';
    statusText.style.color = 'var(--green)';
  } else if(simRunning && !simPaused){
    statusPill.querySelector('.dot').style.background = 'var(--cyan)';
    statusPill.style.background = 'rgba(0,229,255,.08)';
    statusPill.style.borderColor = 'rgba(0,229,255,.2)';
    statusText.textContent = 'COUNTING';
    statusText.style.color = 'var(--cyan)';
  } else {
    statusPill.querySelector('.dot').style.background = 'var(--green)';
    statusPill.style.background = 'rgba(0,255,136,.08)';
    statusPill.style.borderColor = 'rgba(0,255,136,.2)';
    statusText.textContent = 'NOMINAL';
    statusText.style.color = 'var(--green)';
  }

  renderCountdown();
  renderTimeline();
  renderSystems();
}

// ============================
// CONTROLS
// ============================
function startCountdown(){
  if(countdownSeconds <= 0) return;
  simRunning = true;
  simPaused = false;
  document.getElementById('btnStart').disabled = true;
  document.getElementById('btnPause').disabled = false;
  addCommsEntry('Mission clock started at T-' + formatTime(countdownSeconds), 'info');
  clearInterval(simInterval);
  simInterval = setInterval(updateSimulation, MISSION_SPEEDS[simSpeed] || 1000);
}

function pauseCountdown(){
  simPaused = !simPaused;
  const btn = document.getElementById('btnPause');
  btn.textContent = simPaused ? 'RESUME' : 'PAUSE';
  addCommsEntry(simPaused ? 'Mission clock paused' : 'Mission clock resumed', 'info');
}

function resetCountdown(){
  simRunning = false;
  simPaused = false;
  countdownSeconds = 14400;
  totalMissionTime = 14400;
  simTime = 0;
  telValues = {alt:0, vel:0, gforce:0, fuel:100, batt:100, temp:22, ox:100, press:95};
  stepStates = CD_STEPS.map(() => 'pending');
  SYSTEMS.forEach(s => { s.status = 'green'; s.label = 'NOMINAL'; });
  clearInterval(simInterval);
  document.getElementById('btnStart').disabled = false;
  document.getElementById('btnPause').disabled = true;
  document.getElementById('btnPause').textContent = 'PAUSE';
  document.getElementById('topMissionName').textContent = currentMission.name.toUpperCase();
  document.getElementById('commsLog').innerHTML = '';
  addCommsEntry('Mission reset — countdown armed', 'info');
  updateDisplay();
}

function setSpeed(s, btn){
  simSpeed = s;
  document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if(simRunning && !simPaused){
    clearInterval(simInterval);
    simInterval = setInterval(updateSimulation, MISSION_SPEEDS[s] || 1000);
  }
}

function toggleStep(i){
  if(stepStates[i] === 'done'){
    stepStates[i] = 'pending';
  } else if(stepStates[i] === 'pending' || stepStates[i] === 'active'){
    stepStates[i] = 'done';
  }
  renderCountdown();
}

function selectMission(id){
  currentMission = MISSIONS.find(m => m.id === id) || MISSIONS[0];
  resetCountdown();
  renderMissionSelector();
  renderCrew();
  document.getElementById('topMissionName').textContent = currentMission.name.toUpperCase();
  addCommsEntry('Mission selected: ' + currentMission.name + ' — ' + currentMission.vehicle, 'info');
}

// ============================
// SYSTEM POLLING
// ============================
async function pollSystem(){
  try{
    const r = await fetch('/api/system/stats');
    const d = await r.json();
    if(d.error) return;
    document.getElementById('sbUptime').textContent = 'UPTIME: ' + (d.uptime || '--');
    document.getElementById('sbCpu').textContent = 'CPU: ' + d.cpu_percent + '%';
    document.getElementById('sbMem').textContent = 'MEM: ' + d.memory_percent + '%';
  }catch(e){}

  const now = new Date();
  document.getElementById('metClock').textContent = now.toLocaleTimeString('en-GB',{hour12:false});
}

// ============================
// STARFIELD
// ============================
const canvas = document.getElementById('starfield');
const ctx = canvas.getContext('2d');
let stars = [];
function initStars(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  stars = [];
  for(let i = 0; i < 100; i++){
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.2 + 0.2,
      a: Math.random(),
      da: Math.random() * 0.02 - 0.01
    });
  }
}
function drawStars(){
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  stars.forEach(s => {
    s.a += s.da;
    if(s.a > 1 || s.a < 0.15) s.da *= -1;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(180,210,240,${s.a})`;
    ctx.fill();
  });
  requestAnimationFrame(drawStars);
}
initStars();
drawStars();
window.addEventListener('resize', initStars);

// ============================
// INIT
// ============================
function init(){
  renderMissionSelector();
  renderCountdown();
  renderCrew();
  renderTelemetry();
  renderHBars();
  renderTimeline();
  renderSystems();
  addCommsEntry('Mission Control initialized', 'success');
  addCommsEntry('Vehicle: ' + currentMission.vehicle, 'info');
  addCommsEntry('Mission: ' + currentMission.desc, 'info');
  addCommsEntry('All systems nominal — standing by for countdown', 'success');
  updateDisplay();
  setInterval(pollSystem, 5000);
  pollSystem();
}

init();
</script>
