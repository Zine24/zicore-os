<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZICORE — Multimedia</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#04060c;font-family:'Segoe UI',system-ui,sans-serif;color:#c8d0dc;overflow:hidden}
a{color:#00e5ff;text-decoration:none}
.wrap{display:flex;flex-direction:column;height:100%}
.topbar{display:flex;align-items:center;gap:14px;padding:10px 20px;border-bottom:1px solid rgba(0,229,255,0.07);background:rgba(6,10,18,0.7)}
.brand{font-size:16px;letter-spacing:6px;font-weight:900;background:linear-gradient(135deg,#00e5ff,#7c4dff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.brand-sub{font-size:7px;letter-spacing:3px;color:#3a4555;text-transform:uppercase}
.back-btn{background:rgba(0,229,255,0.06);border:1px solid rgba(0,229,255,0.15);color:#00e5ff;padding:5px 12px;border-radius:4px;cursor:pointer;font-size:10px;letter-spacing:1px}
.back-btn:hover{background:rgba(0,229,255,0.12)}

.tabs{display:flex;gap:4px;padding:10px 20px;border-bottom:1px solid rgba(0,229,255,0.05)}
.tab{font-size:8px;letter-spacing:2px;padding:6px 14px;border:1px solid rgba(0,229,255,0.08);border-radius:4px;cursor:pointer;color:#506070;transition:all .2s;text-transform:uppercase}
.tab:hover{border-color:rgba(0,229,255,0.25);color:#00e5ff}
.tab.active{background:rgba(0,229,255,0.08);border-color:rgba(0,229,255,0.3);color:#00e5ff}

.main-area{flex:1;display:flex;overflow:hidden}
.library-panel{flex:1;overflow-y:auto;padding:16px 20px}
.preview-panel{width:420px;flex-shrink:0;background:rgba(6,8,16,0.95);border-left:1px solid rgba(0,229,255,0.07);display:flex;flex-direction:column;overflow:hidden}
.preview-panel.hidden{display:none}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
.card{background:linear-gradient(145deg,rgba(8,12,20,0.9),rgba(12,16,28,0.95));border:1px solid rgba(0,229,255,0.06);border-radius:6px;overflow:hidden;cursor:pointer;transition:all .3s;position:relative}
.card:hover{transform:translateY(-3px);border-color:rgba(0,229,255,0.2);box-shadow:0 10px 30px rgba(0,229,255,0.06)}
.card.active{border-color:rgba(0,229,255,0.4);box-shadow:0 0 20px rgba(0,229,255,0.1)}
.thumb{height:100px;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 50% 40%,rgba(0,229,255,0.04),transparent);position:relative;overflow:hidden}
.thumb img{width:100%;height:100%;object-fit:cover}
.thumb .ico{font-size:30px;opacity:.5}
.thumb .kind{position:absolute;top:5px;left:5px;font-size:6px;letter-spacing:1px;padding:2px 5px;border-radius:3px;background:rgba(4,6,12,0.8);border:1px solid rgba(0,229,255,0.12);color:#00e5ff}
.meta{padding:8px 10px}
.meta .nm{font-size:9px;color:#c8d0dc;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.meta .sz{font-size:6px;letter-spacing:1px;color:#3a4a5a;margin-top:2px}
.meta .dir{font-size:6px;color:#2a3a4a;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.empty{grid-column:1/-1;text-align:center;padding:50px 0;color:#3a4555;font-size:10px;letter-spacing:2px}
.loader{grid-column:1/-1;text-align:center;padding:40px 0;color:#00e5ff;font-size:9px;letter-spacing:3px}
.count-bar{grid-column:1/-1;display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid rgba(0,229,255,0.06);margin-bottom:8px;font-size:8px;color:#506070;letter-spacing:1px}

/* PREVIEW PANEL */
.preview-header{padding:12px 16px;border-bottom:1px solid rgba(0,229,255,0.07);display:flex;align-items:center;justify-content:space-between}
.preview-title{font-size:10px;letter-spacing:2px;color:#00e5ff;text-transform:uppercase}
.preview-close{background:none;border:1px solid rgba(0,229,255,0.15);color:#506070;padding:3px 8px;border-radius:3px;cursor:pointer;font-size:9px}
.preview-close:hover{color:#ff4444;border-color:rgba(255,68,68,0.3)}
.preview-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;gap:12px;overflow:auto}
.preview-body audio{width:100%;max-width:360px}
.preview-body video{width:100%;max-width:400px;max-height:60%;border-radius:6px;border:1px solid rgba(0,229,255,0.1)}
.preview-body img{max-width:100%;max-height:55%;border-radius:6px;border:1px solid rgba(0,229,255,0.1)}
.preview-info{width:100%;padding:12px;background:rgba(0,229,255,0.03);border:1px solid rgba(0,229,255,0.06);border-radius:4px}
.preview-info .fname{font-size:11px;color:#c8d0dc;word-break:break-all}
.preview-info .fmeta{font-size:8px;color:#506070;margin-top:4px;letter-spacing:1px}
.preview-nav{display:flex;gap:8px;width:100%}
.preview-nav button{flex:1;background:rgba(0,229,255,0.06);border:1px solid rgba(0,229,255,0.12);color:#00e5ff;padding:6px;border-radius:3px;cursor:pointer;font-size:9px;letter-spacing:1px}
.preview-nav button:hover{background:rgba(0,229,255,0.12)}

/* VIDEO EDITOR */
.editor-panel{display:none;flex-direction:column;flex:1}
.editor-panel.active{display:flex}
.editor-toolbar{display:flex;gap:6px;padding:12px 16px;border-bottom:1px solid rgba(0,229,255,0.07);flex-wrap:wrap}
.editor-btn{background:rgba(0,229,255,0.06);border:1px solid rgba(0,229,255,0.12);color:#00e5ff;padding:5px 12px;border-radius:3px;cursor:pointer;font-size:9px;letter-spacing:1px;transition:all .2s}
.editor-btn:hover{background:rgba(0,229,255,0.12)}
.editor-btn.active{background:rgba(0,229,255,0.15);border-color:rgba(0,229,255,0.3)}
.editor-btn.danger{color:#ff4444;border-color:rgba(255,68,68,0.2)}
.editor-canvas{flex:1;display:flex;align-items:center;justify-content:center;background:#020408;position:relative}
.editor-canvas video{max-width:90%;max-height:85%;border-radius:4px}
.editor-timeline{height:80px;background:rgba(6,8,16,0.95);border-top:1px solid rgba(0,229,255,0.07);padding:8px 16px;display:flex;flex-direction:column;gap:4px}
.timeline-track{flex:1;background:rgba(0,229,255,0.04);border-radius:3px;position:relative;overflow:hidden}
.timeline-bar{position:absolute;top:0;left:0;height:100%;background:linear-gradient(90deg,rgba(0,229,255,0.2),rgba(124,77,255,0.2));border-radius:3px}
.timeline-markers{display:flex;gap:4px;font-size:7px;color:#506070;letter-spacing:1px}
.editor-status{display:flex;align-items:center;gap:8px;padding:4px 16px;font-size:8px;color:#506070;letter-spacing:1px;border-top:1px solid rgba(0,229,255,0.05)}

/* SCROLLBAR */
.library-panel::-webkit-scrollbar,.preview-body::-webkit-scrollbar{width:5px}
.library-panel::-webkit-scrollbar-thumb,.preview-body::-webkit-scrollbar-thumb{background:rgba(0,229,255,0.1);border-radius:3px}

/* STATUS BAR */
.statusbar{display:flex;align-items:center;gap:8px;padding:5px 20px;background:rgba(6,8,16,0.95);border-top:1px solid rgba(0,229,255,0.05);font-size:7px;letter-spacing:2px;color:#3a4a5a}
.status-dot{width:4px;height:4px;border-radius:50%;background:#00ff88;box-shadow:0 0 4px #00ff88}
.status-pills{margin-left:auto;display:flex;gap:6px}
.status-pill{padding:2px 6px;border-radius:3px;font-size:6px;letter-spacing:1px;border:1px solid rgba(0,229,255,0.08);color:#506070}
.status-pill.active{border-color:rgba(0,255,136,0.25);color:#00ff88}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <button class="back-btn" onclick="if(parent!==window&&parent.zicorePortal){parent.zicorePortal.back();}else if(parent!==window&&parent.showMenu){parent.showMenu();}else{window.location='/';}">&#9664; PORTAL</button>
    <div>
      <div class="brand">MULTIMEDIA</div>
      <div class="brand-sub">ZICORE Media Center</div>
    </div>
  </div>

  <div class="tabs" id="tabs">
    <div class="tab active" data-cat="all">ALL</div>
    <div class="tab" data-cat="audio">AUDIO</div>
    <div class="tab" data-cat="video">VIDEO</div>
    <div class="tab" data-cat="images">IMAGES</div>
    <div class="tab" data-cat="music">MUSIC</div>
    <div class="tab" data-cat="editor" style="border-color:rgba(124,77,255,0.2);color:#7c4dff">EDITOR</div>
  </div>

  <div class="main-area">
    <!-- LIBRARY -->
    <div class="library-panel" id="libraryPanel">
      <div class="grid" id="grid"><div class="loader">CARGANDO BIBLIOTECA...</div></div>
    </div>

    <!-- PREVIEW PANEL -->
    <div class="preview-panel hidden" id="previewPanel">
      <div class="preview-header">
        <div class="preview-title">PREVIEW</div>
        <button class="preview-close" onclick="closePreview()">CERRAR</button>
      </div>
      <div class="preview-body" id="previewBody"></div>
      <div class="preview-info" id="previewInfo"></div>
      <div class="preview-nav">
        <button onclick="navPreview(-1)">&#9664; ANTERIOR</button>
        <button onclick="navPreview(1)">&#9654; SIGUIENTE</button>
      </div>
    </div>

    <!-- VIDEO EDITOR -->
    <div class="editor-panel" id="editorPanel">
      <div class="editor-toolbar">
        <button class="editor-btn" onclick="editorAction('trim')">RECORTAR</button>
        <button class="editor-btn" onclick="editorAction('cut')">CORTE</button>
        <button class="editor-btn" onclick="editorAction('speed')">VELOCIDAD</button>
        <button class="editor-btn" onclick="editorAction('volume')">VOLUMEN</button>
        <div style="flex:1"></div>
        <button class="editor-btn" onclick="editorAction('export')">EXPORTAR</button>
        <button class="editor-btn danger" onclick="editorAction('reset')">RESET</button>
      </div>
      <div class="editor-canvas" id="editorCanvas">
        <div style="color:#3a4555;font-size:11px;letter-spacing:2px">SELECCIONA UN VIDEO PARA EDITAR</div>
      </div>
      <div class="editor-timeline">
        <div class="timeline-markers">
          <span>00:00</span><span id="editorDuration">00:00</span><span id="editorCurrent">00:00</span>
        </div>
        <div class="timeline-track" id="timelineTrack">
          <div class="timeline-bar" id="timelineBar" style="width:0%"></div>
        </div>
      </div>
      <div class="editor-status">
        <span>EDITOR</span>
        <span id="editorStatus">Sin video cargado</span>
      </div>
    </div>
  </div>

  <div class="statusbar">
    <div class="status-dot"></div>
    <span>MULTIMEDIA</span>
    <div class="status-pills">
      <div class="status-pill active" id="pillTotal">0 archivos</div>
      <div class="status-pill" id="pillPlaying"></div>
    </div>
  </div>
</div>

<script>
var DATA={audio:[],video:[],images:[],music:[]};
var FILTER='all';
var PREVIEW_LIST=[]; var PREVIEW_IDX=0;
var editorVideo=null;

function kindIcon(k){
  if(k==='audio'||k==='music')return '\u{1F3B5}';
  if(k==='video')return '\u{1F3AC}';
  return '\u{1F5BC}';
}

function load(){
  fetch('/api/media/list').then(function(r){return r.json();}).then(function(d){
    DATA.audio=d.audio||[]; DATA.video=d.video||[]; DATA.images=d.images||[]; DATA.music=d.music||[];
    var total=DATA.audio.length+DATA.video.length+DATA.images.length+DATA.music.length;
    document.getElementById('pillTotal').textContent=total+' archivos';
    render();
  }).catch(function(e){ document.getElementById('grid').innerHTML='<div class="empty">ERROR: '+e+'</div>'; });
}

function humanSize(b){ if(!b)return'--';if(b<1024)return b+' B'; if(b<1048576)return (b/1024).toFixed(1)+' KB'; return (b/1048576).toFixed(1)+' MB'; }

function itemsFor(cat){
  if(cat==='all')return [].concat(DATA.audio,DATA.video,DATA.images,DATA.music);
  return DATA[cat]||[];
}

function isImage(it){ return ['png','jpg','jpeg','gif','webp','bmp','svg'].indexOf(it.ext)>=0; }
function isVideo(it){ return ['mp4','webm','ogv','mov','mkv','avi'].indexOf(it.ext)>=0; }
function isAudio(it){ return ['wav','mp3','ogg','flac','m4a','aac'].indexOf(it.ext)>=0; }

function render(){
  var items=itemsFor(FILTER);
  var grid=document.getElementById('grid');
  if(!items.length){ grid.innerHTML='<div class="empty">SIN ARCHIVOS EN ESTA CATEGORIA</div>'; return; }

  var startIdx=0;
  var html='<div class="count-bar"><span>'+items.length+' archivos</span><span>'+(FILTER==='all'?'TODOS':FILTER.toUpperCase())+'</span></div>';
  grid.innerHTML=html;

  items.forEach(function(it,idx){
    var card=document.createElement('div');
    card.className='card';
    var img=isImage(it);
    var vid=isVideo(it);
    var thumb;
    if(img){ thumb='<img src="'+it.url+'" alt="" loading="lazy">'; }
    else { thumb='<div class="ico">'+kindIcon(vid?'video':'audio')+'</div>'; }
    card.innerHTML=
      '<div class="thumb">'+thumb+
        '<div class="kind">'+(vid?'VIDEO':isAudio(it)?'AUDIO':it.ext.toUpperCase())+'</div>'+
      '</div>'+
      '<div class="meta"><div class="nm">'+it.name+'</div>'+
      (it.dir&&it.dir!=='root'&&it.dir!=='local'?'<div class="dir">'+it.dir+'</div>':'')+
      '<div class="sz">'+humanSize(it.size)+' \u2022 '+it.ext.toUpperCase()+'</div></div>';
    card.onclick=function(){ openPreview(it, idx); };
    grid.appendChild(card);
  });
}

/* PREVIEW */
function openPreview(it, idx){
  PREVIEW_LIST=itemsFor(FILTER);
  PREVIEW_IDX=idx||0;
  showPreview(it);
  document.getElementById('previewPanel').classList.remove('hidden');
  document.getElementById('editorPanel').classList.remove('active');
  document.getElementById('libraryPanel').style.flex='1';
}

function showPreview(it){
  var body=document.getElementById('previewBody');
  var info=document.getElementById('previewInfo');
  body.innerHTML='';
  document.getElementById('pillPlaying').textContent=it.name;

  if(isImage(it)){
    body.innerHTML='<img src="'+it.url+'" alt="'+it.name+'">';
  } else if(isVideo(it)){
    body.innerHTML='<video controls autoplay src="'+it.url+'" style="width:100%"></video>';
  } else {
    body.innerHTML='<audio controls autoplay src="'+it.url+'" style="width:100%"></audio>';
  }
  info.innerHTML='<div class="fname">'+it.name+'</div><div class="fmeta">'+humanSize(it.size)+' \u2022 '+it.ext.toUpperCase()+(it.dir&&it.dir!=='root'?' \u2022 '+it.dir:'')+'</div>';
}

function navPreview(d){
  PREVIEW_IDX=(PREVIEW_IDX+d+PREVIEW_LIST.length)%PREVIEW_LIST.length;
  showPreview(PREVIEW_LIST[PREVIEW_IDX]);
}

function closePreview(){
  document.getElementById('previewPanel').classList.add('hidden');
  var body=document.getElementById('previewBody');
  body.innerHTML='';
  document.getElementById('pillPlaying').textContent='';
}

/* EDITOR */
function openEditor(){
  document.getElementById('editorPanel').classList.add('active');
  document.getElementById('previewPanel').classList.add('hidden');
  document.getElementById('libraryPanel').style.flex='1';
}

function loadVideoToEditor(it){
  if(!isVideo(it))return;
  openEditor();
  editorVideo=it;
  var canvas=document.getElementById('editorCanvas');
  canvas.innerHTML='<video id="editorVideo" controls src="'+it.url+'" style="max-width:90%;max-height:85%"></video>';
  document.getElementById('editorStatus').textContent=it.name+' \u2022 '+humanSize(it.size);
  var vid=document.getElementById('editorVideo');
  vid.onloadedmetadata=function(){
    var dur=vid.duration;
    var m=Math.floor(dur/60);var s=Math.floor(dur%60);
    document.getElementById('editorDuration').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
    vid.ontimeupdate=function(){
      var cur=vid.currentTime;
      var cm=Math.floor(cur/60);var cs=Math.floor(cur%60);
      document.getElementById('editorCurrent').textContent=String(cm).padStart(2,'0')+':'+String(cs).padStart(2,'0');
      document.getElementById('timelineBar').style.width=((cur/dur)*100)+'%';
    };
  };
}

function editorAction(action){
  if(!editorVideo){alert('Selecciona un video primero');return;}
  var vid=document.getElementById('editorVideo');
  if(!vid)return;
  switch(action){
    case 'trim':
      var start=prompt('Tiempo de inicio (segundos):','0');
      var end=prompt('Tiempo de fin (segundos):',vid.duration);
      if(start!==null&&end!==null){vid.currentTime=parseFloat(start);vid.play();setTimeout(function(){vid.pause()},(parseFloat(end)-parseFloat(start))*1000);}
      break;
    case 'cut':
      vid.currentTime=prompt('Cortar en segundo:','0');
      break;
    case 'speed':
      var spd=prompt('Velocidad (0.5, 1, 1.5, 2):','1');
      if(spd)vid.playbackRate=parseFloat(spd);
      break;
    case 'volume':
      var vol=prompt('Volumen (0.0 a 1.0):','1');
      if(vol)vid.volume=parseFloat(vol);
      break;
    case 'export':
      alert('Exportacion: descarga el video editado desde el reproductor del navegador (click derecho > Guardar video como)');
      break;
    case 'reset':
      vid.currentTime=0;vid.playbackRate=1;vid.volume=1;vid.play();
      break;
  }
}

/* TABS */
document.getElementById('tabs').addEventListener('click',function(e){
  var t=e.target.closest('.tab'); if(!t)return;
  document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('active');});
  t.classList.add('active');
  var cat=t.dataset.cat;
  if(cat==='editor'){
    FILTER='all';
    document.getElementById('libraryPanel').style.flex='1';
    openEditor();
  } else {
    FILTER=cat;
    document.getElementById('editorPanel').classList.remove('active');
    document.getElementById('previewPanel').classList.add('hidden');
  }
  render();
});

load();
</script>
</body>
</html>
