<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZICORE SYSTEM — System Configuration</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#06080e;font-family:'Segoe UI',system-ui,sans-serif;color:#c8d0dc}
:root{--glow:#00e5ff;--glow2:#7c4dff;--panel-bg:rgba(10,14,22,0.88);--panel-border:rgba(0,229,255,0.12);--text2:#607080;--text3:#303848}
body{display:flex;flex-direction:column}

#main{flex:1;display:flex;overflow:hidden}
#tabs{width:200px;min-width:200px;border-right:1px solid rgba(0,229,255,0.08);padding:8px 0;overflow-y:auto;flex-shrink:0}
.tab{padding:8px 14px;font-size:9px;letter-spacing:2px;color:var(--text2);cursor:pointer;border-left:2px solid transparent;transition:all .2s}
.tab:hover{color:var(--glow);background:rgba(0,229,255,0.03)}
.tab.active{color:var(--glow);border-left-color:var(--glow);background:rgba(0,229,255,0.06)}
#content{flex:1;padding:16px;overflow-y:auto}
.panel{display:none}
.panel.active{display:block}
.section{margin-bottom:16px;padding:12px;border:1px solid rgba(0,229,255,0.06);border-radius:3px}
.section-title{font-size:9px;letter-spacing:2px;color:var(--glow);margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid rgba(0,229,255,0.06)}
.section-title.purple{color:var(--glow2)}
.section-title.green{color:#0f6}
.grid{display:grid;gap:6px;align-items:center}
.grid-2{grid-template-columns:100px 1fr}
.grid-3{grid-template-columns:100px 1fr 100px 1fr}
label{font-size:9px;color:var(--text2)}
input,select,textarea{background:rgba(0,0,0,0.4);border:1px solid rgba(0,229,255,0.08);color:var(--glow);padding:5px 8px;font-size:10px;font-family:inherit;outline:none;width:100%}
input:focus,select:focus,textarea:focus{border-color:rgba(0,229,255,0.3)}
textarea{font-family:monospace;font-size:9px;resize:vertical}
input[type=range]{padding:0;background:transparent;border:none;accent-color:var(--glow)}
input[type=color]{padding:2px;height:28px;cursor:pointer}
select option{background:#0a0e16;color:var(--glow)}
.btn{padding:6px 14px;font-size:8px;letter-spacing:2px;cursor:pointer;transition:all .2s;border-radius:2px}
.btn-primary{background:rgba(0,229,255,0.12);border:1px solid rgba(0,229,255,0.3);color:var(--glow)}
.btn-primary:hover{background:rgba(0,229,255,0.2)}
.btn-test{background:rgba(0,229,255,0.04);border:1px solid rgba(0,229,255,0.15);color:var(--glow)}
.btn-test:hover{background:rgba(0,229,255,0.1)}
.btn-save{background:rgba(0,255,136,0.12);border:1px solid rgba(0,255,136,0.3);color:#0f6;width:100%;padding:10px;margin-top:8px;font-size:10px;letter-spacing:3px}
.btn-save:hover{background:rgba(0,255,136,0.2)}
.toggle{width:32px;height:16px;border-radius:8px;cursor:pointer;position:relative;transition:all .2s;display:inline-block}
.toggle.on{background:rgba(0,229,255,0.3)}
.toggle.off{background:rgba(255,255,255,0.1)}
.toggle div{position:absolute;top:2px;width:12px;height:12px;border-radius:50%;transition:all .2s}
.toggle.on div{left:16px;background:#0ff}
.toggle.off div{left:2px;background:#666}
.status-ok{color:#0f6}
.status-warn{color:#fa0}
.status-err{color:#f44}
.status-idle{color:var(--text2)}
.flex{display:flex;gap:6px;align-items:center}
.gap-4{gap:4px}
.mt-8{margin-top:8px}
.mb-8{margin-bottom:8px}
.ml-auto{margin-left:auto}
.text-center{text-align:center}
.text-2{color:var(--text2)}
.text-3{color:var(--text3)}
.text-glow{color:var(--glow)}
.fs-7{font-size:7px}
.fs-8{font-size:8px}
.fs-9{font-size:9px}
.fs-10{font-size:10px}
.ls-1{letter-spacing:1px}
.ls-2{letter-spacing:2px}
.ls-3{letter-spacing:3px}
#toast{position:fixed;bottom:60px;right:20px;z-index:9999;padding:8px 16px;border-radius:4px;font-size:9px;letter-spacing:1px;display:none;background:rgba(10,14,22,0.96);border:1px solid rgba(0,255,136,0.3);color:#0f6;box-shadow:0 4px 20px rgba(0,255,136,0.1)}
#toast.err{border-color:#f44;color:#f44}
.sig{text-align:center;padding:12px 0 4px;font-size:7px;letter-spacing:3px;color:var(--text3)}
.model-item{display:flex;align-items:center;gap:8px;padding:6px 8px;border:1px solid rgba(0,229,255,0.04);border-radius:3px;cursor:pointer;transition:all .15s}
.model-item:hover{border-color:rgba(0,229,255,0.2);background:rgba(0,229,255,0.03)}
.model-item.selected{border-color:rgba(0,229,255,0.4);background:rgba(0,229,255,0.08)}
.model-item input[type=radio]{accent-color:var(--glow);width:14px;height:14px;cursor:pointer}
.model-item .model-name{font-size:9px;color:var(--glow);letter-spacing:1px;flex:1}
.model-item .model-desc{font-size:7px;color:var(--text2);letter-spacing:0.5px}
.model-item .model-tag{font-size:7px;letter-spacing:1px;padding:2px 6px;border-radius:2px}
.tag-free{background:rgba(0,229,255,0.12);color:#00e5ff;border:1px solid rgba(0,229,255,0.2)}
.tag-local{background:rgba(0,229,255,0.12);color:var(--glow);border:1px solid rgba(0,229,255,0.2)}
.tag-paid{background:rgba(255,136,0,0.12);color:#fa0;border:1px solid rgba(255,136,0,0.2)}
.model-item.is-free .model-name{color:#00e5ff;font-weight:bold;text-shadow:0 0 8px rgba(0,229,255,0.3)}
.model-item.is-free{border-color:rgba(0,229,255,0.15);background:rgba(0,229,255,0.03)}
.model-item.is-free:hover{border-color:rgba(0,229,255,0.3);background:rgba(0,229,255,0.06)}
.chat-item{padding:8px;border:1px solid rgba(0,229,255,0.04);border-radius:3px;margin-bottom:6px;transition:all .15s}
.chat-item:hover{border-color:rgba(0,229,255,0.15)}
.chat-msg{font-size:9px;color:var(--text2);line-height:1.6}
.chat-role{font-size:7px;letter-spacing:2px;margin-bottom:2px}
.chat-role.user{color:var(--glow)}
.chat-role.assistant{color:var(--glow2)}
.chat-role.system{color:#fa0}
.chat-time{font-size:7px;color:var(--text3);margin-top:4px}
.session-group{margin-bottom:12px;padding:8px;border:1px solid rgba(124,77,255,0.1);border-radius:3px}
.session-title{font-size:8px;letter-spacing:2px;color:var(--glow2);margin-bottom:6px}
.upload-zone{border:1px dashed rgba(0,229,255,0.2);border-radius:3px;padding:16px;text-align:center;cursor:pointer;transition:all .2s}
.upload-zone:hover{border-color:rgba(0,229,255,0.4);background:rgba(0,229,255,0.03)}
.upload-zone input[type=file]{display:none}
.upload-zone .upload-label{font-size:8px;letter-spacing:2px;color:var(--glow);cursor:pointer}
.upload-zone .upload-hint{font-size:7px;color:var(--text2);margin-top:4px}
</style>
</head>
<body>
<div class="ztopbar" id="topbar"></div>
<div id="main">
  <div id="tabs">
    <div class="tab active" onclick="switchTab('general', event)">GENERAL</div>
    <div class="tab" onclick="switchTab('providers', event)">PROVIDERS</div>
    <div class="tab" onclick="switchTab('zio', event)">ZIO AGENT</div>
    <div class="tab" onclick="switchTab('materializer', event)">MATERIALIZER</div>
    <div class="tab" onclick="switchTab('network', event)">NETWORK</div>
    <div class="tab" onclick="switchTab('ollama', event)">OLLAMA</div>
    <div class="tab" onclick="switchTab('models', event)">MODELS</div>
    <div class="tab" onclick="switchTab('engineering', event)">ENGINEERING</div>
    <div class="tab" onclick="switchTab('theme', event)">THEME</div>
    <div class="tab" onclick="switchTab('system', event)">SYSTEM INFO</div>
    <div class="tab" onclick="switchTab('chats', event)">CHATS</div>
  </div>
  <div id="content">
    <div class="panel active" id="panel-general"></div>
    <div class="panel" id="panel-providers"></div>
    <div class="panel" id="panel-zio"></div>
    <div class="panel" id="panel-materializer"></div>
    <div class="panel" id="panel-network"></div>
    <div class="panel" id="panel-ollama"></div>
    <div class="panel" id="panel-models"></div>
    <div class="panel" id="panel-engineering"></div>
    <div class="panel" id="panel-theme"></div>
    <div class="panel" id="panel-system"></div>
    <div class="panel" id="panel-chats"></div>
  </div>
</div>
<div id="toast"></div>
<script>
// SSO Auth Check
(function(){
  var token=localStorage.getItem('zicore_sso_token');
  if(!token){window.location.href='/login?redirect='+encodeURIComponent(window.location.pathname);return;}
  fetch('/api/sso/me',{headers:{'Authorization':'Bearer '+token}}).then(function(r){
    if(!r.ok){localStorage.removeItem('zicore_sso_token');window.location.href='/login?redirect='+encodeURIComponent(window.location.pathname);}
  }).catch(function(){});
})();

var CONFIG=null;
var PROVIDER_ORDER=['ollama','openrouter','openai','anthropic','groq','deepseek','together','opencode','tripo3d','meshy','rodin','openscad'];

function switchTab(name,event){
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('active');});
  if(event&&event.target)event.target.classList.add("active");
  document.getElementById('panel-'+name).classList.add('active');
}

function toast(msg,isErr){
  var t=document.getElementById('toast');
  t.textContent=msg;t.className=isErr?'err':'';t.style.display='block';
  clearTimeout(t._tmr);t._tmr=setTimeout(function(){t.style.display='none';},3000);
}

function loadCfg(){
  fetch('/api/config').then(function(r){return r.json();}).then(function(cfg){
    CONFIG=cfg;
    renderGeneral(cfg);
    renderProviders(cfg);
    renderZIO(cfg);
    renderMaterializer(cfg);
    renderNetwork(cfg);
    renderOllama(cfg);
    renderModels(cfg);
    renderEngineering(cfg);
    renderTheme(cfg);
    renderSystem(cfg);
    renderChats(cfg);
  }).catch(function(e){toast('Error loading config: '+e.message,true);});
}

function gatherAll(){
  var c={providers:{},zio_engine:{},system:{},materializer:{},theme_config:{},theme:CONFIG.theme||'midnight',ollama_service:{},engineering:{}};
  /* providers */
  PROVIDER_ORDER.forEach(function(pid){
    var el=document.getElementById('prov_'+pid+'_enabled');
    var keyEl=document.getElementById('prov_'+pid+'_api_key');
    var urlEl=document.getElementById('prov_'+pid+'_base_url');
    var modelEl=document.getElementById('prov_'+pid+'_default_model');
    if(el&&keyEl&&urlEl&&modelEl){
      c.providers[pid]={};
      c.providers[pid].enabled=el.classList.contains('on');
      var kv=keyEl.value; if(kv&&kv!=='********')c.providers[pid].api_key=kv;
      c.providers[pid].base_url=urlEl.value;
      c.providers[pid].default_model=modelEl.value;
      c.providers[pid].name=CONFIG.providers[pid]&&CONFIG.providers[pid].name?CONFIG.providers[pid].name:pid;
    }
  });
  /* zio_engine */
  var apEl=document.getElementById('cfgActiveProv');
  if(apEl)c.zio_engine.active_provider=apEl.value;
  var tEl=document.getElementById('cfgTemp');
  if(tEl)c.zio_engine.temperature=parseInt(tEl.value)/100;
  var mtEl=document.getElementById('cfgMaxTok');
  if(mtEl)c.zio_engine.max_tokens=parseInt(mtEl.value);
  var ctEl=document.getElementById('cfgCtx');
  if(ctEl)c.zio_engine.context_length=parseInt(ctEl.value);
  var spEl=document.getElementById('cfgSysPrompt');
  if(spEl)c.zio_engine.system_prompt=spEl.value;
  var tpEl=document.getElementById('cfgTopP');
  if(tpEl)c.zio_engine.top_p=parseInt(tpEl.value)/100;
  var strEl=document.getElementById('cfgStream');
  if(strEl)c.zio_engine.stream=strEl.classList.contains('on');
  /* materializer */
  var odEl=document.getElementById('matOutputDir');
  if(odEl)c.materializer.output_dir=odEl.value;
  var iqEl=document.getElementById('matImageQuality');
  if(iqEl)c.materializer.image_quality=iqEl.value;
  var mfEl=document.getElementById('matMeshFormat');
  if(mfEl)c.materializer.mesh_format=mfEl.value;
  var sdStEl=document.getElementById('matSDSteps');
  if(sdStEl)c.materializer.sd_steps=parseInt(sdStEl.value);
  var sdGdEl=document.getElementById('matSDGuidance');
  if(sdGdEl)c.materializer.sd_guidance=parseFloat(sdGdEl.value);
  var sdMdEl=document.getElementById('matSDModel');
  if(sdMdEl)c.materializer.sd_model=sdMdEl.value;
  /* system */
  var wpEl=document.getElementById('sysWebPort');
  if(wpEl)c.system.web_port=parseInt(wpEl.value);
  var apEl2=document.getElementById('sysAPIPort');
  if(apEl2)c.system.api_port=parseInt(apEl2.value);
  var llEl=document.getElementById('sysLogLevel');
  if(llEl)c.system.log_level=llEl.value;
  var mwEl=document.getElementById('sysMaxWorkers');
  if(mwEl)c.system.max_workers=parseInt(mwEl.value);
  /* engineering */
  var engFields=['vehicles','propulsion_types','materializer_quality','engine_temperature','engine_top_p','engine_max_tokens','engine_context','procedural_seed','sim_gravity','sim_atm_density','sim_dt','sim_max_altitude'];
  engFields.forEach(function(f){
    var el=document.getElementById('eng_'+f);
    if(el)c.engineering[f]=el.value;
  });
  var engToggles=['sim_show_vectors','sim_debug','engine_auto_load'];
  engToggles.forEach(function(f){
    var el=document.getElementById('eng_'+f);
    if(el)c.engineering[f]=el.classList.contains('on');
  });
  /* theme */
  var secEl=document.getElementById('thmSecondary');
  if(secEl)c.theme_config.secondary_color=secEl.value;
  var opEl=document.getElementById('thmOpacity');
  if(opEl)c.theme_config.panel_opacity=parseInt(opEl.value);
  var bgEl=document.getElementById('thmBg');
  if(bgEl)c.theme_config.background=bgEl.value;
  /* ollama_service */
  var ollUrlEl=document.getElementById('ollamaBaseUrl');
  if(ollUrlEl)c.ollama_service.base_url=ollUrlEl.value;
  var ollEnabledEl=document.getElementById('ollamaEnabled');
  if(ollEnabledEl)c.ollama_service.enabled=ollEnabledEl.classList.contains('on');
  var ollManagedEl=document.getElementById('ollamaManaged');
  if(ollManagedEl)c.ollama_service.managed=ollManagedEl.classList.contains('on');
  return c;
}

function saveAll(){
  var data=gatherAll();
  var ss=document.getElementById('saveStatus');if(ss)ss.textContent='SAVING...';
  fetch('/api/config',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)})
  .then(function(r){return r.json();}).then(function(){
    toast('Configuration saved successfully');
    var ss2=document.getElementById('saveStatus');if(ss2)ss2.textContent='SAVED '+new Date().toLocaleTimeString();
    loadCfg();
  }).catch(function(e){toast('Save error: '+e.message,true);var ss3=document.getElementById('saveStatus');if(ss3)ss3.textContent='ERROR';});
}

function toggleEl(el){
  el.classList.toggle('on');el.classList.toggle('off');
  el.querySelector('div').style.left=el.classList.contains('on')?'16px':'2px';
  el.querySelector('div').style.background=el.classList.contains('on')?'#0ff':'#666';
  el.style.background=el.classList.contains('on')?'rgba(0,229,255,0.3)':'rgba(255,255,255,0.1)';
}

/* ===== RENDERERS ===== */

function renderGeneral(cfg){
  var h='<div class="section"><div class="section-title">ZICORE SYSTEM v5.0 — GENERAL CONFIGURATION</div>';
  h+='<div class="grid grid-3">';
  h+='<label>Web Port</label><input id="sysWebPort" value="'+(cfg.system&&cfg.system.web_port||4000)+'" type="number">';
  h+='<label>API Port</label><input id="sysAPIPort" value="'+(cfg.system&&cfg.system.api_port||4080)+'" type="number">';
  h+='<label>Log Level</label><select id="sysLogLevel">';
  ['DEBUG','INFO','WARN','ERROR'].forEach(function(l){h+='<option value="'+l+'"'+((cfg.system&&cfg.system.log_level||'INFO')===l?' selected':'')+'>'+l+'</option>';});
  h+='</select>';
  h+='<label>Max Workers</label><input id="sysMaxWorkers" value="'+(cfg.system&&cfg.system.max_workers||4)+'" type="number" min="1" max="16">';
  h+='<label>Active Provider</label><select id="cfgActiveProv">';
  var ap=cfg.zio_engine&&cfg.zio_engine.active_provider||'zicore_native';
  var provs=cfg.providers||{};
  var allProvs=['zicore_native'].concat(PROVIDER_ORDER);
  allProvs.forEach(function(p){
    var pName=provs[p]?provs[p].name||p:p;
    h+='<option value="'+p+'"'+(ap===p?' selected':'')+'>'+pName+'</option>';
  });
  h+='</select>';
  h+='</div></div>';
  document.getElementById('panel-general').innerHTML=h;
}

function renderProviders(cfg){
  var h='';
  var PROVIDER_INFO={
    ollama:{label:'Ollama (Local)',desc:'Modelos locales via Ollama server'},
    openrouter:{label:'OpenRouter',desc:'Acceso a multiples modelos cloud'},
    openai:{label:'OpenAI',desc:'GPT-4, GPT-4o, DALL-E'},
    anthropic:{label:'Anthropic',desc:'Claude 3.5, Claude 3 Opus'},
    groq:{label:'Groq',desc:' inference ultrarrapida (LPU)'},
    deepseek:{label:'DeepSeek',desc:'DeepSeek V3, Coder'},
    together:{label:'Together AI',desc:'Modelos open-source managed'},
    opencode:{label:'OpenCode Zen',desc:'Modelos gratuitos y de pago'},
    tripo3d:{label:'Tripo3D',desc:'Text/Image to 3D — 300 créditos gratis/mes',category:'3D GENERATORS'},
    meshy:{label:'Meshy AI',desc:'Text/Image to 3D — tier gratis disponible',category:'3D GENERATORS'},
    rodin:{label:'Rodin Gen-1',desc:'Image to 3D — tier gratis disponible',category:'3D GENERATORS'},
    openscad:{label:'OpenSCAD',desc:'Motor CSG local —requiere binario en PATH',category:'CAD ENGINES'},
  };
  var LAST_AI_PROVIDER='opencode';
  PROVIDER_ORDER.forEach(function(pid){
    var info=PROVIDER_INFO[pid]||{};
    var p=cfg.providers&&cfg.providers[pid]||{enabled:false,api_key:'',base_url:'',default_model:'',models:[]};
    if(info.category&&pid!=='ollama'){
      h+='<div style="margin:16px 0 8px;padding:6px 10px;border-bottom:1px solid rgba(124,77,255,0.15);font-size:8px;letter-spacing:3px;color:#b388ff">'+info.category+'</div>';
    }
    h+='<div class="section"><div class="section-title purple flex"><span>'+(info.label||p.name||pid).toUpperCase()+'</span>';
    h+='<div class="toggle '+(p.enabled?'on':'off')+'" id="prov_'+pid+'_enabled" onclick="toggleEl(this)"><div></div></div>';
    h+='<span class="fs-7 ls-1 text-2">'+(p.enabled?'ENABLED':'DISABLED')+'</span>';
    h+='<button class="btn btn-test fs-8 ml-auto" onclick="testProvider(\''+pid+'\')">TEST</button>';
    h+='<span class="fs-8" id="testStatus_'+pid+'"></span>';
    h+='</div>';
    if(info.desc){h+='<div style="font-size:8px;color:var(--text2);margin-bottom:8px;letter-spacing:0.5px">'+info.desc+'</div>';}
    h+='<div class="grid grid-2"><label>API Key</label><input id="prov_'+pid+'_api_key" type="password" value="'+(p.api_key||'')+'" placeholder="'+(pid==='openscad'?'No requiere — binario local':'sk-...')+'">';
    h+='<label>Base URL</label><input id="prov_'+pid+'_base_url" value="'+(p.base_url||'')+'" placeholder="'+(pid==='openscad'?'/usr/bin/openscad':(pid==='tripo3d'?'https://api.tri3d.com':(pid==='meshy'?'https://api.meshy.ai':(pid==='rodin'?'https://zrodin.com/api':''))))+'">';
    h+='<label>Default Model</label><input id="prov_'+pid+'_default_model" value="'+(p.default_model||'')+'" placeholder="'+(pid==='tripo3d'?'tripo_v2':(pid==='meshy'?'meshy-4':(pid==='rodin'?'rodin-v1':(pid==='openscad'?'openscad-2021':''))))+'">';
    h+='<label>Available Models</label><textarea rows="3" readonly style="color:var(--text2)">'+(p.models&&p.models.length?p.models.join('\n'):'— none configured —')+'</textarea>';
    h+='</div></div>';
  });
  document.getElementById('panel-providers').innerHTML=h;
}

function renderZIO(cfg){
  var eng=cfg.zio_engine||{};
  var h='<div class="section"><div class="section-title">ZIO AGENT SETTINGS</div>';
  h+='<div class="grid grid-2">';
  h+='<label>Temperature</label><div class="flex gap-4"><input id="cfgTemp" type="range" min="0" max="200" value="'+((eng.temperature||0.7)*100)+'" oninput="document.getElementById(\'cfgTempVal\').textContent=(this.value/100).toFixed(2)"><span class="fs-10 text-glow" id="cfgTempVal">'+(eng.temperature||0.7).toFixed(2)+'</span></div>';
  h+='<label>Max Tokens</label><div class="flex gap-4"><input id="cfgMaxTok" type="range" min="256" max="16384" step="256" value="'+(eng.max_tokens||4096)+'" oninput="document.getElementById(\'cfgMaxTokVal\').textContent=this.value"><span class="fs-10 text-glow" id="cfgMaxTokVal">'+(eng.max_tokens||4096)+'</span></div>';
  h+='<label>Context Length</label><div class="flex gap-4"><input id="cfgCtx" type="range" min="256" max="8192" step="256" value="'+(eng.context_length||4096)+'" oninput="document.getElementById(\'cfgCtxVal\').textContent=this.value"><span class="fs-10 text-glow" id="cfgCtxVal">'+(eng.context_length||4096)+'</span></div>';
  h+='<label>Top P</label><div class="flex gap-4"><input id="cfgTopP" type="range" min="50" max="100" value="'+((eng.top_p||0.9)*100)+'" oninput="document.getElementById(\'cfgTopPVal\').textContent=(this.value/100).toFixed(2)"><span class="fs-10 text-glow" id="cfgTopPVal">'+(eng.top_p||0.9).toFixed(2)+'</span></div>';
  h+='<label>Stream</label><div class="toggle '+(eng.stream!==false?'on':'off')+'" id="cfgStream" onclick="toggleEl(this)"><div></div></div>';
  h+='<label>System Prompt</label><textarea id="cfgSysPrompt" rows="4">'+(eng.system_prompt||'')+'</textarea>';
  h+='</div></div>';

function applyThemePreset(bg, accent, secondary){
  document.documentElement.style.setProperty('--glow', accent);
  document.documentElement.style.setProperty('--glow2', secondary);
  if(document.getElementById('thmAccent')) document.getElementById('thmAccent').value=accent;
  if(document.getElementById('thmSecondary')) document.getElementById('thmSecondary').value=secondary;
  if(document.getElementById('thmBg')){
    var sel={dark:'dark',midnight:'midnight',void:'void',abyss:'abyss',nebula:'nebula',solar:'solar',forest:'forest',arctic:'arctic',mars:'mars'};
    var bgName=bg==='#04060c'?'dark':bg==='#0a0014'?'nebula':bg==='#0c0800'?'solar':bg==='#000c04'?'forest':bg==='#040c0c'?'arctic':bg==='#0c0400'?'mars':'dark';
    document.getElementById('thmBg').value=bgName;
  }
}

  h+='<div id="ollama_fetched_models"></div>';
  h+='</div>';

  /* Remote Providers */
  h+='<div class="section"><div class="section-title purple">REMOTE PROVIDERS</div>';
  h+='<div class="flex" style="gap:8px;align-items:center;margin-bottom:8px">';
  h+='<div class="fs-8 text-2">Cloud APIs. Toggle on/off. Requires API key.</div>';
  h+='<button onclick="fetchAllProviders()" style="padding:2px 8px;font-size:7px;background:rgba(124,77,255,0.15);border:1px solid rgba(124,77,255,0.4);color:#b388ff;border-radius:3px;cursor:pointer">FETCH ALL</button>';
  h+='<span id="fetchAllStatus" class="fs-8 text-2"></span>';
  h+='</div>';
  var remoteProviders=['openai','anthropic','groq','deepseek','together'];
  remoteProviders.forEach(function(rpId){
    var rpCfg=cfg.providers&&cfg.providers[rpId]||{};
    var enabled=rpCfg&&rpCfg.enabled;
    var rpName=rpCfg.name||rpId;
    var rpModels=FETCHED_MODELS[rpId]||(rpCfg.models||[]);
    h+='<div style="margin-bottom:10px;padding:8px;border:1px solid rgba(0,229,255,0.06);border-radius:3px">';
    h+='<div class="flex" style="gap:8px;margin-bottom:6px">';
    h+='<span style="font-size:9px;color:var(--glow);letter-spacing:2px">'+rpName.toUpperCase()+'</span>';
    h+='<div class="toggle '+(enabled?'on':'off')+'" id="prov_'+rpId+'_enabled" onclick="toggleEl(this)"><div></div></div>';
    h+='<span class="fs-7 '+(enabled?'text-glow':'text-2')+'">'+(enabled?'ENABLED':'DISABLED')+'</span>';
    h+='<button onclick="fetchProviderModels(\''+rpId+'\')" style="padding:1px 6px;font-size:6px;background:rgba(0,229,255,0.1);border:1px solid rgba(0,229,255,0.2);color:var(--glow);border-radius:3px;cursor:pointer">FETCH</button>';
    h+='<span id="fetchStatus_'+rpId+'" class="fs-8 text-2"></span>';
    h+='</div>';
    h+='<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:4px">';
    rpModels.forEach(function(m){
      var mName=typeof m==='string'?m:(m.id||m.name||'');
      var free=typeof m==='object'?m.is_free:isFreeModel(mName);
      h+='<div style="display:flex;align-items:center;gap:4px;padding:3px 8px;border:1px solid '+(free?'rgba(0,255,136,0.2)':'rgba(0,229,255,0.08)')+';border-radius:3px;background:'+(free?'rgba(0,255,136,0.04)':'rgba(0,0,0,0.2)')+'">';
      h+='<span style="font-size:8px;color:'+(free?'#50fa7b':'var(--text2)')+';'+(free?'font-weight:bold':'')+'">'+getName(mName)+'</span>';
      if(free)h+='<span class="model-tag tag-free" style="font-size:6px;padding:1px 4px">FREE</span>';
      h+='</div>';
    });
    h+='</div>';
    h+='<div id="'+rpId+'_fetched_models"></div>';
    h+='</div>';
  });
  h+='</div>';

  document.getElementById('panel-models').innerHTML=h;
}

function selectDefaultModel(modelId,radioEl){
  if(CONFIG&&CONFIG.zio_engine)CONFIG.zio_engine.active_model=modelId;
  document.querySelectorAll('[name=default_model_select]').forEach(function(el){el.closest('.model-item').classList.remove('selected');});
  if(radioEl)radioEl.closest('.model-item').classList.add('selected');
}

function renderChats(cfg){
  var h='';

  /* Import Chat */
  h+='<div class="section"><div class="section-title">IMPORT CHAT</div>';
  h+='<div class="fs-8 text-2 mb-8">Import conversation history from external platforms (ChatGPT, Grok, Claude, Gemini).</div>';
  h+='<div class="upload-zone" id="chatUploadZone" onclick="document.getElementById(\'chatFileInput\').click()">';
  h+='<input type="file" id="chatFileInput" accept=".json,.jsonl,.csv" onchange="handleChatImport(this.files)">';
  h+='<div class="upload-label">DROP FILE OR CLICK TO UPLOAD</div>';
  h+='<div class="upload-hint">Supports: ChatGPT (.json), Grok (.json), Claude (.json), Gemini (.jsonl)</div>';
  h+='</div>';
  h+='<div id="importStatus" class="mt-8 fs-8"></div>';
  h+='</div>';

  /* Chat History */
  h+='<div class="section"><div class="section-title purple">CHAT HISTORY</div>';
  h+='<div class="fs-8 text-2 mb-8">Recent conversations and messages from the knowledge base.</div>';
  h+='<div id="chatHistoryList"><span class="fs-8 text-2">Loading...</span></div>';
  h+='</div>';

  /* Sessions */
  h+='<div class="section"><div class="section-title green">SESSIONS</div>';
  h+='<div class="fs-8 text-2 mb-8">Conversations grouped by session.</div>';
  h+='<div id="chatSessionList"><span class="fs-8 text-2">Loading...</span></div>';
  h+='</div>';

  document.getElementById('panel-chats').innerHTML=h;
  loadChatHistory();
}

function handleChatImport(files){
  if(!files||!files.length)return;
  var file=files[0];
  var statusEl=document.getElementById('importStatus');
  statusEl.innerHTML='<span class="text-glow">Importing: '+file.name+'...</span>';
  var formData=new FormData();
  formData.append('file',file);
  fetch('/api/zio/import',{method:'POST',body:formData}).then(function(r){return r.json();}).then(function(d){
    if(d.status==='ok'||d.imported!==undefined){
      statusEl.innerHTML='<span class="status-ok">Imported successfully'+(d.imported?' ('+d.imported+' messages)':'')+'</span>';
      loadChatHistory();
    }else{
      statusEl.innerHTML='<span class="status-err">'+(d.error||'Import failed')+'</span>';
    }
  }).catch(function(e){
    statusEl.innerHTML='<span class="status-err">Error: '+e.message+'</span>';
  });
}

function loadChatHistory(){
  fetch('/api/knowledge/conversations').then(function(r){return r.json();}).then(function(d){
    var conversations=d.conversations||d||[];
    var histEl=document.getElementById('chatHistoryList');
    var sessEl=document.getElementById('chatSessionList');
    if(!conversations.length){
      histEl.innerHTML='<span class="fs-8 text-2">No conversations found.</span>';
      sessEl.innerHTML='<span class="fs-8 text-2">No sessions found.</span>';
      return;
    }
    /* Recent messages */
    var recent=conversations.slice(-10).reverse();
    var html='';
    recent.forEach(function(c){
      html+='<div class="chat-item">';
      var role=c.role||'user';
      html+='<div class="chat-role '+role+'">'+role.toUpperCase()+'</div>';
      html+='<div class="chat-msg">'+escapeHtml((c.content||c.message||'').substring(0,200))+((c.content||c.message||'').length>200?'...':'')+'</div>';
      if(c.timestamp||c.created_at)html+='<div class="chat-time">'+new Date(c.timestamp||c.created_at).toLocaleString()+'</div>';
      html+='</div>';
    });
    histEl.innerHTML=html;

    /* Sessions */
    var sessions={};
    conversations.forEach(function(c){
      var sid=c.session_id||'default';
      if(!sessions[sid])sessions[sid]=[];
      sessions[sid].push(c);
    });
    var sh='';
    Object.keys(sessions).forEach(function(sid){
      var msgs=sessions[sid];
      sh+='<div class="session-group">';
      sh+='<div class="session-title">SESSION: '+sid.substring(0,12)+'... ('+msgs.length+' messages)</div>';
      var last=msgs.slice(-3);
      last.forEach(function(c){
        var role=c.role||'user';
        sh+='<div class="chat-item">';
        sh+='<div class="chat-role '+role+'">'+role.toUpperCase()+'</div>';
        sh+='<div class="chat-msg">'+escapeHtml((c.content||c.message||'').substring(0,120))+'</div>';
        sh+='</div>';
      });
      sh+='</div>';
    });
    sessEl.innerHTML=sh;
  }).catch(function(){
    document.getElementById('chatHistoryList').innerHTML='<span class="status-err fs-8">Could not load conversations.</span>';
    document.getElementById('chatSessionList').innerHTML='<span class="status-err fs-8">Could not load sessions.</span>';
  });
}

function escapeHtml(str){
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function testProvider(pid){
  var statusEl=document.getElementById('testStatus_'+pid);
  statusEl.textContent='Testing...';statusEl.className='fs-8 status-idle';
  fetch('/api/config/test-provider/'+pid,{method:'POST'}).then(function(r){return r.json();}).then(function(d){
    if(d.status==='connected'){statusEl.textContent='OK ('+d.model+', '+d.available_models.length+' models)';statusEl.className='fs-8 status-ok';}
    else if(d.status==='configured'){statusEl.textContent='OK ('+d.model+')';statusEl.className='fs-8 status-ok';}
    else if(d.status==='disabled'){statusEl.textContent='DISABLED';statusEl.className='fs-8 status-idle';}
    else if(d.status==='no_api_key'){statusEl.textContent='NO API KEY';statusEl.className='fs-8 status-warn';}
    else{statusEl.textContent='ERROR';statusEl.className='fs-8 status-err';}
  }).catch(function(){statusEl.textContent='FAILED';statusEl.className='fs-8 status-err';});
}
