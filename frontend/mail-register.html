<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZICORE Mail - Crear Cuenta</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#060a12;--card:#0d1117;--border:#1a2332;--glow:#00e5ff;--purple:#7c4dff;--green:#00ff88;--text:#e0e0e0;--text2:#607080;--error:#ff5555;--success:#50fa7b}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden}
body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(ellipse at 50% 0%,rgba(0,229,255,0.03) 0%,transparent 70%);pointer-events:none;z-index:0}
.container{position:relative;z-index:1;width:100%;max-width:480px;padding:20px}
.logo{text-align:center;margin-bottom:32px}
.logo-icon{width:80px;height:80px;margin:0 auto 16px;background:linear-gradient(135deg,var(--glow),var(--purple));border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:900;color:#000;box-shadow:0 0 40px rgba(0,229,255,0.3);animation:pulse 3s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 40px rgba(0,229,255,0.3)}50%{box-shadow:0 0 60px rgba(0,229,255,0.5)}}
.logo h1{font-size:24px;font-weight:700;background:linear-gradient(90deg,var(--glow),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:3px}
.logo p{color:var(--text2);font-size:12px;margin-top:4px;letter-spacing:1px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:32px;backdrop-filter:blur(20px)}
.card h2{font-size:20px;font-weight:600;margin-bottom:4px;color:var(--text)}
.card .subtitle{color:var(--text2);font-size:13px;margin-bottom:24px}
.form-group{margin-bottom:16px;position:relative}
.form-group label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;letter-spacing:0.5px;text-transform:uppercase}
.form-group input{width:100%;padding:12px 16px;background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;transition:all 0.3s}
.form-group input:focus{outline:none;border-color:var(--glow);box-shadow:0 0 0 3px rgba(0,229,255,0.1)}
.form-group input.error{border-color:var(--error)}
.form-group .error-msg{color:var(--error);font-size:11px;margin-top:4px;display:none}
.form-group .error-msg.show{display:block}
.email-input{display:flex;gap:0}
.email-input input{flex:1;border-radius:8px 0 0 8px}
.email-input .domain{padding:12px 16px;background:rgba(0,229,255,0.08);border:1px solid var(--border);border-left:none;border-radius:0 8px 8px 0;color:var(--glow);font-size:14px;font-weight:600;white-space:nowrap}
.username-status{position:absolute;right:12px;top:38px;font-size:11px;font-weight:600}
.username-status.available{color:var(--success)}
.username-status.taken{color:var(--error)}
.password-strength{display:flex;gap:4px;margin-top:6px}
.password-strength .bar{flex:1;height:3px;background:var(--border);border-radius:2px;transition:background 0.3s}
.password-strength .bar.active{background:var(--error)}
.password-strength .bar.medium{background:#ffa500}
.password-strength .bar.strong{background:var(--success)}
.btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--glow),var(--purple));border:none;border-radius:8px;color:#000;font-size:14px;font-weight:700;cursor:pointer;transition:all 0.3s;letter-spacing:1px;text-transform:uppercase;margin-top:8px}
.btn:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,229,255,0.4)}
.btn:active{transform:translateY(0)}
.btn:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.btn .spinner{display:inline-block;width:16px;height:16px;border:2px solid transparent;border-top-color:#000;border-radius:50%;animation:spin 0.6s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.divider{text-align:center;margin:20px 0;position:relative}
.divider::before{content:'';position:absolute;left:0;top:50%;width:100%;height:1px;background:var(--border)}
.divider span{position:relative;background:var(--card);padding:0 16px;color:var(--text2);font-size:12px}
.links{text-align:center;margin-top:20px;font-size:13px;color:var(--text2)}
.links a{color:var(--glow);text-decoration:none;font-weight:600}
.links a:hover{text-decoration:underline}
.toast{position:fixed;top:20px;right:20px;padding:12px 20px;border-radius:8px;font-size:13px;font-weight:600;z-index:1000;transform:translateX(120%);transition:transform 0.3s}
.toast.show{transform:translateX(0)}
.toast.success{background:rgba(80,250,123,0.15);border:1px solid rgba(80,250,123,0.3);color:var(--success)}
.toast.error{background:rgba(255,85,85,0.15);border:1px solid rgba(255,85,85,0.3);color:var(--error)}
.terms{font-size:11px;color:var(--text2);margin-top:16px;text-align:center;line-height:1.5}
.terms a{color:var(--glow);text-decoration:none}
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    <div class="logo-icon">Z</div>
    <h1>ZICORE MAIL</h1>
    <p>zinemotion.com.mx</p>
  </div>

  <div class="card" id="registerCard">
    <h2>Crear Cuenta</h2>
    <p class="subtitle">Crea tu correo @zinemotion.com.mx</p>

    <div class="form-group">
      <label>Nombre completo</label>
      <input type="text" id="regName" placeholder="Tu nombre" autocomplete="name">
      <div class="error-msg" id="nameError"></div>
    </div>

    <div class="form-group">
      <label>Usuario</label>
      <div class="email-input">
        <input type="text" id="regUsername" placeholder="usuario" autocomplete="username" oninput="checkUsername()">
        <div class="domain">@zinemotion.com.mx</div>
      </div>
      <div class="username-status" id="usernameStatus"></div>
      <div class="error-msg" id="usernameError"></div>
    </div>

    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" id="regPassword" placeholder="Min. 8 caracteres" autocomplete="new-password" oninput="checkPasswordStrength()">
      <div class="password-strength" id="passwordStrength">
        <div class="bar" id="str1"></div>
        <div class="bar" id="str2"></div>
        <div class="bar" id="str3"></div>
        <div class="bar" id="str4"></div>
      </div>
      <div class="error-msg" id="passwordError"></div>
    </div>

    <div class="form-group">
      <label>Confirmar contraseña</label>
      <input type="password" id="regConfirm" placeholder="Repite tu contraseña" autocomplete="new-password">
      <div class="error-msg" id="confirmError"></div>
    </div>

    <button class="btn" id="registerBtn" onclick="doRegister()">CREAR CUENTA</button>

    <div class="terms">
      Al crear una cuenta aceptas los <a href="#">Términos de Servicio</a> y la <a href="#">Política de Privacidad</a>.
    </div>

    <div class="divider"><span>o</span></div>

    <div class="links">
      ¿Ya tienes cuenta? <a href="/mail">Iniciar sesión</a>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var usernameTimeout=null;

function showToast(msg,type){
  var t=document.getElementById('toast');
  t.textContent=msg;t.className='toast '+type+' show';
  setTimeout(function(){t.classList.remove('show')},4000);
}

function clearErrors(){
  document.querySelectorAll('.error-msg').forEach(function(e){e.classList.remove('show');e.textContent=''});
  document.querySelectorAll('input').forEach(function(e){e.classList.remove('error')});
}

function showError(fieldId,msg){
  var el=document.getElementById(fieldId);
  if(el){el.textContent=msg;el.classList.add('show');}
}

function checkUsername(){
  var username=document.getElementById('regUsername').value.trim();
  var statusEl=document.getElementById('usernameStatus');
  if(usernameTimeout)clearTimeout(usernameTimeout);
  if(!username){statusEl.textContent='';statusEl.className='username-status';return;}
  if(!/^[a-z0-9._-]+$/.test(username)){
    statusEl.textContent='Invalido';statusEl.className='username-status taken';return;
  }
  statusEl.textContent='...';statusEl.className='username-status';
  usernameTimeout=setTimeout(function(){
    fetch('/api/mail/check-username?username='+encodeURIComponent(username))
      .then(function(r){return r.json()}).then(function(d){
        if(d.available){statusEl.textContent='Disponible';statusEl.className='username-status available';}
        else{statusEl.textContent='Ocupado';statusEl.className='username-status taken';}
      }).catch(function(){statusEl.textContent='';statusEl.className='username-status';});
  },400);
}

function checkPasswordStrength(){
  var pw=document.getElementById('regPassword').value;
  var bars=[document.getElementById('str1'),document.getElementById('str2'),document.getElementById('str3'),document.getElementById('str4')];
  var score=0;
  if(pw.length>=8)score++;
  if(pw.length>=12)score++;
  if(/[A-Z]/.test(pw)&&/[a-z]/.test(pw))score++;
  if(/[0-9]/.test(pw)&&/[^A-Za-z0-9]/.test(pw))score++;
  bars.forEach(function(b,i){
    b.className='bar';
    if(i<score){
      if(score<=1)b.classList.add('active');
      else if(score<=2)b.classList.add('medium');
      else b.classList.add('strong');
    }
  });
}

function doRegister(){
  clearErrors();
  var name=document.getElementById('regName').value.trim();
  var username=document.getElementById('regUsername').value.trim();
  var password=document.getElementById('regPassword').value;
  var confirm=document.getElementById('regConfirm').value;
  var btn=document.getElementById('registerBtn');
  var valid=true;

  if(!name||name.length<2){showError('nameError','Nombre requerido (min. 2 caracteres)');valid=false;}
  if(!username){showError('usernameError','Usuario requerido');valid=false;}
  else if(!/^[a-z0-9._-]+$/.test(username)){showError('usernameError','Solo minusculas, numeros, puntos, guiones');valid=false;}
  if(!password||password.length<8){showError('passwordError','Minimo 8 caracteres');valid=false;}
  if(password!==confirm){showError('confirmError','Las contraseñas no coinciden');valid=false;}
  if(!valid)return;

  btn.disabled=true;
  btn.innerHTML='<span class="spinner"></span>Creando cuenta...';

  var email=username+'@zinemotion.com.mx';
  fetch('/api/mail/register',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({email:email,password:password,confirm_password:confirm,name:name})
  }).then(function(r){return r.json()}).then(function(d){
    if(d.status==='ok'){
      showToast('Cuenta creada exitosamente: '+email,'success');
      document.getElementById('registerCard').innerHTML=
        '<div style="text-align:center;padding:20px 0">'+
        '<div style="font-size:48px;margin-bottom:16px">&#10003;</div>'+
        '<h2 style="color:var(--success);margin-bottom:8px">Cuenta Creada</h2>'+
        '<p style="color:var(--text2);margin-bottom:4px">'+email+'</p>'+
        '<p style="color:var(--text2);font-size:13px;margin-bottom:24px">Tu correo esta listo para usar</p>'+
        '<a href="/mail" style="display:inline-block;padding:12px 32px;background:linear-gradient(135deg,var(--glow),var(--purple));border-radius:8px;color:#000;font-weight:700;text-decoration:none">Abrir Mail</a>'+
        '</div>';
    }else{
      showToast(d.error||'Error al crear cuenta','error');
      btn.disabled=false;btn.textContent='CREAR CUENTA';
    }
  }).catch(function(e){
    showToast('Error de conexion: '+e.message,'error');
    btn.disabled=false;btn.textContent='CREAR CUENTA';
  });
}

document.querySelectorAll('input').forEach(function(el){
  el.addEventListener('keypress',function(e){if(e.key==='Enter')doRegister();});
});
</script>
</body>
</html>
