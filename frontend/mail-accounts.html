<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZICORE Mail - Configuracion de Cuentas</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#080c14;--card:#0d1520;--border:#1a2535;--accent:#00e5ff;--accent2:#7c4dff;--green:#00ff88;--red:#ff3860;--text:#e0e6ed;--text2:#8899aa;--glass:rgba(13,21,32,0.85)}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.topbar{background:rgba(8,12,20,0.95);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(20px)}
.topbar h1{font-size:18px;font-weight:600;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.topbar .nav-links{display:flex;gap:12px}
.topbar .nav-links a{color:var(--text2);text-decoration:none;font-size:13px;padding:6px 12px;border-radius:6px;transition:all 0.2s}
.topbar .nav-links a:hover,.topbar .nav-links a.active{color:var(--accent);background:rgba(0,229,255,0.1)}
.container{max-width:1200px;margin:0 auto;padding:24px}
.section{margin-bottom:32px}
.section-title{font-size:16px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.section-title .icon{font-size:20px}
.section-title .badge{background:var(--accent);color:#000;font-size:11px;padding:2px 8px;border-radius:10px;font-weight:700}

/* Provider Presets */
.presets-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-bottom:24px}
.preset-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center;cursor:pointer;transition:all 0.3s cubic-bezier(0.4,0,0.2,1)}
.preset-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,229,255,0.15)}
.preset-card .preset-icon{font-size:28px;margin-bottom:8px}
.preset-card .preset-name{font-size:13px;font-weight:500;color:var(--text)}
.preset-card.custom{border-style:dashed;color:var(--text2)}

/* Account Cards */
.accounts-list{display:flex;flex-direction:column;gap:12px}
.account-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;display:grid;grid-template-columns:1fr auto;gap:16px;align-items:center;transition:all 0.2s}
.account-card:hover{border-color:rgba(0,229,255,0.3)}
.account-info{display:flex;flex-direction:column;gap:6px}
.account-name{font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px}
.account-email{font-size:13px;color:var(--text2)}
.account-details{display:flex;gap:16px;font-size:12px;color:var(--text2)}
.account-details span{display:flex;align-items:center;gap:4px}
.account-details .proto{background:rgba(0,229,255,0.15);color:var(--accent);padding:2px 8px;border-radius:4px;font-weight:600;text-transform:uppercase;font-size:11px}
.account-actions{display:flex;gap:8px}
.btn{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:500;transition:all 0.2s;display:flex;align-items:center;gap:6px}
.btn-primary{background:var(--accent);color:#000}.btn-primary:hover{background:#33ecff}
.btn-secondary{background:rgba(255,255,255,0.05);color:var(--text);border:1px solid var(--border)}.btn-secondary:hover{background:rgba(255,255,255,0.1)}
.btn-danger{background:rgba(255,56,96,0.15);color:var(--red);border:1px solid rgba(255,56,96,0.3)}.btn-danger:hover{background:rgba(255,56,96,0.25)}
.btn-success{background:rgba(0,255,136,0.15);color:var(--green);border:1px solid rgba(0,255,136,0.3)}.btn-success:hover{background:rgba(0,255,136,0.25)}
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.status-dot.connected{background:var(--green);box-shadow:0 0 8px var(--green)}
.status-dot.error{background:var(--red);box-shadow:0 0 8px var(--red)}
.status-dot.configured{background:var(--accent);box-shadow:0 0 8px var(--accent)}

/* Modal */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal-overlay.active{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:16px;width:560px;max-width:95vw;max-height:90vh;overflow-y:auto;padding:28px}
.modal h2{font-size:18px;margin-bottom:20px;display:flex;align-items:center;gap:8px}
.modal-close{position:absolute;top:16px;right:16px;background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
input,select{width:100%;padding:10px 14px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;transition:border-color 0.2s}
input:focus,select:focus{outline:none;border-color:var(--accent)}
input::placeholder{color:var(--text2);opacity:0.5}
.checkbox-row{display:flex;align-items:center;gap:8px;font-size:13px}
.checkbox-row input[type=checkbox]{width:auto;accent-color:var(--accent)}
.form-actions{display:flex;gap:10px;margin-top:24px;justify-content:flex-end}

/* Test Result */
.test-result{margin-top:12px;padding:12px;border-radius:8px;font-size:13px;display:none}
.test-result.show{display:block}
.test-result.success{background:rgba(0,255,136,0.1);border:1px solid rgba(0,255,136,0.3);color:var(--green)}
.test-result.error{background:rgba(255,56,96,0.1);border:1px solid rgba(255,56,96,0.3);color:var(--red)}
.test-result .test-item{margin-bottom:6px}
.test-result .test-label{font-weight:600}

/* Sync Status */
.sync-info{font-size:11px;color:var(--text2);margin-top:4px}

/* Empty State */
.empty-state{text-align:center;padding:48px;color:var(--text2)}
.empty-state .icon{font-size:48px;margin-bottom:16px;opacity:0.5}
.empty-state p{font-size:14px;margin-bottom:20px}

/* Loading */
.spinner{width:16px;height:16px;border:2px solid transparent;border-top:2px solid var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="topbar">
  <h1>✉️ ZICORE Mail — Configuracion de Cuentas</h1>
  <div class="nav-links">
    <a href="/mail-portal">Portal</a>
    <a href="/mail">Bandeja</a>
    <a href="/mail-accounts" class="active">Cuentas</a>
    <a href="/settings">Configuracion</a>
  </div>
</div>

<div class="container">
  <!-- Quick Add Presets -->
  <div class="section">
    <div class="section-title"><span class="icon">⚡</span> Agregar rapido</div>
    <div class="presets-grid" id="presetsGrid"></div>
  </div>

  <!-- Configured Accounts -->
  <div class="section">
    <div class="section-title">
      <span class="icon">📧</span> Cuentas configuradas
      <span class="badge" id="accountCount">0</span>
    </div>
    <div class="accounts-list" id="accountsList">
      <div class="empty-state">
        <div class="icon">📭</div>
        <p>No hay cuentas configuradas.<br>Selecciona un proveedor arriba para agregar una.</p>
      </div>
    </div>
  </div>
</div>

<!-- Add/Edit Account Modal -->
<div class="modal-overlay" id="accountModal">
  <div class="modal">
    <h2 id="modalTitle">➕ Agregar cuenta de correo</h2>
    
    <div class="form-group">
      <label>Nombre de la cuenta</label>
      <input type="text" id="accName" placeholder="Mi correo personal">
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="accEmail" placeholder="usuario@ejemplo.com">
      </div>
      <div class="form-group">
        <label>Contrasena / App Password</label>
        <input type="password" id="accPassword" placeholder="Contraseña o App Password">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Protocolo</label>
        <select id="accProtocol">
          <option value="imap">IMAP (recomendado)</option>
          <option value="pop3">POP3</option>
        </select>
      </div>
      <div class="form-group">
        <label>Sincronizar</label>
        <select id="accSyncInterval">
          <option value="60">Cada minuto</option>
          <option value="300" selected>Cada 5 minutos</option>
          <option value="900">Cada 15 minutos</option>
          <option value="3600">Cada hora</option>
          <option value="0">Manual</option>
        </select>
      </div>
    </div>

    <div style="font-size:12px;font-weight:600;color:var(--text2);margin:16px 0 8px;text-transform:uppercase;letter-spacing:0.5px">
      Servidor de entrada (IMAP/POP3)
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Servidor</label>
        <input type="text" id="accServer" placeholder="imap.gmail.com">
      </div>
      <div class="form-group">
        <label>Puerto</label>
        <input type="number" id="accPort" value="993">
      </div>
    </div>
    <div class="form-group">
      <div class="checkbox-row">
        <input type="checkbox" id="accSSL" checked>
        <label for="accSSL">SSL/TLS (cifrado)</label>
      </div>
    </div>

    <div style="font-size:12px;font-weight:600;color:var(--text2);margin:16px 0 8px;text-transform:uppercase;letter-spacing:0.5px">
      Servidor de salida (SMTP)
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Servidor SMTP</label>
        <input type="text" id="accSMTPServer" placeholder="smtp.gmail.com">
      </div>
      <div class="form-group">
        <label>Puerto SMTP</label>
        <input type="number" id="accSMTPPort" value="465">
      </div>
    </div>
    <div class="form-group">
      <div class="checkbox-row">
        <input type="checkbox" id="accSMTPSSL" checked>
        <label for="accSMTPSSL">SSL/TLS (cifrado)</label>
      </div>
    </div>

    <div class="test-result" id="testResult"></div>

    <div class="form-actions">
      <button class="btn btn-secondary" onclick="testAccount()">🔌 Probar conexion</button>
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveAccount()" id="saveBtn">💾 Guardar</button>
    </div>
  </div>
</div>

<script>
const API = '';
let accounts = [];
let editingId = null;
let selectedPreset = null;

// Provider presets
const PROVIDERS = [
  {id:'gmail',name:'Gmail',icon:'📧',protocol:'imap',server:'imap.gmail.com',port:993,ssl:true,smtp_server:'smtp.gmail.com',smtp_port:465,smtp_ssl:true},
  {id:'outlook',name:'Outlook',icon:'📨',protocol:'imap',server:'outlook.office365.com',port:993,ssl:true,smtp_server:'smtp.office365.com',smtp_port:587,smtp_ssl:false},
  {id:'yahoo',name:'Yahoo',icon:'📬',protocol:'imap',server:'imap.mail.yahoo.com',port:993,ssl:true,smtp_server:'smtp.mail.yahoo.com',smtp_port:465,smtp_ssl:true},
  {id:'icloud',name:'iCloud',icon:'🍎',protocol:'imap',server:'imap.mail.me.com',port:993,ssl:true,smtp_server:'smtp.mail.me.com',smtp_port:587,smtp_ssl:false},
  {id:'zoho',name:'Zoho',icon:'✉️',protocol:'imap',server:'imap.zoho.com',port:993,ssl:true,smtp_server:'smtp.zoho.com',smtp_port:465,smtp_ssl:true},
  {id:'aol',name:'AOL',icon:'📮',protocol:'imap',server:'imap.aol.com',port:993,ssl:true,smtp_server:'smtp.aol.com',smtp_port:465,smtp_ssl:true},
  {id:'proton',name:'ProtonMail',icon:'🔒',protocol:'imap',server:'127.0.0.1',port:1143,ssl:false,smtp_server:'127.0.0.1',smtp_port:1025,smtp_ssl:false},
  {id:'custom',name:'Otro...',icon:'⚙️',protocol:'imap',server:'',port:993,ssl:true,smtp_server:'',smtp_port:587,smtp_ssl:false},
];

// Init
async function init() {
  renderPresets();
  await loadAccounts();
}

function renderPresets() {
  const grid = document.getElementById('presetsGrid');
  grid.innerHTML = PROVIDERS.map(p => `
    <div class="preset-card ${p.id === 'custom' ? 'custom' : ''}" onclick="selectPreset('${p.id}')">
      <div class="preset-icon">${p.icon}</div>
      <div class="preset-name">${p.name}</div>
    </div>
  `).join('');
}

function selectPreset(id) {
  const p = PROVIDERS.find(x => x.id === id);
  if (!p) return;
  selectedPreset = p;
  editingId = null;
  document.getElementById('modalTitle').textContent = `➕ Agregar ${p.name}`;
  document.getElementById('saveBtn').textContent = '💾 Guardar';
  document.getElementById('accName').value = '';
  document.getElementById('accEmail').value = '';
  document.getElementById('accPassword').value = '';
  document.getElementById('accProtocol').value = p.protocol;
  document.getElementById('accServer').value = p.server;
  document.getElementById('accPort').value = p.port;
  document.getElementById('accSSL').checked = p.ssl;
  document.getElementById('accSMTPServer').value = p.smtp_server;
  document.getElementById('accSMTPPort').value = p.smtp_port;
  document.getElementById('accSMTPSSL').checked = p.smtp_ssl;
  document.getElementById('testResult').className = 'test-result';
  document.getElementById('accountModal').classList.add('active');
  document.getElementById('accEmail').focus();
}

async function loadAccounts() {
  try {
    const resp = await fetch(`${API}/api/mail/accounts`);
    const data = await resp.json();
    accounts = data.accounts || [];
    document.getElementById('accountCount').textContent = accounts.length;
    renderAccounts();
  } catch(e) { console.error(e); }
}

function renderAccounts() {
  const list = document.getElementById('accountsList');
  if (!accounts.length) {
    list.innerHTML = `<div class="empty-state"><div class="icon">📭</div><p>No hay cuentas configuradas.<br>Selecciona un proveedor arriba para agregar una.</p></div>`;
    return;
  }
  list.innerHTML = accounts.map(a => `
    <div class="account-card">
      <div class="account-info">
        <div class="account-name">
          <span class="status-dot ${a.status === 'connected' ? 'connected' : a.status === 'error' ? 'error' : 'configured'}"></span>
          ${a.name || a.email}
        </div>
        <div class="account-email">${a.email}</div>
        <div class="account-details">
          <span class="proto">${a.protocol.toUpperCase()}</span>
          <span>📥 ${a.server}:${a.port}</span>
          <span>📤 ${a.smtp_server}:${a.smtp_port}</span>
          <span>${a.ssl ? '🔒 SSL' : '🔓 Sin SSL'}</span>
        </div>
        <div class="sync-info">
          ${a.sync_enabled ? `⏱ Sincronizar cada ${a.sync_interval}s` : '⏸ Sincronizacion manual'}
          ${a.last_sync ? ` · Ultimo sync: ${new Date(a.last_sync).toLocaleString()}` : ''}
        </div>
      </div>
      <div class="account-actions">
        <button class="btn btn-secondary" onclick="testAccountById('${a.id}')">🔌 Probar</button>
        <button class="btn btn-secondary" onclick="editAccount('${a.id}')">✏️ Editar</button>
        <button class="btn btn-danger" onclick="deleteAccount('${a.id}')">🗑️</button>
      </div>
    </div>
  `).join('');
}

function editAccount(id) {
  const a = accounts.find(x => x.id === id);
  if (!a) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = `✏️ Editar ${a.name || a.email}`;
  document.getElementById('saveBtn').textContent = '💾 Actualizar';
  document.getElementById('accName').value = a.name || '';
  document.getElementById('accEmail').value = a.email;
  document.getElementById('accPassword').value = '';
  document.getElementById('accProtocol').value = a.protocol;
  document.getElementById('accServer').value = a.server;
  document.getElementById('accPort').value = a.port;
  document.getElementById('accSSL').checked = a.ssl;
  document.getElementById('accSMTPServer').value = a.smtp_server;
  document.getElementById('accSMTPPort').value = a.smtp_port;
  document.getElementById('accSMTPSSL').checked = a.smtp_ssl;
  document.getElementById('accSyncInterval').value = a.sync_interval;
  document.getElementById('testResult').className = 'test-result';
  document.getElementById('accountModal').classList.add('active');
}

async function saveAccount() {
  const data = {
    name: document.getElementById('accName').value,
    email: document.getElementById('accEmail').value,
    password: document.getElementById('accPassword').value,
    protocol: document.getElementById('accProtocol').value,
    server: document.getElementById('accServer').value,
    port: parseInt(document.getElementById('accPort').value),
    ssl: document.getElementById('accSSL').checked,
    smtp_server: document.getElementById('accSMTPServer').value,
    smtp_port: parseInt(document.getElementById('accSMTPPort').value),
    smtp_ssl: document.getElementById('accSMTPSSL').checked,
    sync_interval: parseInt(document.getElementById('accSyncInterval').value),
    sync_enabled: parseInt(document.getElementById('accSyncInterval').value) > 0,
  };

  if (!data.email || !data.server) {
    alert('Email y servidor son requeridos');
    return;
  }

  // If editing and no new password, remove it
  if (editingId && !data.password) delete data.password;

  try {
    const url = editingId ? `${API}/api/mail/accounts/${editingId}` : `${API}/api/mail/accounts`;
    const method = editingId ? 'PUT' : 'POST';
    const resp = await fetch(url, {method, headers:{'Content-Type':'application/json'}, body: JSON.stringify(data)});
    const result = await resp.json();
    if (result.status === 'ok') {
      closeModal();
      await loadAccounts();
    } else {
      alert(result.error || 'Error guardando cuenta');
    }
  } catch(e) { alert('Error: ' + e.message); }
}

async function testAccount() {
  const data = {
    email: document.getElementById('accEmail').value,
    password: document.getElementById('accPassword').value,
    protocol: document.getElementById('accProtocol').value,
    server: document.getElementById('accServer').value,
    port: parseInt(document.getElementById('accPort').value),
    ssl: document.getElementById('accSSL').checked,
    smtp_server: document.getElementById('accSMTPServer').value,
    smtp_port: parseInt(document.getElementById('accSMTPPort').value),
    smtp_ssl: document.getElementById('accSMTPSSL').checked,
  };

  const tr = document.getElementById('testResult');
  tr.className = 'test-result show';
  tr.innerHTML = '<div class="test-item"><span class="spinner"></span> Probando conexion...</div>';

  // Save temporarily to test
  try {
    let tempId = editingId;
    if (!tempId) {
      const resp = await fetch(`${API}/api/mail/accounts`, {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({...data, name:'_temp', sync_enabled:false})});
      const r = await resp.json();
      tempId = r.account?.id;
    }
    if (!tempId) { tr.className = 'test-result show error'; tr.innerHTML = 'Error creating temp account'; return; }

    const resp = await fetch(`${API}/api/mail/accounts/${tempId}/test`, {method:'POST'});
    const result = await resp.json();
    
    const imapR = result.result?.imap;
    const smtpR = result.result?.smtp;
    tr.innerHTML = `
      <div class="test-item"><span class="test-label">📥 ${data.protocol.toUpperCase()}:</span> ${imapR?.status === 'ok' ? '✅ ' + imapR.message : '❌ ' + imapR?.message}</div>
      <div class="test-item"><span class="test-label">📤 SMTP:</span> ${smtpR?.status === 'ok' ? '✅ ' + smtpR.message : '❌ ' + smtpR?.message}</div>
    `;
    tr.className = `test-result show ${(imapR?.status === 'ok' && smtpR?.status === 'ok') ? 'success' : 'error'}`;

    // Delete temp if not editing
    if (!editingId) {
      await fetch(`${API}/api/mail/accounts/${tempId}`, {method:'DELETE'});
    }
  } catch(e) {
    tr.className = 'test-result show error';
    tr.innerHTML = `❌ Error: ${e.message}`;
  }
}

async function testAccountById(id) {
  const tr = document.getElementById('testResult');
  document.getElementById('modalTitle').textContent = '🔌 Probando conexion...';
  document.getElementById('accountModal').classList.add('active');
  tr.className = 'test-result show';
  tr.innerHTML = '<div class="test-item"><span class="spinner"></span> Probando conexion...</div>';

  try {
    const resp = await fetch(`${API}/api/mail/accounts/${id}/test`, {method:'POST'});
    const result = await resp.json();
    const imapR = result.result?.imap;
    const smtpR = result.result?.smtp;
    tr.innerHTML = `
      <div class="test-item"><span class="test-label">📥 IMAP/POP3:</span> ${imapR?.status === 'ok' ? '✅ ' + imapR.message : '❌ ' + imapR?.message}</div>
      <div class="test-item"><span class="test-label">📤 SMTP:</span> ${smtpR?.status === 'ok' ? '✅ ' + smtpR.message : '❌ ' + smtpR?.message}</div>
    `;
    tr.className = `test-result show ${(imapR?.status === 'ok' && smtpR?.status === 'ok') ? 'success' : 'error'}`;
    document.getElementById('modalTitle').textContent = '🔌 Resultado de prueba';
  } catch(e) {
    tr.className = 'test-result show error';
    tr.innerHTML = `❌ Error: ${e.message}`;
  }
}

async function deleteAccount(id) {
  if (!confirm('Eliminar esta cuenta de correo?')) return;
  try {
    await fetch(`${API}/api/mail/accounts/${id}`, {method:'DELETE'});
    await loadAccounts();
  } catch(e) { alert('Error: ' + e.message); }
}

function closeModal() {
  document.getElementById('accountModal').classList.remove('active');
  editingId = null;
  selectedPreset = null;
}

// Auto-detect provider from email
document.getElementById('accEmail').addEventListener('blur', function() {
  const email = this.value;
  if (!email || editingId) return;
  const domain = email.split('@')[1]?.toLowerCase();
  const preset = PROVIDERS.find(p => domain?.includes(p.id));
  if (preset && preset.id !== 'custom') {
    selectPreset(preset.id);
    document.getElementById('accEmail').value = email;
  }
});

// Close modal on overlay click
document.getElementById('accountModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// Close on Escape
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

init();
</script>
</body>
</html>
