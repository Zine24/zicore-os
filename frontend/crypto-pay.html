<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZICORE Crypto Pay</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#04060c;--glass:rgba(10,15,30,0.7);--border:rgba(0,229,255,0.12);--cyan:#00e5ff;--purple:#7c4dff;--green:#00ff88;--red:#ff4444;--text:#e0e6f0;--text-dim:#5a6a80;--mono:'SF Mono',Consolas,monospace}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.grain{position:fixed;inset:0;pointer-events:none;opacity:0.03;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");z-index:9999}

.topbar{position:fixed;top:0;left:0;right:0;height:48px;background:rgba(4,6,12,0.95);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;z-index:100;backdrop-filter:blur(20px)}
.topbar-logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--text)}
.topbar-icon{width:28px;height:28px;background:linear-gradient(135deg,var(--cyan),var(--purple));border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff}
.topbar-title{font-size:13px;font-weight:600;letter-spacing:1px}
.topbar-nav{display:flex;gap:4px;margin-left:40px}
.topbar-tab{background:none;border:none;color:var(--text-dim);font-size:12px;padding:8px 14px;cursor:pointer;border-radius:6px;transition:all 0.2s}
.topbar-tab:hover,.topbar-tab.active{color:var(--cyan);background:rgba(0,229,255,0.06)}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:16px}
.topbar-back{color:var(--text-dim);text-decoration:none;font-size:11px;letter-spacing:1px}
.topbar-back:hover{color:var(--cyan)}

.main{padding:70px 24px 40px;max-width:1100px;margin:0 auto}

.hero{text-align:center;margin-bottom:40px}
.hero h1{font-size:28px;font-weight:700;background:linear-gradient(135deg,var(--cyan),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.hero p{color:var(--text-dim);font-size:13px}

.services{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px;margin-bottom:40px}
.service-card{background:var(--glass);border:1px solid var(--border);border-radius:12px;padding:24px;backdrop-filter:blur(12px);transition:all 0.3s cubic-bezier(0.4,0,0.2,1);cursor:pointer}
.service-card:hover{border-color:var(--cyan);transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,229,255,0.08)}
.service-card.selected{border-color:var(--cyan);background:rgba(0,229,255,0.04)}
.service-name{font-size:16px;font-weight:600;margin-bottom:6px}
.service-desc{font-size:12px;color:var(--text-dim);margin-bottom:16px}
.service-prices{display:flex;gap:12px;flex-wrap:wrap}
.price-chip{background:rgba(0,229,255,0.06);border:1px solid var(--border);border-radius:6px;padding:6px 12px;font-size:11px;font-family:var(--mono)}
.price-chip .crypto{color:var(--cyan);font-weight:600}
.price-chip .amount{color:var(--text)}

.crypto-select{margin-bottom:30px}
.crypto-select label{font-size:12px;color:var(--text-dim);letter-spacing:1px;display:block;margin-bottom:8px}
.crypto-options{display:flex;gap:12px}
.crypto-btn{background:var(--glass);border:1px solid var(--border);border-radius:8px;padding:12px 20px;color:var(--text);cursor:pointer;font-size:13px;transition:all 0.2s;display:flex;align-items:center;gap:8px}
.crypto-btn:hover{border-color:var(--cyan)}
.crypto-btn.selected{border-color:var(--cyan);background:rgba(0,229,255,0.06)}
.crypto-btn .icon{font-size:18px}

.payment-box{background:var(--glass);border:1px solid var(--border);border-radius:12px;padding:30px;text-align:center;display:none}
.payment-box.visible{display:block}
.payment-title{font-size:14px;color:var(--text-dim);margin-bottom:16px}
.payment-amount{font-size:32px;font-weight:700;font-family:var(--mono);color:var(--cyan);margin-bottom:8px}
.payment-address{font-family:var(--mono);font-size:12px;color:var(--text);background:rgba(0,0,0,0.3);padding:12px 16px;border-radius:8px;word-break:break-all;margin-bottom:16px;cursor:pointer;border:1px solid var(--border);transition:border-color 0.2s}
.payment-address:hover{border-color:var(--cyan)}
.payment-address.copied{border-color:var(--green)}
.payment-id{font-size:11px;color:var(--text-dim);margin-bottom:12px}
.payment-status{font-size:12px;padding:6px 12px;border-radius:6px;display:inline-block}
.payment-status.pending{color:#ffa500;background:rgba(255,165,0,0.1);border:1px solid rgba(255,165,0,0.2)}
.payment-status.confirmed{color:var(--green);background:rgba(0,255,136,0.1);border:1px solid rgba(0,255,136,0.2)}
.payment-timer{font-size:11px;color:var(--text-dim);margin-top:12px}

.toast{position:fixed;bottom:20px;right:20px;background:var(--glass);border:1px solid var(--border);border-radius:8px;padding:12px 20px;font-size:12px;transform:translateY(100px);opacity:0;transition:all 0.3s;z-index:200;backdrop-filter:blur(12px)}
.toast.show{transform:translateY(0);opacity:1}
.toast.success{border-color:var(--green);color:var(--green)}
.toast.error{border-color:var(--red);color:var(--red)}
</style>
</head>
<body>
<div class="grain"></div>

<div class="topbar">
  <a class="topbar-logo" href="/">
    <div class="topbar-icon">Z</div>
    <span class="topbar-title">ZICORE Crypto Pay</span>
  </a>
  <div class="topbar-nav">
    <button class="topbar-tab active" onclick="showView('services')">Servicios</button>
    <button class="topbar-tab" onclick="showView('history')">Mis Pagos</button>
  </div>
  <div class="topbar-right">
    <a class="topbar-back" href="/">Portal</a>
  </div>
</div>

<div class="main">
  <div class="hero">
    <h1>Paga con Criptomonedas</h1>
    <p>Servicios de ZICORE con BTC, ETH o ZTN (Zitón)</p>
  </div>

  <!-- SERVICES -->
  <div id="view-services">
    <div class="crypto-select">
      <label>CRYPTOCURRENCY</label>
      <div class="crypto-options">
        <button class="crypto-btn selected" onclick="selectCrypto('ztn',this)"><span class="icon">🪙</span> ZTN (Zitón)</button>
        <button class="crypto-btn" onclick="selectCrypto('btc',this)"><span class="icon">₿</span> Bitcoin</button>
        <button class="crypto-btn" onclick="selectCrypto('eth',this)"><span class="icon">⟠</span> Ethereum</button>
      </div>
    </div>
    <div class="services" id="servicesGrid"></div>
    <div class="payment-box" id="paymentBox">
      <div class="payment-title">Envía el pago a esta dirección</div>
      <div class="payment-amount" id="payAmount"></div>
      <div class="payment-address" id="payAddress" onclick="copyAddress()"></div>
      <div class="payment-id" id="payId"></div>
      <div class="payment-status pending" id="payStatus">⏳ Esperando confirmación...</div>
      <div class="payment-timer" id="payTimer"></div>
    </div>
  </div>

  <!-- HISTORY -->
  <div id="view-history" style="display:none">
    <div id="historyContent"><p style="color:var(--text-dim);font-size:13px">Inicia sesión para ver tus pagos.</p></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var STATE={selectedCrypto:'ztn',selectedService:null,payment:null,services:{}};

function $(id){return document.getElementById(id)}
function showToast(m,t){var e=$('toast');e.textContent=m;e.className='toast '+(t||'info')+' show';setTimeout(function(){e.classList.remove('show')},3000)}

function showView(v){
  $('view-services').style.display=v==='services'?'block':'none';
  $('view-history').style.display=v==='history'?'block':'none';
  document.querySelectorAll('.topbar-tab').forEach(function(t){t.classList.remove('active')});
  document.querySelector('[onclick="showView(\''+v+'\')"]').classList.add('active');
  if(v==='history')loadHistory();
}

function selectCrypto(c,el){
  STATE.selectedCrypto=c;
  document.querySelectorAll('.crypto-btn').forEach(function(b){b.classList.remove('selected')});
  el.classList.add('selected');
  renderServices();
}

function renderServices(){
  var g=$('servicesGrid');g.innerHTML='';
  Object.keys(STATE.services).forEach(function(id){
    var s=STATE.services[id];
    var priceKey='price_'+STATE.selectedCrypto;
    var price=s[priceKey]||0;
    var symbols={ztn:'ZTN',btc:'BTC',eth:'ETH'};
    g.innerHTML+='<div class="service-card" onclick="selectService(\''+id+'\')">'+
      '<div class="service-name">'+s.name+'</div>'+
      '<div class="service-desc">'+s.description+'</div>'+
      '<div class="service-prices">'+
        '<div class="price-chip"><span class="crypto">'+symbols[STATE.selectedCrypto]+'</span> <span class="amount">'+price+'</span></div>'+
        '<div class="price-chip"><span class="crypto">USD</span> <span class="amount">$'+s.price_usd+'</span></div>'+
        '<div class="price-chip"><span class="crypto">ZTN</span> <span class="amount">'+s.price_ztn+'</span></div>'+
      '</div>'+
    '</div>';
  });
}

function selectService(id){
  STATE.selectedService=id;
  document.querySelectorAll('.service-card').forEach(function(c){c.classList.remove('selected')});
  event.currentTarget.classList.add('selected');
  createPayment(id);
}

function createPayment(serviceId){
  fetch('/api/crypto/pay',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({service:serviceId,email:'guest@zicore.space',crypto:STATE.selectedCrypto})
  })
  .then(function(r){return r.json()})
  .then(function(d){
    if(d.status==='ok'){
      STATE.payment=d;
      showPaymentBox(d);
    }else{showToast(d.error||'Error','error')}
  })
  .catch(function(){showToast('Error de conexión','error')});
}

function showPaymentBox(p){
  var symbols={ZTN:'🪙 ZTN',BTC:'₿ BTC',ETH:'⟠ ETH'};
  $('payAmount').textContent=symbols[p.crypto]+' '+p.amount;
  $('payAddress').textContent=p.address;
  $('payId').textContent='ID: '+p.id;
  $('payStatus').className='payment-status pending';
  $('payStatus').textContent='⏳ Esperando confirmación...';
  $('paymentBox').classList.add('visible');
  $('paymentBox').scrollIntoView({behavior:'smooth'});
  startTimer(p.expires_at);
}

function copyAddress(){
  var addr=$('payAddress').textContent;
  navigator.clipboard.writeText(addr).then(function(){
    $('payAddress').classList.add('copied');
    showToast('Dirección copiada','success');
    setTimeout(function(){$('payAddress').classList.remove('copied')},2000);
  });
}

function startTimer(expires){
  var end=new Date(expires).getTime();
  function tick(){
    var now=Date.now();
    var diff=end-now;
    if(diff<=0){$('payTimer').textContent='Expirado';return}
    var m=Math.floor(diff/60000);
    var s=Math.floor((diff%60000)/1000);
    $('payTimer').textContent='Expira en '+m+':'+String(s).padStart(2,'0');
    requestAnimationFrame(tick);
  }
  tick();
}

function loadHistory(){
  fetch('/api/crypto/payments?email=guest@zicore.space')
    .then(function(r){return r.json()})
    .then(function(d){
      var html='<h3 style="font-size:14px;color:var(--text-dim);margin-bottom:16px">Mis Pagos</h3>';
      if(!d.payments||d.payments.length===0){
        html+='<p style="color:var(--text-dim);font-size:12px">No hay pagos registrados.</p>';
      }else{
        d.payments.forEach(function(p){
          html+='<div style="background:var(--glass);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center">'+
            '<div><div style="font-size:13px;font-weight:600">'+p.service_name+'</div>'+
            '<div style="font-size:11px;color:var(--text-dim)">'+p.crypto+' '+p.amount+' — '+p.created_at+'</div></div>'+
            '<div class="payment-status '+p.status+'">'+(p.status==='confirmed'?'✓ Confirmado':'⏳ Pendiente')+'</div>'+
          '</div>';
        });
      }
      $('historyContent').innerHTML=html;
    });
}

// Init
fetch('/api/crypto/services')
  .then(function(r){return r.json()})
  .then(function(d){
    STATE.services=d.services||{};
    renderServices();
  });
</script>
</body>
</html>
