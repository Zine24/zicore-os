<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ZICORE — Mobile Monitor</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#060a12;--card:#0d1117;--border:#1a2332;--cyan:#00e5ff;--green:#00ff88;--red:#ff3333;--orange:#ff8800;--text:#e0e0e0;--muted:#607080}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column}
.status-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:rgba(13,17,23,0.95);border-bottom:1px solid var(--border);font-size:11px}
.status-bar .server{color:var(--cyan);font-weight:600}
.status-bar .time{color:var(--muted)}
.main{flex:1;overflow-y:auto;padding:12px}
.card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:10px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.card-title{font-size:12px;font-weight:600;color:var(--cyan);letter-spacing:1px}
.card-badge{padding:2px 8px;border-radius:10px;font-size:9px;font-weight:700}
.badge-ok{background:rgba(0,255,136,0.15);color:var(--green);border:1px solid rgba(0,255,136,0.3)}
.badge-warn{background:rgba(255,136,0,0.15);color:var(--orange);border:1px solid rgba(255,136,0,0.3)}
.badge-err{background:rgba(255,51,51,0.15);color:var(--red);border:1px solid rgba(255,51,51,0.3)}
.temp-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.temp-item{display:flex;align-items:center;gap:8px;padding:8px;background:rgba(0,229,255,0.03);border-radius:6px}
.temp-icon{font-size:16px}
.temp-info{flex:1}
.temp-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px}
.temp-value{font-size:14px;font-weight:700;color:var(--text)}
.temp-value.hot{color:var(--red)}
.temp-value.warm{color:var(--orange)}
.temp-value.cool{color:var(--green)}
.progress-bar{height:4px;background:rgba(0,255,136,0.1);border-radius:2px;margin-top:4px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--cyan));border-radius:2px;transition:width 0.5s}
.feeder-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.feeder-item{padding:8px;background:rgba(0,229,255,0.03);border-radius:6px;text-align:center}
.feeder-name{font-size:10px;color:var(--muted);margin-bottom:4px}
.feeder-status{font-size:12px;font-weight:600}
.feeder-status.active{color:var(--green)}
.feeder-status.idle{color:var(--muted)}
.btn-row{display:flex;gap:8px;margin-top:8px}
.btn{flex:1;padding:10px;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--text);font-size:11px;font-weight:600;cursor:pointer;transition:all 0.2s}
.btn:active{transform:scale(0.95)}
.btn-primary{border-color:rgba(0,229,255,0.3);color:var(--cyan);background:rgba(0,229,255,0.05)}
.btn-danger{border-color:rgba(255,51,51,0.3);color:var(--red);background:rgba(255,51,51,0.05)}
.btn-vr{border-color:rgba(124,77,255,0.3);color:#7c4dff;background:rgba(124,77,255,0.05)}
.camera-view{width:100%;aspect-ratio:4/3;background:#000;border-radius:6px;overflow:hidden;margin-bottom:10px;position:relative}
.camera-view img{width:100%;height:100%;object-fit:cover}
.camera-overlay{position:absolute;bottom:0;left:0;right:0;padding:6px 10px;background:linear-gradient(transparent,rgba(0,0,0,0.8));font-size:9px;color:var(--muted)}
.bottom-nav{display:flex;align-items:center;justify-content:space-around;padding:8px;background:rgba(13,17,23,0.95);border-top:1px solid var(--border)}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:9px;color:var(--muted);transition:all 0.2s}
.nav-item.active{color:var(--cyan);background:rgba(0,229,255,0.05)}
.nav-item .nav-icon{font-size:16px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
.pulse{animation:pulse 2s infinite}
</style>
</head>
<body>
<div class="status-bar">
  <span class="server" id="serverStatus">Connecting...</span>
  <span class="time" id="clock">--:--:--</span>
</div>

<div class="main" id="mainView">
  <!-- Camera -->
  <div class="camera-view" id="cameraView">
    <img id="cameraImg" src="" alt="Camera">
    <div class="camera-overlay">📷 Camera — <span id="cameraStatus">OFF</span></div>
  </div>

  <!-- Temperatures -->
  <div class="card">
    <div class="card-header">
      <span class="card-title">TEMPERATURAS</span>
      <span class="card-badge badge-ok" id="tempBadge">OK</span>
    </div>
    <div class="temp-grid">
      <div class="temp-item">
        <span class="temp-icon">🔥</span>
        <div class="temp-info">
          <div class="temp-label">Extrusor</div>
          <div class="temp-value" id="extruderTemp">--°C</div>
        </div>
      </div>
      <div class="temp-item">
        <span class="temp-icon">🛏️</span>
        <div class="temp-info">
          <div class="temp-label">Cama</div>
          <div class="temp-value" id="bedTemp">--°C</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Progress -->
  <div class="card">
    <div class="card-header">
      <span class="card-title">IMPRESION</span>
      <span class="card-badge badge-ok" id="printBadge">IDLE</span>
    </div>
    <div style="margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-bottom:4px">
        <span id="printProgress">0%</span>
        <span id="printTime">--:--</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="printBar" style="width:0%"></div></div>
    </div>
    <div style="font-size:10px;color:var(--muted)">
      <span id="printFile">No file</span> — <span id="printLayer">Layer --/--</span>
    </div>
  </div>

  <!-- Feeders -->
  <div class="card">
    <div class="card-header">
      <span class="card-title">FEEDERS</span>
    </div>
    <div class="feeder-grid" id="feederGrid">
      <div class="feeder-item"><div class="feeder-name">F0</div><div class="feeder-status idle" id="f0">IDLE</div></div>
      <div class="feeder-item"><div class="feeder-name">F1</div><div class="feeder-status idle" id="f1">IDLE</div></div>
      <div class="feeder-item"><div class="feeder-name">F2</div><div class="feeder-status idle" id="f2">IDLE</div></div>
      <div class="feeder-item"><div class="feeder-name">F3</div><div class="feeder-status idle" id="f3">IDLE</div></div>
    </div>
  </div>

  <!-- Actions -->
  <div class="btn-row">
    <button class="btn btn-primary" onclick="home()">🏠 HOME</button>
    <button class="btn btn-danger" onclick="emergencyStop()">⏹ E-STOP</button>
    <button class="btn btn-vr" onclick="enterVR()">🥽 VR</button>
  </div>
</div>

<!-- Bottom Nav -->
<div class="bottom-nav">
  <div class="nav-item active" onclick="showView('main')"><div class="nav-icon">📊</div>Monitor</div>
  <div class="nav-item" onclick="showView('cam')"><div class="nav-icon">📷</div>Camera</div>
  <div class="nav-item" id="displayBtn" onclick="showView('display')"><div class="nav-icon">🖥</div>Display</div>
  <div class="nav-item" onclick="showView('portal')"><div class="nav-icon">🌐</div>Portal</div>
</div>

<!-- Display Stream Frame -->
<img id="displayFrame" style="display:none;width:100%;position:fixed;top:0;left:0;z-index:5;background:#000;object-fit:contain" />
<div id="displayInfo" style="display:none;position:fixed;bottom:60px;left:50%;transform:translateX(-50%);font-size:9px;color:var(--text2);z-index:6;background:rgba(0,0,0,.7);padding:2px 8px;border-radius:3px"></div>

<script>
const SERVER = window.location.origin;
let printerId = 'printer_1';

// Clock
function tick(){document.getElementById('clock').textContent=new Date().toLocaleTimeString('es-MX',{hour12:false})}
setInterval(tick,1000);tick();

// Poll status
async function pollStatus(){
  try{
    const r = await fetch(SERVER+'/api/print/all-status');
    const d = await r.json();
    if(d && d.length > 0){
      const p = d[0];
      document.getElementById('serverStatus').textContent = '🟢 Connected — '+p.name;
      document.getElementById('extruderTemp').textContent = (p.extruder_temp||0).toFixed(1)+'°C';
      document.getElementById('bedTemp').textContent = (p.bed_temp||0).toFixed(1)+'°C';
      
      const ext = p.extruder_temp||0;
      const extEl = document.getElementById('extruderTemp');
      extEl.className = 'temp-value '+(ext>250?'hot':ext>200?'warm':'cool');

      if(p.printing){
        document.getElementById('printBadge').textContent='PRINTING';
        document.getElementById('printBadge').className='card-badge badge-warn';
        document.getElementById('printProgress').textContent = (p.progress||0).toFixed(1)+'%';
        document.getElementById('printBar').style.width = (p.progress||0)+'%';
        document.getElementById('printFile').textContent = p.current_file||'Printing...';
      } else {
        document.getElementById('printBadge').textContent='IDLE';
        document.getElementById('printBadge').className='card-badge badge-ok';
      }

      // Feeders
      for(let i=0;i<4;i++){
        const f = document.getElementById('f'+i);
        if(p.feeders && p.feeders[i]){
          f.textContent = p.feeders[i].active?'ACTIVE':'IDLE';
          f.className = 'feeder-status '+(p.feeders[i].active?'active':'idle');
        }
      }
    }
  }catch(e){
    document.getElementById('serverStatus').textContent = '🔴 Disconnected';
  }
}

// Camera
async function loadCamera(){
  try{
    const r = await fetch(SERVER+'/api/print/camera/'+printerId);
    const d = await r.json();
    if(d && d.url){
      document.getElementById('cameraImg').src = d.url;
      document.getElementById('cameraStatus').textContent = 'ON';
    }
  }catch(e){}
}

// Actions
function home(){window.location.href='/';}
function enterVR(){if(window.ZICORE)window.ZICORE.toggleVR();else alert('VR mode requires ZICORE Android app');}
function emergencyStop(){
  if(confirm('EMERGENCY STOP?')){
    fetch(SERVER+'/api/print/action',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({printer_id:printerId,action:'emergency_stop'})});
  }
}

// Display Stream Mode
let displayWs = null;
let displayActive = false;
function toggleDisplayMode(){
  if(displayActive){
    disconnectDisplay();
  }else{
    connectDisplay();
  }
}
function connectDisplay(){
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  displayWs = new WebSocket(proto + '//' + location.host + '/ws/display-stream');
  displayWs.onopen = ()=>{
    displayActive = true;
    document.getElementById('displayBtn').textContent = 'DISPLAY ON';
    document.getElementById('displayBtn').style.borderColor = 'var(--green)';
    document.getElementById('displayBtn').style.color = 'var(--green)';
    // Subscribe to first available session or auto-create
    displayWs.send(JSON.stringify({action:'subscribe',scene:'planetary_surface',width:480,height:320}));
  };
  displayWs.onmessage = (e)=>{
    try{
      const d = JSON.parse(e.data);
      if(d.type==='frame' && d.data){
        const img = document.getElementById('displayFrame');
        img.src = 'data:image/png;base64,'+d.data;
        img.style.display = 'block';
        document.getElementById('cameraSection').style.display = 'none';
        document.getElementById('displayInfo').textContent = 'Frame #'+(d.frame||0);
      }
    }catch(x){}
  };
  displayWs.onclose = ()=>{ displayActive=false; document.getElementById('displayBtn').textContent='DISPLAY'; document.getElementById('displayBtn').style.borderColor=''; document.getElementById('displayBtn').style.color=''; };
  displayWs.onerror = ()=>{};
}
function disconnectDisplay(){
  if(displayWs){displayWs.send(JSON.stringify({action:'unsubscribe'}));displayWs.close();displayWs=null;}
  displayActive=false;
  document.getElementById('displayBtn').textContent='DISPLAY';
  document.getElementById('displayBtn').style.borderColor='';
  document.getElementById('displayBtn').style.color='';
  document.getElementById('displayFrame').style.display='none';
  document.getElementById('cameraSection').style.display='';
}

function showView(v){
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  event.target.closest('.nav-item').classList.add('active');
  if(v==='portal')window.location.href='/';
  if(v==='display')toggleDisplayMode();
  if(v==='monitor'){disconnectDisplay();document.getElementById('displayFrame').style.display='none';document.getElementById('cameraSection').style.display='';}
}

// Init
pollStatus();
setInterval(pollStatus,2000);
loadCamera();
</script>
</body>
</html>
